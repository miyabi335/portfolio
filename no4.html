<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUSIC ARCHIVE - MIYABI'S PORTAL</title>
    <style>
        body { 
            font-family: "Helvetica Neue", Arial, sans-serif;
            margin: 0; background: #0f172a; color: #f1f5f9; 
        }

        /* ヘッダー */
        .header {
            padding: 20px; background: #1e293b; text-align: center;
            border-bottom: 2px solid #fb8c00; position: sticky; top: 0; z-index: 100;
        }
        .header h1 { font-size: 1.5rem; margin: 0; letter-spacing: 0.1em; color: #fb8c00; }
        .back-link { color: #38bdf8; text-decoration: none; font-size: 0.9rem; font-weight: bold; }

        /* 動画リストコンテナ */
        .video-list { padding: 15px; max-width: 1000px; margin: 0 auto; }

        /* 動画1行分のスタイル */
        .video-row {
            display: flex; /* 横並び */
            align-items: flex-start;
            background: rgba(255,255,255,0.05);
            margin-bottom: 15px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* 左側：サムネイル（クリックで再生） */
        .video-thumb-container {
            width: 45%; /* 画面の約半分を画像に */
            position: relative;
            cursor: pointer;
        }
        .video-thumb {
            width: 100%;
            display: block;
            aspect-ratio: 16/9;
            object-fit: cover;
        }
        /* 再生アイコンを重ねる */
        .play-icon {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.6); border-radius: 50%;
            padding: 10px; width: 30px; height: 30px;
            display: flex; align-items: center; justify-content: center;
        }

        /* 右側：コメントスペース */
        .video-comment {
            width: 55%; /* 残りのスペース */
            padding: 10px 15px;
            box-sizing: border-box;
            text-align: left;
        }
        .comment-title { font-weight: bold; color: #fb8c00; font-size: 1rem; margin-bottom: 5px; }
        .comment-text { font-size: 0.85rem; line-height: 1.4; color: #cbd5e1; }

        /* 動画再生オーバーレイ（巨大） */
        #overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.98); align-items: center; justify-content: center; z-index: 10000; 
        }
        #overlay-content { width: 95%; max-width: 1200px; text-align: center; }
        #overlay-video { width: 100%; aspect-ratio: 16/9; border: 1px solid #333; }
        .close-btn { 
            margin-top: 20px; background: #ef4444; color: #fff; border: none;
            padding: 12px 40px; border-radius: 30px; cursor: pointer; font-weight: bold;
        }

        /* さらにスマホで文字を読みやすく調整 */
        @media (max-width: 480px) {
            .video-row { margin-bottom: 10px; }
            .comment-title { font-size: 0.9rem; }
            .comment-text { font-size: 0.75rem; }
            .video-comment { padding: 8px; }
        }
    </style>
</head>
<body>

<header class="header">
    <a href="index.html" class="back-link">← BACK TO PORTAL</a>
    <h1>MUSIC ARCHIVE</h1>
</header>

<div class="video-list">

    <div class="video-row">
        <div class="video-thumb-container" onclick="openVideo('av8FzH-rl_0')">
            <img src="https://img.youtube.com/vi/av8FzH-rl_0/mqdefault.jpg" class="video-thumb">
            <div class="play-icon">▶</div>
        </div>
        <div class="video-comment">
            <div class="comment-title">希望のヒカリ</div>
            <div class="comment-text">ここにこの動画に関する解説や思い出、歌詞の一部などを自由に書き込めます。</div>
        </div>
    </div>

    <div class="video-row">
        <div class="video-thumb-container" onclick="openVideo('anwipaF_gLU')">
            <img src="https://img.youtube.com/vi/anwipaF_gLU/mqdefault.jpg" class="video-thumb">
            <div class="play-icon">▶</div>
        </div>
        <div class="video-comment">
            <div class="comment-title">日本をあきらめない</div>
            <div class="comment-text">右側のスペースが広いので、長文のコメントを入れても縦に伸びて綺麗に表示されます。</div>
        </div>
    </div>

    <div class="video-row">
        <div class="video-thumb-container" onclick="openVideo('78uHp5bLyto')">
            <img src="https://img.youtube.com/vi/78uHp5bLyto/mqdefault.jpg" class="video-thumb">
            <div class="play-icon">▶</div>
        </div>
        <div class="video-comment">
            <div class="comment-title">ヒーローは現れない</div>
            <div class="comment-text">動画を増やしたいときは、この「video-row」のブロックをコピーして下に増やすだけです。</div>
        </div>
    </div>

    <div class="video-row">
        <div class="video-thumb-container" onclick="openVideo('kcyuEbUbSr8')">
            <img src="https://img.youtube.com/vi/kcyuEbUbSr8/mqdefault.jpg" class="video-thumb">
            <div class="play-icon">▶</div>
        </div>
        <div class="video-comment">
            <div class="comment-title">橙の焔</div>
            <div class="comment-text">左にサムネイルがあることで、どの動画のコメントかが一目でわかります。</div>
        </div>
    </div>

    </div>

<div id="overlay" onclick="closeOverlay()">
    <div id="overlay-content" onclick="event.stopPropagation()">
        <iframe id="overlay-video" src="" frameborder="0" allowfullscreen></iframe><br>
        <button class="close-btn" onclick="closeOverlay()">CLOSE</button>
    </div>
</div>

<script>
    function openVideo(id) {
        const video = document.getElementById('overlay-video');
        video.src = "https://www.youtube.com/embed/" + id + "?autoplay=1";
        document.getElementById('overlay').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }
    function closeOverlay() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('overlay-video').src = '';
        document.body.style.overflow = '';
    }
</script>

<footer style="padding: 40px; text-align: center; color: #475569; font-size: 0.8rem;">
    &copy; 2026 MIYABI'S PORTAL
</footer>

</body>
</html>
