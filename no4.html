<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Playlist</title>
    <style>
        body { font-family: "Meiryo", sans-serif; margin: 0; background: #0f172a; text-align: center; color: #f1f5f9; padding-bottom: 100px; }
        
        /* ヘッダー */
        .header-title { margin: 40px 0 20px; padding: 10px 20px; color: #38bdf8; font-size: 1.8rem; font-weight: bold; letter-spacing: 0.1em; border-bottom: 2px solid rgba(56, 189, 248, 0.3); display: inline-block; }

        /* トップの注目動画（サムネイル） */
        .featured-video { max-width: 800px; margin: 20px auto; padding: 0 20px; }
        .thumb-link { display: block; position: relative; width: 100%; aspect-ratio: 16/9; border-radius: 15px; overflow: hidden; border: 2px solid #fb8c00; box-shadow: 0 0 20px rgba(251, 140, 0, 0.4); transition: 0.3s; }
        .thumb-link:hover { transform: scale(1.02); }
        .thumb-link img { width: 100%; height: 100%; object-fit: cover; }
        .thumb-overlay { position: absolute; bottom: 0; background: rgba(0,0,0,0.7); width: 100%; padding: 15px; text-align: left; box-sizing: border-box; }
        .thumb-text { color: #fb8c00; font-weight: bold; font-size: 1.2rem; }

        /* 縦並びのリスト */
        .music-container { display: flex; flex-direction: column; gap: 12px; max-width: 800px; margin: 30px auto; padding: 0 20px; }
        
        .music-item { 
            display: flex; align-items: center; justify-content: space-between; 
            background: rgba(255,255,255,0.05); color: #fff; 
            border: 1px solid rgba(56, 189, 248, 0.4); 
            padding: 20px 25px; border-radius: 10px; text-decoration: none; 
            font-weight: bold; transition: 0.2s;
        }
        .music-item:hover { background: rgba(56, 189, 248, 0.15); border-color: #38bdf8; }
        .no-badge { background: #38bdf8; color: #0f172a; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; margin-right: 15px; }
        .play-icon { color: #fb8c00; font-size: 1rem; }

        .footer-nav { margin-top: 50px; }
        .back-btn { display: inline-block; padding: 15px 50px; background: #334155; color: #fff; text-decoration: none; border-radius: 30px; font-weight: bold; }
    </style>
</head>
<body>

<div class="header-title">MUSIC PLAYLIST</div>

<div class="featured-video">
    <a href="https://www.youtube.com/watch?v=kcyuEbUbUb8" target="_blank" class="thumb-link">
        <img src="https://img.youtube.com/vi/kcyuEbUb8/maxresdefault.jpg" alt="橙の焔">
        <div class="thumb-overlay">
            <span class="thumb-text">PICK UP: 橙の焔</span>
        </div>
    </a>
</div>

<div class="music-container">
    <a href="https://www.youtube.com/watch?v=av8FzH-rl_0" target="_blank" class="music-item">
        <div><span class="no-badge">no.1</span>希望のヒカリ</div>
        <span class="play-icon">▶ PLAY</span>
    </a>

    <a href="https://www.youtube.com/watch?v=anwipaF_gLU" target="_blank" class="music-item">
        <div><span class="no-badge">no.2</span>僕らは日本をあきらめない</div>
        <span class="play-icon">▶ PLAY</span>
    </a>

    <a href="https://www.youtube.com/watch?v=78uHp5bLyto" target="_blank" class="music-item">
        <div><span class="no-badge">no.3</span>ヒーローは現れない</div>
        <span class="play-icon">▶ PLAY</span>
    </a>

    <a href="https://www.youtube.com/watch?v=kcyuEbUb8" target="_blank" class="music-item">
        <div><span class="no-badge">no.4</span>橙の焔</div>
        <span class="play-icon">▶ PLAY</span>
    </a>
</div>

<div class="footer-nav">
    <a href="index.html" class="back-btn">ホームへ戻る</a>
</div>

</body>
</html>
