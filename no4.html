<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Playlist</title>
    <style>
        body { font-family: "Meiryo", sans-serif; margin: 0; background: #0f172a; text-align: center; color: #f1f5f9; padding-bottom: 100px; }
        .header-title { margin-top: 40px; padding: 20px; color: #38bdf8; font-size: 1.8rem; font-weight: bold; letter-spacing: 0.1em; border-bottom: 2px solid rgba(56, 189, 248, 0.3); display: inline-block; }
        .music-container { display: flex; flex-direction: column; gap: 15px; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .music-item { 
            display: flex; align-items: center; justify-content: space-between; 
            background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(56, 189, 248, 0.5); 
            padding: 25px 30px; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 1.1rem; transition: 0.3s;
        }
        .music-item:hover { background: rgba(56, 189, 248, 0.15); transform: scale(1.02); border-color: #38bdf8; }
        .play-icon { color: #fb8c00; font-size: 1.2rem; }
        .footer-nav { margin-top: 50px; }
        .back-btn { display: inline-block; padding: 15px 50px; background: #334155; color: #fff; text-decoration: none; border-radius: 30px; font-weight: bold; }
    </style>
</head>
<body>

<div class="header-title">MUSIC PLAYLIST</div>

<div class="music-container">
    <a href="https://music.youtube.com/" target="_blank" class="music-item">
        <span>YouTube Music (Home)</span>
        <span class="play-icon">▶ PLAY</span>
    </a>
    </div>

<div class="footer-nav">
    <a href="index.html" class="back-btn">ホームへ戻る</a>
</div>

</body>
</html>
