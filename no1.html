<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links 1-100 - Sakura Mankai Edition</title>
    <style>
        /* ページ全体の背景設定（満開の桜） */
        body { 
            font-family: sans-serif; 
            margin: 0; 
            background-color: #ffeff5; /* 非常に薄い桜色 */
            /* 桜の花びらや枝が咲き乱れる様子を表現した複雑な背景パターン（CSSで表現） */
            background-image: 
                /* 1層目：手前の大きな花びら */
                radial-gradient(#ffb6c1 20%, transparent 25%),
                /* 2層目：少し奥の小さな花びら */
                radial-gradient(#fff0f5 15%, transparent 18%),
                /* 3層目：奥に生い茂る桜の木々を表現したグラデーション */
                repeating-linear-gradient(45deg, #ffdbed 0px, #ffdbed 2px, transparent 2px, transparent 10px),
                repeating-linear-gradient(-45deg, #ffdbed 0px, #ffdbed 2px, transparent 2px, transparent 10px),
                /* 4層目：さらに奥の生い茂る桜の木々を表現したグラデーション */
                repeating-linear-gradient(60deg, #ffdbed 0px, #ffdbed 1px, transparent 1px, transparent 8px),
                repeating-linear-gradient(-60deg, #ffdbed 0px, #ffdbed 1px, transparent 1px, transparent 8px);
            background-position: 0 0, 25px 25px, 0 0, 0 0, 10px 10px, 10px 10px;
            background-size: 50px 50px, 50px 50px, 100px 100px, 100px 100px, 80px 80px, 80px 80px;
            /* 背景をブレンドして、生い茂る桜の木々を表現 */
            background-blend-mode: multiply, normal, normal, normal, normal, normal;
            text-align: center; 
            color: #333; 
        }

        .header-container { 
            position: relative; 
            width: 100%; 
            height: 15vh; 
            overflow: hidden; 
            background-color: #ffb7c5; /* ヘッダーのベースカラー */
            /* ヘッダーにも桜模様を適用 */
            background-image: radial-gradient(#fff 10%, transparent 15%);
            background-size: 30px 30px;
            background-position: 0 0;
        }
        .header-image { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            opacity: 0.3; /* 背景模様をより透けさせる */
        }
        .header-text { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            color: #fff; 
            text-shadow: 2px 2px 5px rgba(219, 112, 147, 0.6); /* ピンク系の影で柔らかく */
        }
        
        .link-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 12px; /* 間隔を少し広く */
            max-width: 1000px; 
            margin: 30px auto; 
            padding: 25px; 
            background: rgba(255, 255, 255, 0.5); /* 透過度を調整 */
            border-radius: 20px;
            backdrop-filter: blur(3px); /* ぼかしを少し強くしてボタンを際立たせる */
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.3); /* ピンク系の柔らかい影 */
        }

        .link-btn {
            background: rgba(255, 255, 255, 0.8); /* ボタン自体も少し透けさせる */
            color: #db7093; /* 文字色を濃いピンクに */
            border: 2px solid #ffb6c1; /* 枠線を薄いピンクに */
            padding: 12px 5px;
            border-radius: 10px; /* 角を少し丸く */
            text-decoration: none;
            font-size: 0.85em; /* 文字を少し大きく */
            transition: all 0.3s ease; /* アニメーションを滑らかに */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 75px; /* 高さを少し高く */
            line-height: 1.4;
            position: relative; /* 疑似要素の位置基準 */
            overflow: hidden; /* 疑似要素がはみ出ないように */
        }

        /* ボタンの背景にもうっすら桜模様を透けさせる */
        .link-btn::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(#ffeff5 20%, transparent 25%);
            background-size: 20px 20px;
            opacity: 0.2;
            z-index: -1; /* 文字の後ろに配置 */
        }

        /* 1-10番：薄い橙色（桜ベースに変更） */
        .orange-btn { background: rgba(255, 240, 245, 0.9); color: #d35400; border-color: #ffb6c1; }
        /* 16-25番：薄い水色（桜ベースに変更） */
        .blue-btn { background: rgba(240, 248, 255, 0.9); color: #0277bd; border-color: #b0e0e6; }
        /* 26-35番：薄いグリーン（桜ベースに変更） */
        .green-btn { background: rgba(240, 255, 240, 0.9); color: #2e7d32; border-color: #98fb98; }
        /* 36-45番：薄い黄色（桜ベースに変更） */
        .yellow-btn { background: rgba(255, 255, 240, 0.9); color: #827717; border-color: #f0e68c; }

        .link-btn:hover { 
            opacity: 1; 
            transform: translateY(-5px) scale(1.03); /* 少し大きくして浮き上がらせる */
            box-shadow: 0 8px 20px rgba(219, 112, 147, 0.2);
            border-color: #db7093; /* ホバー時は枠線を濃く */
        }
        .btn-title { font-size: 1.15rem; font-weight: bold; display: block; }

        .footer-nav { margin: 50px 0; }
        .back-btn { 
            padding: 15px 50px; 
            background: linear-gradient(45deg, #ff80ab, #ffb6c1); /* グラデーションで華やかに */
            color: #fff; 
            text-decoration: none; 
            border-radius: 30px; 
            font-weight: bold; 
            box-shadow: 0 4px 10px rgba(219, 112, 147, 0.3);
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            box-shadow: 0 6px 15px rgba(219, 112, 147, 0.4);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<header class="header-container">
    <img src="p1.jpg" alt="Header" class="header-image">
    <div class="header-text"><h1>LINKS 1-100</h1></div>
</header>

<div class="link-grid">
    <script>
        const linkData = {
            // 1-10番（薄い橙色：参政党関連）
            1: { name: "公式サイト", url: "https://sanseito.jp/" },
            2: { name: "最新ニュース", url: "https://sanseito.jp/news/" },
            3: { name: "イベント", url: "https://info.sanseito.jp/" },
            4: { name: "メンバー", url: "https://sanseito.jp/member/" },
            5: { name: "候補予定者", url: "https://sanseito.jp/2020/candidate/" },
            6: { name: "YouTube", url: "https://www.youtube.com/@sanseito-official" },
            7: { name: "X", url: "https://x.com/sansei411" },
            8: { name: "Instagram", url: "https://www.instagram.com/sanseito" },
            9: { name: "TikTok", url: "https://www.tiktok.com/@sanseito" },
            10: { name: "選挙ドットコム", url: "https://go2senkyo.com/articles/tag/%E5%8F%82%E6%94%BF%E5%85%9A" },
            
            // 16-25番（薄い水色：ニュース）
            16: { name: "Yahoo Japan", url: "https://www.yahoo.co.jp/" },
            17: { name: "読売新聞", url: "https://www.yomiuri.co.jp/" },
            18: { name: "産経新聞", url: "https://www.sankei.com/" },
            19: { name: "朝日新聞", url: "https://www.asahi.com/" },
            20: { name: "毎日新聞", url: "https://mainichi.jp/" },
            21: { name: "NHK", url: "https://news.web.nhk/newsweb" },
            22: { name: "日経新聞", url: "https://www.nikkei.com/" },
            23: { name: "ロイター", url: "https://jp.reuters.com/" },
            24: { name: "CNN", url: "https://www.cnn.co.jp/" },
            25: { name: "BBC", url: "https://www.bbc.com/japanese" },

            // 26-35番（薄いグリーン：政党HP）
            26: { name: "自由民主党", url: "https://www.jimin.jp/" },
            27: { name: "日本維新の会", url: "https://o-ishin.jp/" },
            28: { name: "中道改革連合", url: "https://craj.jp/" },
            29: { name: "国民民主党", url: "https://new-kokumin.jp/" },
            30: { name: "参政党", url: "https://sanseito.jp/" },
            31: { name: "日本共産党", url: "https://www.jcp.or.jp/" },
            32: { name: "チームみらい", url: "https://team-mir.ai/" },
            33: { name: "れいわ新選組", url: "https://reiwa-shinsengumi.com/" },
            34: { name: "日本保守党", url: "https://hoshuto.jp/" },
            35: { name: "社会民主党", url: "https://sdp.or.jp/" },

            // 36-45番（薄い黄色：政党Xアカウント）
            36: { name: "自民党(X)", url: "https://x.com/jimin_koho" },
            37: { name: "維新(X)", url: "https://x.com/osaka_ishin" },
            38: { name: "中道改革(X)", url: "https://x.com/CRAJ2026" },
            39: { name: "国民民主(X)", url: "https://x.com/kokumin_koho" },
            40: { name: "参政党(X)", url: "https://x.com/sansei411" },
            41: { name: "共産党(X)", url: "https://x.com/jcp_cc" },
            42: { name: "チームみらい(X)", url: "https://x.com/team_mirai_jp" },
            43: { name: "れいわ(X)", url: "https://x.com/reiwashinsen" },
            44: { name: "保守党(X)", url: "https://x.com/hoshuto_jp" },
            45: { name: "社民党(X)", url: "https://x.com/SDPJapan" }
        };

        for (let i = 1; i <= 100; i++) {
            let label = `No.${i}`;
            let url = `link${i}.html`;
            let extraClass = "";

            if (i >= 1 && i <= 10) extraClass = " orange-btn";
            else if (i >= 16 && i <= 25) extraClass = " blue-btn";
            else if (i >= 26 && i <= 35) extraClass = " green-btn";
            else if (i >= 36 && i <= 45) extraClass = " yellow-btn";

            if (linkData[i]) {
                label = `No.${i}<span class="btn-title">${linkData[i].name}</span>`;
                url = linkData[i].url;
            }

            document.write(`<a href="${url}" class="link-btn${extraClass}" target="_blank">${label}</a>`);
        }
    </script>
</div>

<div class="footer-nav">
    <a href="index.html" class="back-btn">← 戻る（TOP）</a>
</div>

</body>
</html>
