<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links Dashboard</title>
    <style>
        body { 
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; 
            margin: 0; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a 60%);
            background-color: #020617; 
            background-attachment: fixed;
            text-align: center; 
            color: #f1f5f9; 
        }

        .header-container { 
            width: 100%; height: 80px; display: flex; align-items: center; justify-content: center;
            background: rgba(15, 23, 42, 0.8); border-bottom: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
        }

        .header-text h1 { margin: 0; font-size: 1.5rem; font-weight: 200; letter-spacing: 0.3em; color: #fff; }
        
        .link-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 12px; 
            max-width: 1100px; 
            margin: 30px auto; 
            padding: 20px; 
            box-sizing: border-box;
        }

        .link-btn {
            background: #fff;
            color: #007aff;
            border: 2px solid #007aff;
            padding: 10px 4px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 0.7rem;
            display: flex;
            flex-direction: column; 
            align-items: center;
            justify-content: center;
            height: 95px; 
            box-sizing: border-box;
            transition: 0.3s;
            overflow: hidden;
        }

        .btn-title { 
            font-size: 1.05rem; 
            font-weight: bold; 
            margin-top: 6px; 
            display: block;
            width: 100%;
            line-height: 1.1;
            word-break: break-all;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        /* カラー設定 */
        .orange-btn { background: #fff4e6; color: #d35400; border-color: #ffcc99; }
        .dark-orange-btn { background: #ffe0b2; color: #e65100; border-color: #fb8c00; font-weight: bold; } /* 濃いオレンジ */
        .blue-btn { background: #e1f5fe; color: #0277bd; border-color: #0277bd; }
        .green-btn { background: #e8f5e9; color: #2e7d32; border-color: #a5d6a7; }
        .yellow-btn { background: #fffde7; color: #827717; border-color: #fff176; }
        .purple-btn { background: #f3e5f5; color: #7b1fa2; border-color: #ce93d8; }
        .brown-btn { background: #efebe9; color: #5d4037; border-color: #bcaaa4; }
        .deep-blue-btn { background: #e0f2f1; color: #00796b; border-color: #4db6ac; }
        .red-btn { background: #ffebee; color: #c62828; border-color: #ef9a9a; }
        .dark-red-btn { background: #ffcdd2; color: #b71c1c; border-color: #d32f2f; font-weight: bold; } /* 濃い赤 */
        .tan-btn { background: #d7ccc8; color: #4e342e; border-color: #a1887f; }
        .black-btn { background: #333; color: #fff; border-color: #000; }

        .link-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 15px rgba(0,0,0,0.4); }

        @media (max-width: 900px) { .link-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 500px) { .link-grid { grid-template-columns: repeat(2, 1fr); } }

        .footer-nav { margin: 40px 0; }
        .back-btn { padding: 12px 40px; color: #ccc; text-decoration: none; border: 1px solid #444; border-radius: 30px; }
    </style>
</head>
<body>

<header class="header-container">
    <div class="header-text"><h1>Links Dashboard</h1></div>
</header>

<div class="link-grid">
    <script>
        const linkData = {
            1: { name: "公式サイト", url: "https://sanseito.jp/" },
            2: { name: "最新ニュース", url: "https://sanseito.jp/news/" },
            // ... (No.3-91は以前と同様)
            82: { name: "トヨタレンタカー", url: "https://rent.toyota.co.jp/" },
            83: { name: "ニッポンレンタカー", url: "https://www.nipponrentacar.co.jp/" },
            84: { name: "タイムズカー", url: "https://www.timescar-rental.com/en/" },
            85: { name: "オリックスレンタカー", url: "https://car.orix.co.jp/" },
            86: { name: "日産レンタカー", url: "https://nissan-rentacar.com/" },
            87: { name: "たびらい", url: "https://www.tabirai.net/car/" },
            88: { name: "楽天トラベル(RC)", url: "https://travel.rakuten.co.jp/cars/" },
            89: { name: "じゃらんRC", url: "https://www.jalan.net/rentacar/" },
            90: { name: "スカイチケット", url: "https://skyticket.jp/rentacar/" },
            91: { name: "ニコニコレンタカー", url: "https://www.2525r.com/" },
            92: { name: "駅レンタカー（JR公式）", url: "https://www.ekiren.co.jp/" },
            93: { name: "NEXCO東日本", url: "https://www.driveplaza.com/" },
            94: { name: "NEXCO西日本", url: "https://www.w-nexco.co.jp/" },
            95: { name: "道の駅", url: "https://www.michi-no-eki.jp/" },
            96: { name: "JAFナビ（優待検索）", url: "https://jafnavi.jp/" },
            97: { name: "食べログ", url: "https://tabelog.com/" },
            98: { name: "ホットペッパーグルメ", url: "https://www.hotpepper.jp/" },
            99: { name: "Retty（レッティ）", url: "https://retty.me/" },
            100: { name: "楽天ぐるなび", url: "https://gurunavi.com/ja" }
        };

        for (let i = 1; i <= 100; i++) {
            let extraClass = "";
            
            // 色分けロジックの確定
            if (i === 92) {
                extraClass = " red-btn"; // 駅レンタカーは赤
            } else if (i === 96) {
                extraClass = " dark-red-btn"; // JAFナビは濃い赤
            } else if (i >= 97 && i <= 100) {
                extraClass = " dark-orange-btn"; // グルメ系は濃いオレンジ
            } else if (i >= 1 && i <= 10) {
                extraClass = " orange-btn";
            } else if ((i >= 16 && i <= 25) || (i >= 66 && i <= 75)) {
                extraClass = " blue-btn";
            } else if ((i >= 26 && i <= 35) || i === 95) {
                extraClass = " green-btn"; // 政党系と道の駅は緑
            } else if (i >= 36 && i <= 45) {
                extraClass = " yellow-btn";
            } else if (i >= 46 && i <= 50) {
                extraClass = " purple-btn";
            } else if ((i >= 51 && i <= 53) || (i >= 76 && i <= 78)) {
                extraClass = " brown-btn";
            } else if (i >= 54 && i <= 62) {
                extraClass = " deep-blue-btn";
            } else if ((i >= 63 && i <= 65) || (i >= 82 && i <= 91)) {
                extraClass = " red-btn";
            } else if (i >= 79 && i <= 81) {
                extraClass = " tan-btn";
            } else if (i === 93 || i === 94) {
                extraClass = " black-btn"; // NEXCOは黒
            }

            let nameLabel = "";
            let url = `link${i}.html`;

            if (linkData[i]) {
                nameLabel = `<span class="btn-title">${linkData[i].name}</span>`;
                url = linkData[i].url;
            }

            document.write(`<a href="${url}" class="link-btn${extraClass}" target="_blank">No.${i}${nameLabel}</a>`);
        }
    </script>
</div>

<div class="footer-nav">
    <a href="index.html" class="back-btn">RETURN TO HOME</a>
</div>

</body>
</html>
