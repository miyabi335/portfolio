<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links 1-100 - Sakura Edition</title>
    <style>
        /* ページ全体の背景設定（桜色と模様） */
        body { 
            font-family: sans-serif; 
            margin: 0; 
            background-color: #fff0f5; /* 薄い桜色 */
            /* 桜の花びらをイメージした背景パターン（CSSで表現） */
            background-image: 
                radial-gradient(#ffc0cb 10%, transparent 20%),
                radial-gradient(#ffc0cb 10%, transparent 20%);
            background-position: 0 0, 50px 50px;
            background-size: 100px 100px;
            text-align: center; 
            color: #333; 
        }

        .header-container { 
            position: relative; 
            width: 100%; 
            height: 15vh; 
            overflow: hidden; 
            background: #ffb7c5; /* ヘッダーも桜色ベース */
        }
        .header-image { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            opacity: 0.5; /* 背景と馴染ませる */
        }
        .header-text { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            color: #fff; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3); 
        }
        
        .link-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 10px; 
            max-width: 1000px; 
            margin: 30px auto; 
            padding: 20px; 
            background: rgba(255, 255, 255, 0.4); /* グリッドの背景を少し白くして透かす */
            border-radius: 15px;
            backdrop-filter: blur(2px); /* 背景を少しぼかしてボタンを見やすく */
        }

        .link-btn {
            background: #fff;
            color: #007aff;
            border: 2px solid #007aff;
            padding: 12px 5px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.8em;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 70px;
            line-height: 1.4;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* 1-10番：薄い橙色 */
        .orange-btn { background: #fff4e6; color: #d35400; border-color: #ffcc99; }
        /* 16-25番：薄い水色 */
        .blue-btn { background: #e1f5fe; color: #0277bd; border-color: #0277bd; }
        /* 26-35番：薄いグリーン */
        .green-btn { background: #e8f5e9; color: #2e7d32; border-color: #a5d6a7; }
        /* 36-45番：薄い黄色 */
        .yellow-btn { background: #fffde7; color: #827717; border-color: #fff176; }

        .link-btn:hover { 
            opacity: 0.8; 
            transform: translateY(-3px); 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .btn-title { font-size: 1.1rem; font-weight: bold; display: block; }

        .footer-nav { margin: 40px 0; }
        .back-btn { 
            padding: 12px 40px; 
            background: #ff80ab; /* 戻るボタンも桜色に */
            color: #fff; 
            text-decoration: none; 
            border-radius: 25px; 
            font-weight: bold; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<header class="header-container">
    <img src="p1.jpg" alt="Header" class="header-image">
    <div class="header-text"><h1>LINKS 1-100</h1></div>
</header>

<div class="link-grid">
    <script>
        const linkData = {
            // 1-10番（薄い橙色）
            1: { name: "公式サイト", url: "https://sanseito.jp/" },
            2: { name: "最新ニュース", url: "https://sanseito.jp/news/" },
            3: { name: "イベント", url: "https://info.sanseito.jp/" },
            4: { name: "メンバー", url: "https://sanseito.jp/member/" },
            5: { name: "候補予定者", url: "https://sanseito.jp/2020/candidate/" },
            6: { name: "YouTube", url: "https://www.youtube.com/@sanseito-official" },
            7: { name: "X", url: "https://x.com/sansei411" },
            8: { name: "Instagram", url: "https://www.instagram.com/sanseito" },
            9: { name: "TikTok", url: "https://www.tiktok.com/@sanseito" },
            10: { name: "選挙ドットコム", url: "https://go2senkyo.com/articles/tag/%E5%8F%82%E6%94%BF%E5%85%9A" },
            
            // 16-25番（薄い水色）
            16: { name: "Yahoo Japan", url: "https://www.yahoo.co.jp/" },
            17: { name: "読売新聞", url: "https://www.yomiuri.co.jp/" },
            18: { name: "産経新聞", url: "https://www.sankei.com/" },
            19: { name: "朝日新聞", url: "https://www.asahi.com/" },
            20: { name: "毎日新聞", url: "https://mainichi.jp/" },
            21: { name: "NHK", url: "https://news.web.nhk/newsweb" },
            22: { name: "日経新聞", url: "https://www.nikkei.com/" },
            23: { name: "ロイター", url: "https://jp.reuters.com/" },
            24: { name: "CNN", url: "https://www.cnn.co.jp/" },
            25: { name: "BBC", url: "https://www.bbc.com/japanese" },

            // 26-35番（薄いグリーン：政党HP）
            26: { name: "自由民主党", url: "https://www.jimin.jp/" },
            27: { name: "日本維新の会", url: "https://o-ishin.jp/" },
            28: { name: "中道改革連合", url: "https://craj.jp/" },
            29: { name: "国民民主党", url: "https://new-kokumin.jp/" },
            30: { name: "参政党", url: "https://sanseito.jp/" },
            31: { name: "日本共産党", url: "https://www.jcp.or.jp/" },
            32: { name: "チームみらい", url: "https://team-mir.ai/" },
            33: { name: "れいわ新選組", url: "https://reiwa-shinsengumi.com/" },
            34: { name: "日本保守党", url: "https://hoshuto.jp/" },
            35: { name: "社会民主党", url: "https://sdp.or.jp/" },

            // 36-45番（薄い黄色：政党Xアカウント）
            36: { name: "自民党(X)", url: "https://x.com/jimin_koho" },
            37: { name: "維新(X)", url: "https://x.com/osaka_ishin" },
            38: { name: "中道改革(X)", url: "https://x.com/CRAJ2026" },
            39: { name: "国民民主(X)", url: "https://x.com/kokumin_koho" },
            40: { name: "参政党(X)", url: "https://x.com/sansei411" },
            41: { name: "共産党(X)", url: "https://x.com/jcp_cc" },
            42: { name: "チームみらい(X)", url: "https://x.com/team_mirai_jp" },
            43: { name: "れいわ(X)", url: "https://x.com/reiwashinsen" },
            44: { name: "保守党(X)", url: "https://x.com/hoshuto_jp" },
            45: { name: "社民党(X)", url: "https://x.com/SDPJapan" }
        };

        for (let i = 1; i <= 100; i++) {
            let label = `No.${i}`;
            let url = `link${i}.html`;
            let extraClass = "";

            if (i >= 1 && i <= 10) extraClass = " orange-btn";
            else if (i >= 16 && i <= 25) extraClass = " blue-btn";
            else if (i >= 26 && i <= 35) extraClass = " green-btn";
            else if (i >= 36 && i <= 45) extraClass = " yellow-btn";

            if (linkData[i]) {
                label = `No.${i}<span class="btn-title">${linkData[i].name}</span>`;
                url = linkData[i].url;
            }

            document.write(`<a href="${url}" class="link-btn${extraClass}" target="_blank">${label}</a>`);
        }
    </script>
</div>

<div class="footer-nav">
    <a href="index.html" class="back-btn">← 戻る（TOP）</a>
</div>

</body>
</html>
