<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links Dashboard - Final Stable Edition</title>
    <style>
        /* 背景：ダークモード */
        body { 
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; 
            margin: 0; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a 60%);
            background-color: #020617; 
            background-attachment: fixed;
            text-align: center; 
            color: #f1f5f9; 
        }

        .header-container { 
            width: 100%; height: 80px; display: flex; align-items: center; justify-content: center;
            background: rgba(15, 23, 42, 0.8); border-bottom: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
        }

        .header-text h1 { margin: 0; font-size: 1.5rem; font-weight: 200; letter-spacing: 0.3em; color: #fff; }
        
        .link-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); /* 5列を均等に */
            gap: 12px; 
            max-width: 1100px; 
            margin: 30px auto; 
            padding: 20px; 
            box-sizing: border-box;
        }

        .link-btn {
            background: #fff;
            color: #007aff;
            border: 2px solid #007aff;
            padding: 10px 4px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 0.75rem; /* No.i のサイズ */
            display: flex;
            flex-direction: column; /* 縦に並べる */
            align-items: center;
            justify-content: center;
            height: 80px; /* 高さを統一 */
            box-sizing: border-box;
            transition: 0.3s;
            overflow: hidden; /* はみ出し防止 */
        }

        /* サイト名のスタイル */
        .btn-title { 
            font-size: 0.85rem; 
            font-weight: bold; 
            margin-top: 4px; 
            display: block;
            width: 100%;
            white-space: nowrap; /* 1行に収める */
            overflow: hidden;
            text-overflow: ellipsis; /* 長い場合は「...」にする */
        }

        /* 各種カラー設定 */
        .orange-btn { background: #fff4e6; color: #d35400; border-color: #ffcc99; }
        .blue-btn { background: #e1f5fe; color: #0277bd; border-color: #0277bd; }
        .green-btn { background: #e8f5e9; color: #2e7d32; border-color: #a5d6a7; }
        .yellow-btn { background: #fffde7; color: #827717; border-color: #fff176; }
        .purple-btn { background: #f3e5f5; color: #7b1fa2; border-color: #ce93d8; }
        .brown-btn { background: #efebe9; color: #5d4037; border-color: #bcaaa4; }
        .deep-blue-btn { background: #e0f2f1; color: #00796b; border-color: #4db6ac; }
        .red-btn { background: #ffebee; color: #c62828; border-color: #ef9a9a; }
        .tan-btn { background: #d7ccc8; color: #4e342e; border-color: #a1887f; }

        .link-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 15px rgba(0,0,0,0.4); }

        .footer-nav { margin: 40px 0; }
        .back-btn { padding: 12px 40px; color: #ccc; text-decoration: none; border: 1px solid #444; border-radius: 30px; }

        /* 画面幅が狭い場合の対応 */
        @media (max-width: 900px) { .link-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 500px) { .link-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<header class="header-container">
    <div class="header-text"><h1>Links Dashboard</h1></div>
</header>

<div class="link-grid">
    <script>
        const linkData = {
            1: { name: "公式サイト", url: "https://sanseito.jp/" },
            16: { name: "Yahoo Japan", url: "https://www.yahoo.co.jp/" },
            26: { name: "自由民主党", url: "https://www.jimin.jp/" },
            36: { name: "自民党(X)", url: "https://x.com/jimin_koho" },
            46: { name: "ChatGPT", url: "https://chatgpt.com/" },
            47: { name: "Google Gemini", url: "https://gemini.google.com/app" },
            51: { name: "JRおでかけネット", url: "https://www.jr-odekake.net/" },
            54: { name: "羽田空港(HND)", url: "https://tokyo-haneda.com/" },
            63: { name: "GO（ゴー）", url: "https://go.goinc.jp/" },
            66: { name: "ANA", url: "https://www.ana.co.jp/" },
            67: { name: "JAL", url: "https://www.jal.co.jp/" },
            76: { name: "JTB", url: "https://www.jtb.co.jp/" },
            79: { name: "一休.com", url: "https://www.ikyu.com/" },
            81: { name: "Booking.com", url: "https://www.booking.com/" }
        };

        for (let i = 1; i <= 100; i++) {
            let extraClass = "";
            if (i >= 1 && i <= 10) extraClass = " orange-btn";
            else if ((i >= 16 && i <= 25) || (i >= 66 && i <= 75)) extraClass = " blue-btn";
            else if (i >= 26 && i <= 35) extraClass = " green-btn";
            else if (i >= 36 && i <= 45) extraClass = " yellow-btn";
            else if (i >= 46 && i <= 50) extraClass = " purple-btn";
            else if ((i >= 51 && i <= 53) || (i >= 76 && i <= 78)) extraClass = " brown-btn";
            else if (i >= 54 && i <= 62) extraClass = " deep-blue-btn";
            else if (i >= 63 && i <= 65) extraClass = " red-btn";
            else if (i >= 79 && i <= 81) extraClass = " tan-btn";

            let nameLabel = "";
            let url = `link${i}.html`;

            if (linkData[i]) {
                nameLabel = `<span class="btn-title">${linkData[i].name}</span>`;
                url = linkData[i].url;
            }

            document.write(`<a href="${url}" class="link-btn${extraClass}" target="_blank">No.${i}${nameLabel}</a>`);
        }
    </script>
</div>

<div class="footer-nav">
    <a href="index.html" class="back-btn">RETURN TO HOME</a>
</div>

</body>
</html>
