<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links 1-100</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f5f5f7; text-align: center; color: #333; }
        .header-container { position: relative; width: 100%; height: 15vh; overflow: hidden; background: #333; }
        .header-image { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .header-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.6); }
        
        /* 5列グリッド */
        .link-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 10px; 
            max-width: 1000px; 
            margin: 30px auto; 
            padding: 0 15px; 
        }

        .link-btn {
            background: #fff;
            color: #007aff;
            border: 2px solid #007aff;
            padding: 15px 5px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.85em;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 50px;
        }

        .link-btn:hover {
            background: #007aff;
            color: #fff;
        }

        .footer-nav { margin: 40px 0; }
        .back-btn { padding: 10px 30px; background: #666; color: #fff; text-decoration: none; border-radius: 20px; }
    </style>
</head>
<body>

<header class="header-container">
    <img src="p1.jpg" alt="Header" class="header-image">
    <div class="header-text"><h1>LINKS 1-100</h1></div>
</header>

<div class="link-grid">
    <script>
        const linkData = {
            1: { name: "公式サイト", url: "https://sanseito.jp/" },
            2: { name: "最新ニュース", url: "https://sanseito.jp/news/" },
            3: { name: "YouTube", url: "https://www.youtube.com/@sanseito-official" },
            4: { name: "X (Twitter)", url: "https://twitter.com/sansei411" },
            5: { name: "Instagram", url: "https://www.instagram.com/sanseito" },
            6: { name: "地方議員一覧", url: "https://sanseito.jp/member/" }
        };

        for (let i = 1; i <= 100; i++) {
            let label = `No.${i}`;
            let url = `link${i}.html`; // 基本は連番のhtmlへ

            // 1~6番までは特定の名前とURLを割り当て
            if (linkData[i]) {
                label = `No.${i}<br>${linkData[i].name}`;
                url = linkData[i].url;
            }

            document.write(`<a href="${url}" class="link-btn" target="_blank">${label}</a>`);
        }
    </script>
</div>

<div class="footer-nav">
    <a href="index.html" class="back-btn">← 戻る（TOP）</a>
</div>

</body>
</html>
