<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links Dashboard - Fixed Layout</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { 
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; 
            margin: 0; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a 60%);
            background-color: #020617; 
            background-attachment: fixed;
            text-align: center; 
            color: #f1f5f9; 
            overflow-x: hidden;
        }

        .header-container { 
            width: 100%; height: 80px; display: flex; align-items: center; justify-content: center;
            background: rgba(15, 23, 42, 0.8); border-bottom: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
        }

        .header-text h1 { margin: 0; font-size: 1.5rem; font-weight: 200; letter-spacing: 0.2em; color: #fff; }
        
        .link-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); /* 5列固定 */
            gap: 12px; 
            max-width: 1200px; 
            margin: 30px auto; 
            padding: 20px; 
            background: rgba(255, 255, 255, 0.02); 
            border-radius: 20px;
        }

        /* ボタンの構造を整理 */
        .link-btn {
            background: #fff; color: #333; border: 1.5px solid #ddd;
            padding: 15px 5px; border-radius: 12px; text-decoration: none;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 90px; /* 高さを確保 */
            box-sizing: border-box;
            transition: transform 0.2s;
        }

        /* アイコンサイズ */
        .link-btn i { font-size: 1.2rem; margin-bottom: 8px; }

        /* No. 部分のテキスト */
        .btn-no { font-size: 0.7rem; opacity: 0.7; margin-bottom: 2px; }

        /* サイト名 */
        .btn-title { 
            font-size: 0.85rem; 
            font-weight: bold; 
            line-height: 1.2;
            word-break: break-all; /* 長い単語で折返し */
            display: -webkit-box;
            -webkit-line-clamp: 2; /* 2行まで表示 */
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* カテゴリカラー */
        .orange-btn { background: #fff4e6; color: #d35400; border-color: #ffcc99; }
        .blue-btn { background: #e1f5fe; color: #0277bd; border-color: #81d4fa; }
        .green-btn { background: #e8f5e9; color: #2e7d32; border-color: #a5d6a7; }
        .yellow-btn { background: #fffde7; color: #827717; border-color: #fff176; }
        .purple-btn { background: #f3e5f5; color: #7b1fa2; border-color: #ce93d8; }
        .brown-btn { background: #efebe9; color: #5d4037; border-color: #bcaaa4; }
        .deep-blue-btn { background: #e0f2f1; color: #00796b; border-color: #4db6ac; }
        .red-btn { background: #ffebee; color: #c62828; border-color: #ef9a9a; }
        .tan-btn { background: #d7ccc8; color: #4e342e; border-color: #a1887f; }

        .link-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        .footer-nav { margin: 40px 0; }
        .back-btn { padding: 12px 40px; color: #ccc; text-decoration: none; border: 1px solid #444; border-radius: 30px; }

        /* スマホ対応（画面が狭いときは列を減らす） */
        @media (max-width: 800px) {
            .link-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 500px) {
            .link-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<header class="header-container">
    <div class="header-text"><h1>Links Dashboard</h1></div>
</header>

<div class="link-grid">
    <script>
        const linkData = {
            1: { name: "公式サイト", url: "https://sanseito.jp/", icon: "fa-solid fa-flag" },
            16: { name: "Yahoo Japan", url: "https://www.yahoo.co.jp/", icon: "fa-solid fa-newspaper" },
            26: { name: "自由民主党", url: "https://www.jimin.jp/", icon: "fa-solid fa-landmark" },
            46: { name: "ChatGPT", url: "https://chatgpt.com/", icon: "fa-solid fa-robot" },
            47: { name: "Google Gemini", url: "https://gemini.google.com/app", icon: "fa-solid fa-brain" },
            51: { name: "JRおでかけ", url: "https://www.jr-odekake.net/", icon: "fa-solid fa-train" },
            54: { name: "羽田空港", url: "https://tokyo-haneda.com/", icon: "fa-solid fa-plane-arrival" },
            63: { name: "GO", url: "https://go.goinc.jp/", icon: "fa-solid fa-taxi" },
            66: { name: "ANA", url: "https://www.ana.co.jp/", icon: "fa-solid fa-plane" },
            67: { name: "JAL", url: "https://www.jal.co.jp/", icon: "fa-solid fa-plane-up" },
            78: { name: "楽天トラベル", url: "https://travel.rakuten.co.jp/", icon: "fa-solid fa-suitcase-rolling" },
            79: { name: "一休.com", url: "https://www.ikyu.com/", icon: "fa-solid fa-hotel" }
        };

        for (let i = 1; i <= 100; i++) {
            let extraClass = "";
            let iconClass = "fa-solid fa-link"; // デフォルトアイコン

            // クラス割り当て
            if (i >= 1 && i <= 10) extraClass = " orange-btn";
            else if ((i >= 16 && i <= 25) || (i >= 66 && i <= 75)) {
                extraClass = " blue-btn";
                iconClass = "fa-solid fa-plane"; // 航空会社はデフォルト飛行機
            }
            else if (i >= 26 && i <= 35) extraClass = " green-btn";
            else if (i >= 36 && i <= 45) extraClass = " yellow-btn";
            else if (i >= 46 && i <= 50) {
                extraClass = " purple-btn";
                iconClass = "fa-solid fa-robot"; // AIはロボット
            }
            else if ((i >= 51 && i <= 53) || (i >= 76 && i <= 78)) {
                extraClass = " brown-btn";
                if (i <= 53) iconClass = "fa-solid fa-train";
            }
            else if (i >= 54 && i <= 62) {
                extraClass = " deep-blue-btn";
                iconClass = "fa-solid fa-plane-up";
            }
            else if (i >= 63 && i <= 65) {
                extraClass = " red-btn";
                iconClass = "fa-solid fa-taxi";
            }
            else if (i >= 79 && i <= 81) {
                extraClass = " tan-btn";
                iconClass = "fa-solid fa-bed";
            }

            let name = "";
            let url = `link${i}.html`;

            if (linkData[i]) {
                name = linkData[i].name;
                url = linkData[i].url;
                if (linkData[i].icon) iconClass = linkData[i].icon;
            }

            // 出力
            document.write(`
                <a href="${url}" class="link-btn${extraClass}" target="_blank">
                    <i class="${iconClass}"></i>
                    <span class="btn-no">No.${i}</span>
                    <span class="btn-title">${name}</span>
                </a>
            `);
        }
    </script>
</div>

<div class="footer-nav">
    <a href="index.html" class="back-btn">RETURN TO HOME</a>
</div>

</body>
</html>
