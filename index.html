<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miyabi's Portfolio</title>
    <style>
        body { font-family: "Meiryo", sans-serif; margin: 0; background: #f5f5f7; text-align: center; color: #333; }
        .header-container { position: relative; width: 100%; height: 35vh; overflow: hidden; background: #333; }
        .header-image { width: 100%; height: 100%; object-fit: cover; }
        .header-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.6); }
        
        .btn-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; max-width: 950px; margin: 25px auto; padding: 0 15px; }
        .nav-btn { background: #fff; color: #007aff; border: 2px solid #007aff; padding: 15px 5px; border-radius: 12px; text-decoration: none; font-weight: bold; display: flex; align-items: center; justify-content: center; font-size: 1.1em; transition: 0.2s; }
        .nav-btn.special { background: #fb8c00; color: #fff; border-color: #ef6c00; }

        .section-title { margin: 40px 0 10px 0; padding: 10px; background: #fff; border-bottom: 1px solid #ddd; font-size: 0.9em; letter-spacing: 0.1em; }

        .grid-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; max-width: 1200px; margin: 20px auto 40px auto; padding: 0 15px; }
        
        .item-wrapper { display: none; flex-direction: column; align-items: center; }
        .item-wrapper:nth-child(-n+8) { display: flex; } 

        .item-text { font-size: 0.85em; font-weight: bold; color: #ef6c00; margin-bottom: 8px; }
        .thumb-img { width: 100%; aspect-ratio: 3/4; object-fit: cover; border-radius: 15px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.1); transition: 0.3s; }
        .thumb-img:hover { transform: scale(1.03); }

        /* ライトボックス設定 */
        #overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); align-items: center; justify-content: center; z-index: 2000; 
        }
        #overlay-content { width: 90%; max-width: 900px; position: relative; }
        
        .close-btn { 
            position: fixed; top: 20px; right: 20px; color: #fff; font-size: 20px; 
            cursor: pointer; font-weight: bold; background: rgba(255,255,255,0.2); 
            padding: 8px 20px; border-radius: 30px; z-index: 2100;
        }
        .close-btn:hover { background: rgba(255,255,255,0.4); }

        #overlay-img, #overlay-video { width: 100%; border-radius: 10px; display: none; }
        #overlay-video { aspect-ratio: 16/9; }

        @media (max-width: 600px) { .grid-container, .btn-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<header class="header-container">
    <img src="fuji00001.jpg" alt="Header" class="header-image">
    <div class="header-text"><h1>MY PORTFOLIO</h1></div>
</header>

<nav class="btn-grid">
    <a href="#" class="nav-btn">No.1</a><a href="#" class="nav-btn">No.2</a><a href="#" class="nav-btn">No.3</a><a href="#" class="nav-btn">No.4</a><a href="#" class="nav-btn">No.5</a>
    <a href="#" class="nav-btn">No.6</a><a href="#" class="nav-btn">No.7</a><a href="#" class="nav-btn">No.8</a><a href="#" class="nav-btn">No.9</a><a href="#" class="nav-btn special">Links</a>
</nav>

<div class="section-title"><h3>PHOTO GALLERY</h3></div>
<div class="grid-container" id="photo-grid"></div>

<div class="section-title"><h3>VIDEO GALLERY</h3></div>
<div class="grid-container" id="video-grid"></div>

<div id="overlay" onclick="closeOverlay()">
    <span class="close-btn" onclick="closeOverlay()">× 閉じる</span>
    <div id="overlay-content" onclick="event.stopPropagation()">
        <img id="overlay-img" src="">
        <iframe id="overlay-video" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
</div>

<script>
    const photoIds = ["1494790108377-be9c29b29330", "1517841905240-472988babdf9", "1539571696357-5a69c17a67c6", "1524504388940-b1c1722653e1", "1515886657613-9f3515b0c78f", "1529626455594-4ff0802cfb7e", "1488426862026-3ee34a7d66df", "1531746020798-e6953c6e8e04"];
    const videoIds = ["G1hKzCkywM8", "a-8XiE7W7u4", "q2_c2_WfJFg", "BpITZk7sa8E", "UYmvFzDuO5k", "G1hKzCkywM8", "a-8XiE7W7u4", "q2_c2_WfJFg"];

    const pGrid = document.getElementById('photo-grid');
    photoIds.forEach((id, i) => {
        const div = document.createElement('div');
        div.className = 'item-wrapper';
        div.innerHTML = `<div class="item-text">Photo：${String(i+1).padStart(2,'0')}</div>
                         <img src="https://images.unsplash.com/photo-${id}?w=600&h=800&fit=crop" class="thumb-img" onclick="openPhoto(this.src)">`;
        pGrid.appendChild(div);
    });

    const vGrid = document.getElementById('video-grid');
    videoIds.forEach((id, i) => {
        const div = document.createElement('div');
        div.className = 'item-wrapper';
        div.innerHTML = `<div class="item-text">Video：${String(i+1).padStart(2,'0')}</div>
                         <img src="https://img.youtube.com/vi/${id}/mqdefault.jpg" class="thumb-img" onclick="openVideo('${id}')">`;
        vGrid.appendChild(div);
    });

    function openPhoto(src) {
        document.getElementById('overlay-img').src = src;
        document.getElementById('overlay-img').style.display = 'block';
        document.getElementById('overlay-video').style.display = 'none';
        document.getElementById('overlay').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function openVideo(id) {
        document.getElementById('overlay-video').src = `https://www.youtube.com/embed/${id}?autoplay=1`;
        document.getElementById('overlay-video').style.display = 'block';
        document.getElementById('overlay-img').style.display = 'none';
        document.getElementById('overlay').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closeOverlay() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('overlay-video').src = '';
        document.body.style.overflow = '';
    }
</script>
</body>
</html>
