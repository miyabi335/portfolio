<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Managed Portfolio</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f5f5f7; text-align: center; color: #333; }
        
        /* ■■■ ヘッダーのスタイル ■■■ */
        .header-container {
            position: relative;
            width: 100%;
            height: 40vh; /* 画面の高さの40%にする */
            overflow: hidden;
            background: #333; /* 画像がない時の背景色 */
        }
        .header-image {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 横長に引き伸ばさず、きれいに収める */
            object-position: center; /* 画像の中心を表示 */
        }
        .header-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .header-text h1 { margin: 0; font-size: 3em; letter-spacing: 4px; }

        .section-title { margin-top: 50px; padding: 10px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; padding: 20px; }
        .grid img { width: 100%; height: 200px; object-fit: cover; border-radius: 12px; cursor: pointer; transition: 0.2s; background: #eee; }
        .grid img:hover { transform: scale(1.03); }
        .v-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 20px; }
        .v-card { background: #000; border-radius: 15px; overflow: hidden; aspect-ratio: 16/9; }
        iframe { width: 100%; height: 100%; border: none; }
        #lb { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); align-items:center; justify-content:center; z-index:99; cursor: zoom-out; }
        #lb img { max-width:95%; max-height:95%; border-radius: 5px; }
    </style>
</head>
<body>

<header class="header-container">
    <img src="header.jpg" alt="Header Image" class="header-image">
    
    <div class="header-text">
        <h1>MY PORTFOLIO</h1>
        <p>Managed by iPhone & PC</p>
    </div>
</header>

<div class="section-title">
    <h2>GALLERY & VIDEOS</h2>
    <p>画像や動画のIDを書き換えるだけで更新完了！</p>
</div>

</div>
