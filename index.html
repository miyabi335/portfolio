<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miyabi's Portal - 完全版</title>
    <style>
        body { font-family: "Meiryo", sans-serif; margin: 0; background: #0f172a; text-align: center; color: #f1f5f9; }
        
        /* ヘッダー：富士山の写真を確実に表示 */
        .header-container { position: relative; width: 100%; height: 35vh; background: #333; overflow: hidden; }
        .header-image { width: 100%; height: 100%; object-fit: cover; }
        .header-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; text-shadow: 0 2px 15px rgba(0,0,0,0.8); width: 100%; font-size: 1.5rem; }

        .section-title { margin-top: 30px; padding: 10px; background: rgba(255,255,255,0.05); color: #94a3b8; font-weight: bold; font-size: 0.9rem; }

        /* ナビゲーション（No.1〜10） */
        .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; max-width: 950px; margin: 15px auto; padding: 0 10px; }
        .nav-btn { display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); color: #38bdf8; border: 1px solid #38bdf8; border-radius: 6px; text-decoration: none; font-size: 0.75rem; min-height: 40px; }
        .special-link { background: #fb8c00 !important; color: #fff !important; border: 1px solid #fff !important; }

        /* ★参政党ボタン：5個×2列（計10個）に固定 */
        .sansei-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); /* 5列固定 */
            gap: 10px; 
            max-width: 950px; 
            margin: 15px auto; 
            padding: 0 15px; 
        }
        .sansei-btn { 
            background: #fb8c00; color: #fff; text-decoration: none; border-radius: 8px; 
            font-weight: bold; font-size: 0.7rem; min-height: 50px;
            display: flex; align-items: center; justify-content: center; padding: 5px;
        }

        /* ★動画：2列に並べる */
        .video-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); /* 2列固定 */
            gap: 15px; 
            max-width: 900px; 
            margin: 15px auto; 
            padding: 0 15px; 
        }
        .video-thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 10px; border: 1px solid #333; }

        /* スマホでの調整（ボタンが小さくなりすぎるのを防ぐ） */
        @media (max-width: 600px) {
            .nav-grid { grid-template-columns: repeat(2, 1fr); }
            .sansei-grid { grid-template-columns: repeat(2, 1fr); } /* スマホは2列の方が見やすいですが、5列にしたい場合はここを消してください */
        }
    </style>
</head>
