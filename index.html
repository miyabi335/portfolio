<div id="overlay" onclick="closeOverlay()">
    <span class="close-btn" onclick="closeOverlay()">&times; 閉じる</span>
    <div id="overlay-content" onclick="event.stopPropagation()">
        <img id="overlay-img" src="">
        <iframe id="overlay-video" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
</div>

<style>
    /* 追加・修正したスタイル */
    #overlay { 
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
        background: rgba(0,0,0,0.95); align-items: center; justify-content: center; z-index: 2000; 
    }
    #overlay-content { width: 90%; max-width: 900px; }
    
    .close-btn { 
        position: absolute; top: 20px; right: 20px; color: #fff; font-size: 24px; 
        cursor: pointer; font-weight: bold; background: rgba(255,255,255,0.2); 
        padding: 5px 15px; border-radius: 30px; z-index: 2100;
    }
    .close-btn:hover { background: rgba(255,255,255,0.4); }

    #overlay-img, #overlay-video { width: 100%; border-radius: 10px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
    #overlay-video { aspect-ratio: 16/9; }
</style>

<script>
    // 修正した終了（閉じる）関数
    function closeOverlay() {
        const overlay = document.getElementById('overlay');
        const video = document.getElementById('overlay-video');
        const img = document.getElementById('overlay-img');

        overlay.style.display = 'none'; // 画面を隠す
        video.src = '';                // YouTubeの再生を強制終了
        video.style.display = 'none';
        img.style.display = 'none';
        
        // 背後のスクロール禁止を解除
        document.body.style.overflow = '';
    }

    // 写真を開くとき
    function openPhoto(src) {
        document.getElementById('overlay-img').src = src;
        document.getElementById('overlay-img').style.display = 'block';
        document.getElementById('overlay-video').style.display = 'none';
        document.getElementById('overlay').style.display = 'flex';
        document.body.style.overflow = 'hidden'; // 背後をスクロールさせない
    }

    // 動画を開くとき
    function openVideo(id) {
        document.getElementById('overlay-video').src = `https://www.youtube.com/embed/${id}?autoplay=1`;
        document.getElementById('overlay-video').style.display = 'block';
        document.getElementById('overlay-img').style.display = 'none';
        document.getElementById('overlay').style.display = 'flex';
        document.body.style.overflow = 'hidden'; // 背後をスクロールさせない
    }
</script>
