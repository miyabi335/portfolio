<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miyabi's Portal</title>
    <style>
        body { font-family: "Meiryo", sans-serif; margin: 0; background: #f5f5f7; text-align: center; color: #333; overflow-x: hidden; }
        .header-container { position: relative; width: 100%; height: 35vh; overflow: hidden; background: #333; }
        .header-image { width: 100%; height: 100%; object-fit: cover; }
        
        /* クリック判定用の見出し */
        .header-text { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.6); 
            cursor: pointer; user-select: none; 
        }
        
        .btn-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; max-width: 950px; margin: 25px auto; padding: 0 15px; }
        .nav-btn { background: #fff; color: #007aff; border: 2px solid #007aff; padding: 15px 5px; border-radius: 15px; text-decoration: none; font-weight: bold; font-size: 1.1em; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .nav-btn.special { background: #fb8c00; color: #fff; border-color: #ef6c00; }
        .nav-btn:hover { opacity: 0.8; transform: translateY(-1px); }

        .sub-nav-container { margin-bottom: 40px; }
        .sub-btn { background: #fff; color: #ef6c00; border: 2px solid #ffcc80; padding: 12px 0; border-radius: 12px; text-decoration: none; font-size: 0.9em; font-weight: bold; display: flex; align-items: center; justify-content: center; }

        .section-title { margin: 30px 0 15px 0; padding: 10px; background: #fff; border-bottom: 1px solid #ddd; font-size: 0.9em; }

        /* --- 管理者パネル（初期は非表示） --- */
        .admin-panel {
            display: none; /* ここで隠しています */
            margin: 20px auto; padding: 15px; max-width: 350px;
            background: #fff; border-radius: 10px; border: 2px dashed #ef6c00;
            animation: fadeIn 0.5s ease;
        }
        .admin-btn { background: #ef6c00; color: #fff; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }

        .photo-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; max-width: 1200px; margin: 20px auto 60px auto; padding: 0 15px; }
        .photo-item-wrapper { display: none; flex-direction: column; align-items: center; transition: 0.3s; animation: fadeIn 0.5s ease; }
        .photo-item-wrapper:nth-child(-n+4) { display: flex; } /* 最初は4枚 */

        .photo-text-above { font-size: 0.85em; font-weight: bold; color: #ef6c00; margin-bottom: 8px; }
        .photo-item { width: 100%; aspect-ratio: 3/4; object-fit: cover; border-radius: 15px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .photo-item-wrapper:hover { transform: scale(1.05); z-index: 10; }

        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; z-index: 1000; cursor: zoom-out; }
        #lightbox img { max-width: 90%; max-height: 90%; object-fit: contain; border-radius: 10px; animation: zoomIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        @media (max-width: 600px) {
            .btn-grid { grid-template-columns: repeat(2, 1fr); }
            .photo-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<header class="header-container">
    <img src="fuji00001.jpg" alt="Header" class="header-image">
    <div class="header-text" onclick="handleSecretClick()"><h1>MY PORTFOLIO</h1></div>
</header>

<div class="nav-container btn-grid">
    <a href="#" class="nav-btn">No.1</a><a href="#" class="nav-btn">No.2</a><a href="#" class="nav-btn">No.3</a><a href="#" class="nav-btn">No.4</a><a href="#" class="nav-btn">No.5</a>
    <a href="#" class="nav-btn">No.6</a><a href="#" class="nav-btn">No.7</a><a href="#" class="nav-btn">No.8</a><a href="#" class="nav-btn">No.9</a><a href="#" class="nav-btn special">Links</a>
</div>

<div class="section-title"><h3>参政党リンク</h3></div>
<div class="sub-nav-container btn-grid">
    <a href="https://sanseito.jp/" target="_blank" class="sub-btn">公式サイト</a>
    <a href="https://sanseito.jp/news/" target="_blank" class="sub-btn">最新ニュース</a>
    <a href="https://info.sanseito.jp/" target="_blank" class="sub-btn">イベント</a>
    <a href="https://sanseito.jp/member/" target="_blank" class="sub-btn">メンバー</a>
    <a href="https://sanseito.jp/2020/candidate/" target="_blank" class="sub-btn">候補予定者</a>
    <a href="https://www.youtube.com/@sanseito-official" target="_blank" class="sub-btn">YouTube</a>
    <a href="https://x.com/sansei411" target="_blank" class="sub-btn">X(Twitter)</a>
    <a href="https://www.instagram.com/sanseito" target="_blank" class="sub-btn">Instagram</a>
    <a href="https://www.tiktok.com/@sanseito" target="_blank" class="sub-btn">TikTok</a>
    <a href="https://go2senkyo.com/articles/tag/%E5%8F%82%E6%94%BF%E5%85%9A" target="_blank" class="sub-btn">選挙ドットコム</a>
</div>

<div class="section-title"><h3>MODEL GALLERY</h3></div>

<div class="admin-panel" id="secret-admin">
    <button class="admin-btn" id="admin-toggle-btn" onclick="togglePhotos()">管理者：写真を追加 (＋4枚)</button>
    <div style="font-size:0.8em; color:#666; margin-top:8px;" id="photo-status">現在：4枚 / 全20枚</div>
</div>

<div class="photo-grid" id="photo-grid">
    </div>

<div id="lightbox" onclick="closeLightbox()"><img id="lightbox-img" src=""></div>

<script>
    // 画像リスト（13枚目修正済み）
    const images = [
        "1494790108377-be9c29b29330", "1517841905240-472988babdf9", "1539571696357-5a69c17a67c6", "1524504388940-b1c1722653e1",
        "1515886657613-9f3515b0c78f", "1529626455594-4ff0802cfb7e", "1488426862026-3ee34a7d66df", "1531746020798-e6953c6e8e04",
        "1581382575275-97901c2635b7", "1544005313-94ddf0286df2", "1506794778202-cad84cf45f1d", "1500648767791-00dcc994a43e",
        "1619897225754-006c6501810e", /* 13枚目修正 */ "1507003211169-0a1dd7228f2d", "1519345182560-3f2917c472ef", "1492562080023-ab3db95bfbce",
        "1531123897727-8f129e1688ce", "1489424731084-a5d8b219a5bb", "1521119989659-a83eee488004", "1513094735237-8f2714d57c13"
    ];

    // グリッド生成
    const grid = document.getElementById('photo-grid');
    images.forEach((id, i) => {
        const wrap = document.createElement('div');
        wrap.className = 'photo-item-wrapper';
        wrap.innerHTML = `<div class="photo-text-above">モデル：${String(i+1).padStart(2,'0')}</div>
                          <img src="https://images.unsplash.com/photo-${id}?w=600&h=800&fit=crop" class="photo-item" onclick="openLightbox(this.src)">`;
        grid.appendChild(wrap);
    });

    // 隠しコマンド処理
    let clickCount = 0;
    function handleSecretClick() {
        clickCount++;
        if (clickCount === 3) {
            document.getElementById('secret-admin').style.display = 'block';
            clickCount = 0; // リセット
        }
    }

    // 写真展開（ロータリー式）
    let currentShown = 4;
    function togglePhotos() {
        const wrappers = document.querySelectorAll('.photo-item-wrapper');
        const btn = document.getElementById('admin-toggle-btn');
        if (currentShown < 20) {
            currentShown += 4;
            wrappers.forEach((w, i) => { if(i < currentShown) w.style.display = 'flex'; });
            if (currentShown === 20) btn.innerText = "管理者：1列目に戻す (4枚)";
        } else {
            currentShown = 4;
            wrappers.forEach((w, i) => { if(i >= 4) w.style.display = 'none'; });
            btn.innerText = "管理者：写真を追加 (＋4枚)";
        }
        document.getElementById('photo-status').innerText = `現在：${currentShown}枚 / 全20枚`;
    }

    function openLightbox(s) { document.getElementById('lightbox-img').src = s; document.getElementById('lightbox').style.display = 'flex'; document.body.style.overflow = 'hidden'; }
    function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; document.body.style.overflow = ''; }
</script>

</body>
</html>
