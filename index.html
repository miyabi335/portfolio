        body { font-family: sans-serif; margin: 0; background: #f5f5f7; text-align: center; color: #333; }
        .header-container { position: relative; width: 100%; height: 40vh; overflow: hidden; background: #333; }
        .header-image { width: 100%; height: 100%; object-fit: cover; }
        .header-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.6); }
        .nav-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-width: 900px; margin: 20px auto; padding: 0 15px; }
        .nav-btn { background: #fff; color: #007aff; border: 2px solid #007aff; padding: 10px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 0.8em; }
        .section-title { margin-top: 40px; padding: 15px; background: #fff; border-bottom: 1px solid #ddd; }
        
        /* 写真グリッド */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; padding: 15px; }
        .grid img { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; cursor: pointer; background: #eee; transition: opacity 0.2s; }
        .grid img:hover { opacity: 0.8; }

        .v-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; padding: 15px; }
        .v-card { background: #000; border-radius: 12px; overflow: hidden; aspect-ratio: 16/9; }
        iframe { width: 100%; height: 100%; border: none; }
        #lb { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); align-items:center; justify-content:center; z-index:999; }
        #lb img { max-width:95%; max-height:95%; object-fit: contain; }
    </style>
</head>
