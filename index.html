<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Managed Portfolio Pro 48</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f5f5f7; text-align: center; color: #333; }
        
        /* ヘッダー */
        .header-container { position: relative; width: 100%; height: 45vh; overflow: hidden; background: #333; }
        .header-image { width: 100%; height: 100%; object-fit: cover; }
        .header-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.6); }
        .header-text h1 { margin: 0; font-size: 3em; letter-spacing: 4px; }

        /* ナビゲーション */
        .nav-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-width: 900px; margin: 20px auto; padding: 0 15px; }
        .nav-btn { background: #fff; color: #007aff; border: 2px solid #007aff; padding: 12px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 0.8em; transition: 0.3s; }
        .nav-btn:hover { background: #007aff; color: #fff; }

        .section-title { margin-top: 40px; padding: 15px; background: #fff; border-bottom: 1px solid #ddd; }
        
        /* 写真グリッド (48枚対応) */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; padding: 15px; }
        .grid img { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; cursor: pointer; background: #eee; transition: 0.2s; }
        .grid img:hover { transform: scale(1.05); z-index: 10; }

        /* 動画グリッド (50本対応) */
        .v-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; padding: 15px; }
        .v-card { background: #000; border-radius: 12px; overflow: hidden; aspect-ratio: 16/9; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        iframe { width: 100%; height: 100%; border: none; }

        /* 拡大表示 */
        #lb { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); align-items:center; justify-content:center; z-index:999; cursor: zoom-out; }
        #lb img { max-width:95%; max-height:95%; border-radius: 5px; animation: zoom 0.3s; }
        @keyframes zoom { from { transform: scale(0.8); } to { transform: scale(1); } }
    </style>
</head>
<body>

<header class="header-container">
    <img src="header.jpg" alt="Header" class="header-image">
    <div class="header-text"><h1>MY PORTFOLIO</h1></div>
</header>

<div class="nav-container">
    <a href="no1.html" class="nav-btn">No.1(Links)</a>
    <a href="no2.html" class="nav-btn">No.2</a><a href="no3.html" class="nav-btn">No.3</a>
    <a href="no4.html" class="nav-btn">No.4</a><a href="no5.html" class="nav-btn">No.5</a>
    <a href="no6.html" class="nav-btn">No.6</a><a href="no7.html" class="nav-btn">No.7</a>
    <a href="no8.html" class="nav-btn">No.8</a><a href="no9.html" class="nav-btn">No.9</a>
    <a href="no10.html" class="nav-btn">No.10</a>
</div>

<div class="section-title"><h2>PHOTOS (48)</h2></div>
<div class="grid">
    <script>
        for(let i=1; i<=48; i++) {
            document.write(`<img src="p${i}.jpg" alt="Photo ${i}" onclick="openLb(this.src)" onerror="this.style.display='none'">`);
        }
    </script>
</div>

<div class="section-title"><h2>VIDEOS (50)</h2></div>
<div class="v-grid">
    <script>
        for(let i=1; i<=50; i++) {
            // IDは後で個別に書き換えやすいよう、あえてループせず手動で並べるのが基本ですが、
            // 枠だけ一気に作る場合は以下のようになります。
            document.write(`<div class="v-card"><iframe src="https://www.youtube.com/embed/動画ID${i}"></iframe></div>`);
        }
    </script>
</div>

<div id="lb" onclick="this.style.display='none'"><img id="lbi"></div>

<script>
    function openLb(s){ 
        document.getElementById('lbi').src = s; 
        document.getElementById('lb').style.display = 'flex'; 
    }
</script>

<footer><p>&copy; 2026 Managed Portfolio Max 48</p></footer>

</body>
</html>
