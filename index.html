<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIYABI'S PORTAL</title>
    <style>
        :root {
            --bg-color: #020617;
            --card-bg: rgba(30, 41, 59, 0.5);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-blue: #38bdf8;
            --accent-orange: #fb8c00;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; }
        
        body { 
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
            margin: 0; background: var(--bg-color); color: var(--text-primary); 
            line-height: 1.6; overflow-x: hidden;
        }

        /* Header */
        .header-container { 
            width: 100%; padding: 60px 20px; 
            background: linear-gradient(to bottom, #000, var(--bg-color));
            border-bottom: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }
        .header-image-wrapper { max-width: 900px; margin: 0 auto; }
        .header-image { 
            width: 100%; height: auto; border-radius: 16px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }
        .header-image:hover { transform: scale(1.02); }
        .header-text h1 { 
            font-size: clamp(1.5rem, 5vw, 2.5rem); 
            letter-spacing: 0.4em; margin: 30px 0 0; font-weight: 300;
        }

        /* Layout */
        .main-wrapper { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        
        .featured-section { margin-bottom: 60px; }
        .video-player-wrapper { 
            position: relative; width: 100%; aspect-ratio: 16/9; 
            border-radius: 20px; overflow: hidden; 
            box-shadow: 0 0 30px rgba(251, 140, 0, 0.2);
            border: 1px solid rgba(251, 140, 0, 0.3);
        }
        .video-player-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* Section Titles */
        .section-title { 
            margin: 60px 0 25px; padding-bottom: 15px; 
            font-size: 1.25rem; font-weight: 700; letter-spacing: 0.1em;
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            display: flex; align-items: center; gap: 10px;
        }
        .section-title::before { content: ""; width: 4px; height: 1.2em; background: var(--accent-blue); border-radius: 2px; }
        .section-title.sansei { color: var(--accent-orange); border-bottom-color: rgba(251, 140, 0, 0.3); }
        .section-title.sansei::before { background: var(--accent-orange); }

        /* Grid System */
        .grid-container { 
            display: grid; gap: 15px; margin-bottom: 40px; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        }
        .grid-archive {
            display: grid; gap: 15px; margin-bottom: 40px;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        }

        /* Buttons */
        .nav-btn, .sansei-btn { 
            display: flex; align-items: center; justify-content: center; 
            padding: 15px; border-radius: 10px; text-decoration: none; 
            font-size: 0.9rem; font-weight: 600; min-height: 60px; 
            text-align: center; transition: all 0.2s ease;
        }
        .nav-btn { 
            background: var(--card-bg); color: var(--accent-blue); 
            border: 1px solid rgba(56, 189, 248, 0.2); 
        }
        .nav-btn:hover { background: rgba(56, 189, 248, 0.2); transform: translateY(-3px); }

        .sansei-btn { background: var(--accent-orange); color: #fff; }
        .sansei-btn:hover { filter: brightness(1.1); transform: translateY(-3px); box-shadow: 0 5px 15px rgba(251, 140, 0, 0.3); }

        /* Media Items */
        .media-item { 
            width: 100%; border-radius: 10px; cursor: pointer; 
            transition: all 0.3s ease; object-fit: cover;
            background: #1e293b;
        }
        .media-item:hover { transform: scale(1.05); filter: brightness(1.1); z-index: 2; }
        .photo-item { aspect-ratio: 1/1; }
        .video-item { aspect-ratio: 16/9; }

        /* Overlay */
        #overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); align-items: center; justify-content: center; 
            z-index: 10000; backdrop-filter: blur(8px);
        }
        #overlay-content { width: 90%; max-width: 1000px; }
        .close-btn { 
            margin-top: 30px; background: var(--danger); color: #fff; border: none; 
            padding: 12px 50px; border-radius: 30px; cursor: pointer; 
            font-weight: bold; transition: opacity 0.2s;
        }
        .close-btn:hover { opacity: 0.8; }

        footer { margin: 80px 0 40px; color: var(--text-secondary); font-size: 0.8rem; text-align: center; }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .grid-container { grid-template-columns: repeat(2, 1fr); }
            .section-title { font-size: 1.1rem; }
        }
    </style>
</head>

<div id="overlay" onclick="closeOverlay()">
    <div id="overlay-content" onclick="event.stopPropagation()">
        <div class="video-player-wrapper">
            <iframe id="overlay-video" src="" allow="autoplay; fullscreen"></iframe>
        </div>
        <div style="text-align: center;">
            <button class="close-btn" onclick="closeOverlay()">CLOSE PLAYER</button>
        </div>
    </div>
</div>

<script>
    function openVideo(id) {
        const overlay = document.getElementById('overlay');
        const iframe = document.getElementById('overlay-video');
        iframe.src = "https://www.youtube.com/embed/" + id + "?autoplay=1";
        overlay.style.display = 'flex';
        document.body.style.overflow = 'hidden'; // 背景スクロール防止
    }
    
    function closeOverlay() {
        const overlay = document.getElementById('overlay');
        const iframe = document.getElementById('overlay-video');
        overlay.style.display = 'none';
        iframe.src = '';
        document.body.style.overflow = 'auto'; // スクロール再開
    }

    // Escキーで閉じる機能
    document.addEventListener('keydown', (e) => {
        if (e.key === "Escape") closeOverlay();
    });
</script>
