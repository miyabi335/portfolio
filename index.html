<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Miyabi's Hobby Space</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 900px; margin: 0 auto; padding: 20px; background-color: #f4f7f6; color: #333; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { text-align: center; color: #2c3e50; border-bottom: 3px solid #2ea44f; padding-bottom: 10px; }
        h2 { color: #2ea44f; margin-top: 30px; border-left: 5px solid #2ea44f; padding-left: 15px; }
        .content-box { margin-bottom: 40px; text-align: center; }
        img, video { width: 100%; max-width: 600px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-top: 10px; }
        .links { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .links a { background: #2ea44f; color: white; padding: 10px 20px; border-radius: 25px; text-decoration: none; font-weight: bold; }
        .links a:hover { background: #227d3c; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Miyabi's Hobby Space</h1>
        <p style="text-align:center;">写真・動画・お気に入りリンク集</p>

        <div class="content-box">
            <h2>📸 お気に入りの写真</h2>
            <img src="ここに画像ファイル名.jpg" alt="趣味の写真">
            <p>※複数の場合はこの下に img タグを増やせます</p>
        </div>

        <div class="content-box">
            <h2>🎥 おすすめ動画</h2>
            <video src="ここに動画ファイル名.mp4" controls></video>
            
            <div style="margin-top:20px;">
                <iframe width="100%" height="315" src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>

        <div class="content-box">
            <h2>🔗 お気に入りリンク</h2>
            <div class="links">
                <a href="https://google.com" target="_blank">Google</a>
                <a href="https://github.com/miyabi335" target="_blank">My GitHub</a>
                <a href="https://www.adobe.com/jp/products/photoshop.html" target="_blank">Photoshop</a>
            </div>
        </div>
    </div>

</body>
</html>
