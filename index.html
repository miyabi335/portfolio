<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miyabi's Portal - Interactive Gallery</title>
    <style>
        body { font-family: "Meiryo", sans-serif; margin: 0; background: #0f172a; text-align: center; color: #f1f5f9; padding-bottom: 50px; }
        
        /* ヘッダー */
        .header-container { position: relative; width: 100%; height: 35vh; background: #333; overflow: hidden; }
        .header-image { width: 100%; height: 100%; object-fit: cover; }
        .header-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; text-shadow: 0 2px 15px rgba(0,0,0,0.8); width: 100%; }
        
        .section-title { margin-top: 40px; padding: 12px; background: rgba(255,255,255,0.05); color: #94a3b8; font-weight: bold; }

        /* ナビゲーション */
        .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-width: 950px; margin: 20px auto; padding: 0 15px; }
        .nav-btn { display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); color: #38bdf8; border: 1px solid #38bdf8; border-radius: 8px; text-decoration: none; font-size: 0.8rem; min-height: 45px; transition: 0.2s; }
        .special-link { background: #fb8c00 !important; color: #fff !important; border: 1px solid #fff !important; }

        /* 参政党ボタン：5個×2列 */
        .sansei-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-width: 950px; margin: 20px auto; padding: 0 15px; }
        .sansei-btn { background: #fb8c00; color: #fff; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 0.7rem; min-height: 50px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }

        /* ギャラリー共通：4枚×2列 */
        .gallery-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; max-width: 1100px; margin: 20px auto; padding: 0 15px; }
        
        .thumb-img, .thumb-video { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 12px; border: 2px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s; }
        .thumb-img:hover, .thumb-video:hover { transform: scale(1.05); border-color: #fb8c00; }

        /* モーダル（拡大・再生画面） */
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; flex-direction: column; }
        #modal-content { max-width: 90%; max-height: 80%; border-radius: 8px; }
        #modal-video { width: 80%; aspect-ratio: 16/9; display: none; }
        .close-btn { margin-top: 20px; background: #ef4444; color: white; border: none; padding: 10px 30px; border-radius: 20px; cursor: pointer; font-weight: bold; }

        @media (max-width: 768px) { .nav-grid, .sansei-grid, .gallery-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<div id="modal-overlay" onclick="closeModal()">
    <img id="modal-content" src="">
    <iframe id="modal-video" frameborder="0" allowfullscreen></iframe>
    <button class="close-btn">× 閉じる</button>
</div>

<script>
    function openPhoto(src) {
        document.getElementById('modal-overlay').style.display = 'flex';
        document.getElementById('modal-content').style.display = 'block';
        document.getElementById('modal-video').style.display = 'none';
        document.getElementById('modal-content').src = src;
    }
    function openVideo(id) {
        document.getElementById('modal-overlay').style.display = 'flex';
        document.getElementById('modal-content').style.display = 'none';
        document.getElementById('modal-video').style.display = 'block';
        document.getElementById('modal-video').src = "https://www.youtube.com/embed/" + id + "?autoplay=1";
    }
    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
        document.getElementById('modal-video').src = "";
    }
</script>

</body>
