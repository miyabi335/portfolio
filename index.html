<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miyabi's Portfolio Portal</title>
    <style>
        body { font-family: "Meiryo", sans-serif; margin: 0; background: #0f172a; text-align: center; color: #f1f5f9; }
        
        /* ヘッダー：富士山を復活 */
        .header-container { position: relative; width: 100%; height: 35vh; overflow: hidden; background: #333; }
        .header-image { width: 100%; height: 100%; object-fit: cover; }
        .header-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; text-shadow: 0 2px 15px rgba(0,0,0,0.8); width: 100%; }
        .header-text h1 { margin: 0; font-size: 2.2rem; }

        .section-title { margin-top: 40px; padding: 12px; background: rgba(255,255,255,0.05); font-weight: bold; color: #94a3b8; }

        /* ナビゲーション */
        .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-width: 950px; margin: 20px auto; padding: 0 15px; }
        .nav-btn { display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); color: #38bdf8; border: 1px solid #38bdf8; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 0.85em; min-height: 45px; transition: 0.2s; }
        .nav-btn:hover { background: rgba(56, 189, 248, 0.2); transform: translateY(-2px); }

        /* No.10専用：オレンジ色 */
        .special-link { background: #fb8c00 !important; color: #fff !important; border: 2px solid #fff !important; }

        /* 動画ギャラリー復活 */
        .grid-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; max-width: 1100px; margin: 20px auto; padding: 0 15px; }
        .thumb-media { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); }

        @media (max-width: 768px) { .nav-grid, .grid-container { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<header class="header-container">
    <img src="fuji00001.jpg" alt="富士山" class="header-image">
    <div class="header-text"><h1>MIYABI'S PORTAL</h1></div>
</header>

<div class="section-title">NAVIGATION MENU</div>
<nav class="nav-grid">
    <a href="#" class="nav-btn">No.1</a>
    <a href="#" class="nav-btn">No.2</a>
    <a href="#" class="nav-btn">No.3</a>
    <a href="#" class="nav-btn">No.4</a>
    <a href="#" class="nav-btn">No.5</a>
    <a href="#" class="nav-btn">No.6</a>
    <a href="#" class="nav-btn">No.7</a>
    <a href="#" class="nav-btn">No.8</a>
    <a href="#" class="nav-btn">No.9</a>
    <a href="no10.html" class="nav-btn special-link">Links集 (No.10)</a>
</nav>

<div class="section-title">VIDEO ARCHIVE</div>
<div class="grid-container">
    <img src="https://img.youtube.com/vi/G1hKzCkywM8/mqdefault.jpg" class="thumb-media">
    <img src="https://img.youtube.com/vi/a-8XiE7W7u4/mqdefault.jpg" class="thumb-media">
    <img src="https://img.youtube.com/vi/q2_c2_WfJFg/mqdefault.jpg" class="thumb-media">
    <img src="https://img.youtube.com/vi/BpITZk7sa8E/mqdefault.jpg" class="thumb-media">
</div>

<p style="margin-top: 50px; color: #475569; font-size: 0.8rem;">&copy; 2026 Miyabi's Hobby Space</p>

</body>
</html>
