<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miyabi's Portal - Perfect Gallery</title>
    <style>
        body { font-family: "Meiryo", sans-serif; margin: 0; background: #0f172a; text-align: center; color: #f1f5f9; padding-bottom: 50px; overflow-x: hidden; }
        
        /* ヘッダー */
        .header-container { position: relative; width: 100%; height: 35vh; background: #333; overflow: hidden; }
        .header-image { width: 100%; height: 100%; object-fit: cover; }
        .header-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; text-shadow: 0 2px 15px rgba(0,0,0,0.8); width: 100%; }
        .header-text h1 { margin: 0; font-size: 2.2rem; }

        .section-title { margin-top: 40px; padding: 12px; background: rgba(255,255,255,0.05); color: #94a3b8; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.1); }

        /* ナビゲーション */
        .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-width: 950px; margin: 20px auto; padding: 0 15px; }
        .nav-btn { display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); color: #38bdf8; border: 1px solid #38bdf8; border-radius: 8px; text-decoration: none; font-size: 0.8rem; min-height: 45px; transition: 0.2s; font-weight: bold; }
        .nav-btn:hover { background: rgba(56, 189, 248, 0.2); transform: translateY(-2px); }
        .special-link { background: #fb8c00 !important; color: #fff !important; border: 2px solid #fff !important; }

        /* 参政党ボタン：5個×2列 */
        .sansei-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-width: 950px; margin: 20px auto; padding: 0 15px; }
        .sansei-btn { background: #fb8c00; color: #fff; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 0.7rem; min-height: 50px; display: flex; align-items: center; justify-content: center; transition: 0.2s; padding: 5px; }
        .sansei-btn:hover { background: #ef6c00; transform: translateY(-2px); }

        /* ギャラリー共通：4枚×2列 */
        .gallery-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; max-width: 1100px; margin: 20px auto; padding: 0 15px; }
        
        /* ★サムネイル修正：全体が入るように (contain) */
        .thumb-img, .thumb-video { 
            width: 100%; 
            aspect-ratio: 16/9; 
            object-fit: contain; /* 全体を表示 */
            background: #000; /* 余白を黒に */
            border-radius: 12px; 
            border: 2px solid rgba(255,255,255,0.1); 
            cursor: pointer; 
            transition: 0.3s; 
        }
        .thumb-img:hover, .thumb-video:hover { transform: scale(1.05); border-color: #fb8c00; box-shadow: 0 0 15px rgba(251, 140, 0, 0.5); }

        /* ★モーダル修正：画像を大きく表示 */
        #modal-overlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); 
            z-index: 10000; 
            align-items: center; 
            justify-content: center; 
            flex-direction: column; 
            padding: 20px;
            box-sizing: border-box;
        }
        
        /* 拡大画像：画面いっぱいに */
        #modal-content { 
            max-width: 100%; 
            max-height: 90vh; /* 画面の高さの90%まで */
            object-fit: contain; /* アスペクト比を維持 */
            border-radius: 8px; 
            box-shadow: 0 0 30px rgba(251, 140, 0, 0.3);
        }
        
        /* 動画：大きく */
        #modal-video { 
            width: 90%; 
            max-width: 1200px;
            aspect-ratio: 16/9; 
            display: none; 
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(251, 140, 0, 0.3);
        }
        
        .close-btn { 
            margin-top: 15px; 
            background: #ef4444; 
            color: white; 
            border: none; 
            padding: 12px 40px; 
            border-radius: 30px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1rem;
            transition: 0.2s;
        }
        .close-btn:hover { background: #dc2626; }

        @media (max-width: 768px) { .nav-grid, .sansei-grid, .gallery-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<header class="header-container">

    <img src="https://img.youtube.com/vi/G1hKzCkyM8/maxresdefault.jpg" class="thumb-video" onclick="openVideo('G1hKzCkyM8')">
    <img src="https://img.youtube.com/vi/a-8XiE7W7u4/maxresdefault.jpg" class="thumb-video" onclick="openVideo('a-8XiE7W7u4')">

    <img src="https://img.youtube.com/vi/G1hKzCkyM8/maxresdefault.jpg" class="thumb-video" onclick="openVideo('G1hKzCkyM8')">

<div id="modal-overlay" onclick="closeModal()">
    <img id="modal-content" src="">
    <iframe id="modal-video" frameborder="0" allow="autoplay; fullscreen" allowfullscreen></iframe>
    <button class="close-btn" onclick="closeModal()">× 閉じて戻る</button>
</div>

<script>
    // 写真を開く
    function openPhoto(src) {
        // 高画質な画像を取得するためにURLを調整（w=1200）
        const highResSrc = src.replace('w=400', 'w=1200');
        document.getElementById('modal-overlay').style.display = 'flex';
        document.getElementById('modal-content').style.display = 'block';
        document.getElementById('modal-video').style.display = 'none';
        document.getElementById('modal-content').src = highResSrc;
        document.body.style.overflow = 'hidden'; // 背後のスクロールを禁止
    }
    
    // 動画を開く
    function openVideo(id) {
        document.getElementById('modal-overlay').style.display = 'flex';
        document.getElementById('modal-content').style.display = 'none';
        document.getElementById('modal-video').style.display = 'block';
        // ★動画リンクの修正：正しい埋め込み形式
        document.getElementById('modal-video').src = "https://www.youtube.com/embed/" + id + "?autoplay=1&rel=0";
        document.body.style.overflow = 'hidden'; // 背後のスクロールを禁止
    }
    
    // モーダルを閉じる
    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
        document.getElementById('modal-video').src = ""; // 動画を停止
        document.body.style.overflow = ''; // スクロールを許可
    }

    // エラーハンドリング：サムネイルがない場合は中解像度にフォールバック
    document.querySelectorAll('.thumb-video').forEach(img => {
        img.onerror = function() {
            if (this.src.includes('maxresdefault.jpg')) {
                this.src = this.src.replace('maxresdefault.jpg', 'mqdefault.jpg');
            }
        };
    });
</script>
