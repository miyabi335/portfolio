<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIYABI'S PORTAL</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: "Helvetica Neue", Arial, sans-serif;
            margin: 0; background: #020617; text-align: center; color: #e2e8f0; overflow-x: hidden;
        }
        .header-container { width: 100%; padding: 40px 0; background: #000; border-bottom: 1px solid #1e293b; }
        .header-image-wrapper { max-width: 800px; margin: 0 auto; padding: 0 20px; }
        .header-image { width: 100%; height: auto; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .header-text h1 { font-size: 2.5rem; letter-spacing: 0.3em; margin: 20px 0 0; color: #fff; }

        .main-wrapper { max-width: 1200px; margin: 0 auto; padding: 0 20px; text-align: left; }
        .featured-section { margin: 40px 0; width: 100%; text-align: center; }
        .video-player-wrapper { position: relative; width: 100%; aspect-ratio: 16/9; border-radius: 15px; overflow: hidden; border: 2px solid rgba(251, 140, 0, 0.5); }
        .video-player-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .section-title { margin: 60px 0 20px; padding: 10px 0; font-weight: bold; font-size: 1.5rem; color: #f8fafc; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .section-title.sansei { color: #fb8c00; border-bottom-color: rgba(251, 140, 0, 0.4); }

        .grid-5col { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-bottom: 30px; }
        .grid-4col { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 30px; }

        .nav-btn, .sansei-btn { display: flex; align-items: center; justify-content: center; padding: 15px 5px; border-radius: 8px; text-decoration: none; font-weight: bold; min-height: 70px; text-align: center; }
        .nav-btn { background: rgba(56, 189, 248, 0.1); color: #38bdf8; border: 1px solid rgba(56, 189, 248, 0.3); }
        .sansei-btn { background: #fb8c00; color: #fff; border: none; }

        .photo-item, .video-item { width: 100%; aspect-ratio: 4/3; object-fit: cover; border-radius: 8px; cursor: pointer; }
        .video-item { aspect-ratio: 16/9; }

        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; z-index: 10000; }
        #overlay-content { width: 90%; max-width: 1200px; text-align: center; }
        #overlay-video { width: 100%; aspect-ratio: 16/9; }
        .close-btn { margin-top: 20px; background: #ef4444; color: #fff; border: none; padding: 10px 40px; border-radius: 20px; cursor: pointer; }

        @media (max-width: 900px) { .grid-5col, .grid-4col { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<header class="header-container">
    <div class="header-image-wrapper">
        <img src="portfolio/photosa/head02.png" alt="HEADER" class="header-image" onerror="this.src='head02.png';">
    </div>
    <div class="header-text"><h1>MIYABI'S PORTAL</h1></div>
</header>

<div class="main-wrapper">
    <div class="featured-section">
        <div class="video-player-wrapper">
            <iframe src="https://www.youtube.com/embed/UvdvU_bHKM0?autoplay=1&mute=1" allowfullscreen></iframe>
        </div>
    </div>

    <div class="section-title">NAVIGATION MENU</div>
    <nav class="grid-5col">
        <div class="nav-btn">No.1</div><div class="nav-btn">No.2</div><div class="nav-btn">No.3</div>
        <a href="no4.html" class="nav-btn">Music</a><div class="nav-btn">No.5</div>
        <a href="https://www.gov-online.go.jp/governmentlinks/" target="_blank" class="nav-btn">官公庁</a>
        <a href="https://www.j-lis.go.jp/spd/map-search/cms_1069.html" target="_blank" class="nav-btn">自治体</a>
        <a href="https://uub.jp/map/kyoto/" target="_blank" class="nav-btn">地図</a><div class="nav-btn">No.9</div>
        <a href="no10.html" class="nav-btn" style="color:#fb8c00; border-color:#fb8c00;">Links集</a>
    </nav>

    <div class="section-title sansei">SANSEITO AREA</div>
    <div class="grid-5col">
        <a href="https://sanseito.jp/" target="_blank" class="sansei-btn">公式サイト</a>
        <a href="https://sanseito.jp/news/" target="_blank" class="sansei-btn">ニュース</a>
        <a href="https://info.sanseito.jp/" target="_blank" class="sansei-btn">イベント</a>
        <a href="https://sanseito.jp/member/" target="_blank" class="sansei-btn">メンバー</a>
        <a href="https://sanseito.jp/2020/candidate/" target="_blank" class="sansei-btn">候補予定者</a>
        <a href="https://www.youtube.com/@sanseito-official" target="_blank" class="sansei-btn">YouTube</a>
        <a href="https://x.com/sansei411" target="_blank" class="sansei-btn">X</a>
        <a href="https://www.instagram.com/sanseito" target="_blank" class="sansei-btn">Insta</a>
        <a href="https://www.tiktok.com/@sanseito" target="_blank" class="sansei-btn">TikTok</a>
        <a href="https://go2senkyo.com/articles/tag/%E5%8F%82%E6%94%BF%E5%85%9A" target="_blank" class="sansei-btn">選挙ドット</a>
    </div>

    <div class="grid-4col">
        <img src="https://img.youtube.com/vi/av8FzH-rl_0/mqdefault.jpg" class="video-item" onclick="openVideo('av8FzH-rl_0')">
        <img src="https://img.youtube.com/vi/anwipaF_gLU/mqdefault.jpg" class="video-item" onclick="openVideo('anwipaF_gLU')">
        <img src="https://img.youtube.com/vi/78uHp5bLyto/mqdefault.jpg" class="video-item" onclick="openVideo('78uHp5bLyto')">
        <img src="https://img.youtube.com/vi/kcyuEbUbSr8/mqdefault.jpg" class="video-item" onclick="openVideo('kcyuEbUbSr8')">
    </div>

    <div class="section-title">PHOTO GALLERY</div>
    <div class="grid-4col">
        <img src="photo1.jpg" class="photo-item"><img src="photo2.jpg" class="photo-item">
        <img src="photo3.jpg" class="photo-item"><img src="photo4.jpg" class="photo-item">
        <img src="photo5.jpg" class="photo-item"><img src="photo6.jpg" class="photo-item">
        <img src="photo7.jpg" class="photo-item"><img src="photo8.jpg" class="photo-item">
    </div>

    <div class="section-title">GENERAL VIDEO ARCHIVE</div>
    <div class="grid-4col">
        <img src="https://img.youtube.com/vi/G1hKzCkywM8/mqdefault.jpg" class="video-item" onclick="openVideo('G1hKzCkywM8')">
        <img src="https://img.youtube.com/vi/a-8XiE7W7u4/mqdefault.jpg" class="video-item" onclick="openVideo('a-8XiE7W7u4')">
        <img src="https://img.youtube.com/vi/q2_c2_WfJFg/mqdefault.jpg" class="video-item" onclick="openVideo('q2_c2_WfJFg')">
        <img src="https://img.youtube.com/vi/BpITZk7sa8E/mqdefault.jpg" class="video-item" onclick="openVideo('BpITZk7sa8E')">
    </div>
</div>

<div id="overlay" onclick="closeOverlay()">
    <div id="overlay-content" onclick="event.stopPropagation()">
        <iframe id="overlay-video" src="" frameborder="0" allowfullscreen></iframe><br>
        <button class="close-btn" onclick="closeOverlay()">CLOSE</button>
    </div>
</div>

<script>
    function openVideo(id) {
        document.getElementById('overlay-video').src = "https://www.youtube.com/embed/" + id + "?autoplay=1";
        document.getElementById('overlay').style.display = 'flex';
    }
    function closeOverlay() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('overlay-video').src = '';
    }
</script>
<footer style="margin: 50px 0; color: #475569;">&copy; 2026 MIYABI'S PORTAL</footer>
</body>
</html>
