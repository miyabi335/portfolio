<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miyabi's Portfolio Portal</title>
    <style>
        body { font-family: "Meiryo", sans-serif; margin: 0; background: #0f172a; text-align: center; color: #f1f5f9; }
        .header-container { position: relative; width: 100%; height: 35vh; overflow: hidden; background: #333; }
        .header-image { width: 100%; height: 100%; object-fit: cover; }
        .header-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; text-shadow: 0 2px 15px rgba(0,0,0,0.8); width: 100%; }
        .section-title { margin-top: 40px; padding: 12px; background: rgba(255,255,255,0.05); font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.1); color: #94a3b8; }

        /* ナビゲーション */
        .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-width: 950px; margin: 20px auto; padding: 0 15px; }
        
        /* すべてのナビボタンをオレンジ色・白枠に変更 */
        .nav-btn { 
            display: flex; align-items: center; justify-content: center; 
            background: #fb8c00; color: #fff; border: 2px solid #fff; 
            padding: 10px 5px; border-radius: 8px; text-decoration: none; 
            font-weight: bold; font-size: 0.85em; min-height: 45px; 
            transition: 0.2s; box-sizing: border-box; cursor: pointer;
        }
        .nav-btn:hover { background: #ef6c00; transform: translateY(-2px); }

        /* 参政党ボタン */
        .sansei-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-width: 950px; margin: 20px auto; padding: 0 15px; }
        .sansei-btn { background: #fb8c00; color: #fff; border: none; padding: 15px 5px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 0.8em; min-height: 50px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .sansei-btn:hover { background: #ef6c00; transform: translateY(-2px); }

        /* ギャラリー */
        .grid-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; max-width: 1100px; margin: 20px auto; padding: 0 15px; }
        .item-wrapper { display: flex; flex-direction: column; align-items: center; }
        .item-label { font-size: 0.75em; color: #fb8c00; margin-bottom: 5px; font-weight: bold; }
        .thumb-media { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 10px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .thumb-media:hover { transform: scale(1.05); border-color: #fb8c00; }

        /* 動画オーバーレイ */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); align-items: center; justify-content: center; z-index: 9999; }
        #overlay-content { width: 90%; max-width: 1000px; position: relative; display: flex; flex-direction: column; align-items: center; }
        #overlay-video { width: 100%; aspect-ratio: 16/9; display: none; border-radius: 8px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .close-btn { margin-top: 20px; background: #ef4444; color: white; border: none; padding: 12px 40px; border-radius: 30px; cursor: pointer; font-weight: bold; font-size: 1rem; }

        @media (max-width: 768px) { .nav-grid, .sansei-grid, .grid-container { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<div id="overlay" onclick="closeOverlay()">
    <div id="overlay-content" onclick="event.stopPropagation()">
        <iframe id="overlay-video" src="" frameborder="0" allowfullscreen></iframe>
        <button class="close-btn" onclick="closeOverlay()">× 閉じて戻る</button>
    </div>
</div>

<script>
    function openVideo(id) {
        const video = document.getElementById('overlay-video');
        video.src = "https://www.youtube.com/embed/" + id + "?autoplay=1";
        video.style.display = 'block';
        document.getElementById('overlay').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }
    function closeOverlay() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('overlay-video').src = '';
        document.body.style.overflow = '';
    }
</script>
</body>
