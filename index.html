<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expanding Gallery Portfolio</title>
    <style>
        /* --- 既存のスタイル --- */
        body { font-family: sans-serif; margin: 0; background: #f5f5f7; }
        .grid-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; padding: 20px; }
        .grid-gallery img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .grid-gallery img:hover { opacity: 0.8; }

        /* --- 拡大表示（ライトボックス）のスタイル --- */
        #lightbox {
            display: none; /* 通常は隠しておく */
            position: fixed; z-index: 999;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            align-items: center; justify-content: center;
            cursor: zoom-out;
        }
        #lightbox img {
            max-width: 90%; max-height: 90%;
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            animation: zoom 0.3s;
        }
        @keyframes zoom { from { transform: scale(0.7); } to { transform: scale(1); } }
    </style>
</head>
<body>

<div class="grid-gallery">
    <img src="p1.jpg" onclick="openLightbox(this.src)">
    <img src="p2.jpg" onclick="openLightbox(this.src)">
    <img src="p3.jpg" onclick="openLightbox(this.src)">
    </div>

<div id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="">
</div>

<script>
    // 拡大画面を開く魔法
    function openLightbox(src) {
        document.getElementById('lightbox-img').src = src;
        document.getElementById('lightbox').style.display = 'flex';
    }
    // 拡大画面を閉じる魔法
    function closeLightbox() {
        document.getElementById('lightbox').style.display = 'none';
    }
</script>

</body>
</html>
