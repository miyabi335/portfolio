<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miyabi's Hobby Space</title>
    <style>
        /* MIYABIさん専用：ダーク・テックデザイン */
        body {
            margin: 0;
            padding: 0;
            background-color: #0d1117; /* GitHub風の深い黒 */
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            width: 100%;
            padding: 30px 0 20px;
            text-align: center;
            background: linear-gradient(180deg, #161b22 0%, transparent 100%);
        }

        h1 {
            margin: 0;
            font-size: 26px;
            color: #58a6ff;
            text-shadow: 0 0 15px rgba(88, 166, 255, 0.4);
        }

        /* メインメニューのグリッド（2列レイアウト） */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 90%;
            max-width: 400px;
            margin-top: 20px;
        }

        /* 5番目のボタンなど、1列使いたい場合の調整 */
        .full-width {
            grid-column: span 2;
        }

        .menu-button {
            padding: 20px 10px;
            background-color: #21262d;
            border: 1px solid #30363d;
            border-radius: 12px;
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .menu-button:hover {
            background-color: #30363d;
            border-color: #8b949e;
            transform: translateY(-2px);
        }

        .menu-button:active {
            transform: scale(0.95);
        }

        .icon { font-size: 24px; }

        /* Google検索セクション */
        .search-section {
            width: 90%;
            max-width: 400px;
            margin: 30px 0;
        }

        .search-form {
            display: flex;
            gap: 8px;
        }

        .search-input {
            flex: 1;
            padding: 12px 15px;
            border-radius: 25px;
            border: 1px solid #30363d;
            background-color: #0d1117;
            color: white;
            outline: none;
        }

        .search-input:focus { border-color: #58a6ff; }

        .search-btn {
            padding: 10px 20px;
            border-radius: 25px;
            border: none;
            background-color: #238636; /* 成功・実行の緑 */
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        /* フッターナビゲーション */
        .footer-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            background-color: #161b22;
            border-top: 1px solid #30363d;
        }

        .nav-item {
            color: #8b949e;
            text-decoration: none;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Miyabi's Hobby Space</h1>
    </div>

    <div class="menu-grid">
        <a href="activity.html" class="menu-button">
            <span class="icon">📝</span> No.1：活動記録
        </a>
        <a href="photo.html" class="menu-button">
            <span class="icon">📷</span> No.2：本日の風景
        </a>
        <a href="movie.html" class="menu-button">
            <span class="icon">🎬</span> No.3：おすすめ動画
        </a>
        <a href="bbs.html" class="menu-button">
            <span class="icon">💬</span> No.4：掲示板
        </a>
        <a href="settings.html" class="menu-button full-width">
            <span class="icon">⚙️</span> No.5：システム設定・ツール
        </a>
    </div>

    <div class="search-section">
        <form action="https://www.google.com/search" method="get" target="_blank" class="search-form">
            <input type="text" name="q" class="search-input" placeholder="Googleで検索...">
            <button type="submit" class="search-btn">検索</button>
        </form>
    </div>

    <div class="footer-nav">
        <a href="https://www.google.co.jp/maps" class="nav-item" target="_blank">
            <span>📍</span> MAP
        </a>
        <a href="https://github.com/miyabi335" class="nav-item" target="_blank">
            <span>🐙</span> GitHub
        </a>
        <a href="photoshop-tool.html" class="nav-item">
            <span>🎨</span> PS Tool
        </a>
    </div>

</body>
</html>
