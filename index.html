<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIYABI'S PORTAL</title>
    <style>
        body { 
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            margin: 0; background: #020617; text-align: center; color: #e2e8f0; 
        }

        /* ヘッダー：富士山 */
        .header-container { 
            position: relative; width: 100%; height: 450px; 
            overflow: hidden; background: #000;
        }
        .header-image { 
            width: 100%; height: 100%; object-fit: cover;
            object-position: center 30%; opacity: 0.8;
        }
        .header-text { 
            position: absolute; bottom: 40px; right: 40px; text-align: right;
        }
        .header-text h1 { 
            font-size: 3.5rem; letter-spacing: 0.3em; margin: 0; color: #fff;
            text-shadow: 0 0 20px rgba(0,0,0,1); 
        }

        .main-wrapper { max-width: 1400px; margin: 0 auto; padding: 0 20px; }

        /* セクション見出し */
        .section-title { 
            margin-top: 70px; padding: 15px 0; font-weight: bold; font-size: 1.5rem;
            color: #f8fafc; letter-spacing: 0.1em;
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            text-align: left; margin-bottom: 30px;
        }
        .section-title.sansei { color: #fb8c00; border-bottom: 1px solid rgba(251, 140, 0, 0.4); }

        /* ボタン・ナビゲーション */
        .grid-5col { 
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-bottom: 30px; 
        }
        .nav-btn, .sansei-btn { 
            display: flex; align-items: center; justify-content: center; 
            padding: 20px 10px; border-radius: 8px; text-decoration: none; 
            font-weight: 900; font-size: 1.1rem; transition: 0.3s;
            box-sizing: border-box; min-height: 70px; 
        }
        
        .nav-btn { 
            background: rgba(56, 189, 248, 0.1); color: #38bdf8; 
            border: 2px solid rgba(56, 189, 248, 0.3);
        }
        .nav-btn:hover { background: rgba(56, 189, 248, 0.2); border-color: #38bdf8; transform: translateY(-3px); }
        .nav-link-special { background: rgba(251, 140, 0, 0.15) !important; color: #fb8c00 !important; border-color: #fb8c00 !important; }

        .sansei-btn { background: #fb8c00; color: #fff; border: none; box-shadow: 0 4px 0 #c2410c; }
        .sansei-btn:hover { background: #f97316; transform: translateY(-2px); box-shadow: 0 2px 0 #c2410c; }

        /* ギャラリー */
        .grid-4col { 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px;
        }
        .photo-item { width: 100%; aspect-ratio: 4/3; object-fit: cover; border-radius: 8px; transition: 0.4s; }
        .video-item { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .video-item:hover { transform: scale(1.04); box-shadow: 0 10px 30px rgba(0,0,0,0.7); }

        /* 動画再生オーバーレイ（巨大） */
        #overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); align-items: center; justify-content: center; z-index: 10000; 
        }
        #overlay-content { width: 95%; max-width: 1600px; text-align: center; }
        #overlay-video { width: 100%; aspect-ratio: 16/9; box-shadow: 0 0 50px rgba(0,0,0,1); border: 1px solid #333; }
        .close-btn { margin-top: 30px; background: #ef4444; color: #fff; border: none; padding: 15px 60px; border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 1.2rem; }

        @media (max-width: 1024px) {
            .grid-5col { grid-template-columns: repeat(2, 1fr); }
            .grid-4col { grid-template-columns: repeat(2, 1fr); }
            .header-container { height: 350px; }
            .header-text h1 { font-size: 2.2rem; }
            .nav-btn, .sansei-btn { font-size: 1rem; padding: 15px 5px; }
        }
    </style>
</head>
<body>

<div id="overlay" onclick="closeOverlay()">
    <div id="overlay-content" onclick="event.stopPropagation()">
        <iframe id="overlay-video" src="" frameborder="0" allowfullscreen></iframe><br>
        <button class="close-btn" onclick="closeOverlay()">× CLOSE</button>
    </div>
</div>

<script>
    function openVideo(id) {
        const video = document.getElementById('overlay-video');
        video.src = "https://www.youtube.com/embed/" + id + "?autoplay=1";
        document.getElementById('overlay').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }
    function closeOverlay() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('overlay-video').src = '';
        document.body.style.overflow = '';
    }
</script>
