<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIYABI'S PORTAL</title>
    <style>
        body { 
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            margin: 0; background: #020617; text-align: center; color: #e2e8f0; 
        }

        /* --- 1. ヘッダー：富士山をしっかり見せる --- */
        .header-container { 
            position: relative; width: 100%; height: 450px; /* 高さをしっかり確保 */
            overflow: hidden; background: #000;
        }
        .header-image { 
            width: 100%; height: 100%; object-fit: cover;
            object-position: center 30%; /* 富士山の山頂が見えるよう調整 */
            opacity: 0.8;
        }
        .header-text { 
            position: absolute; bottom: 40px; right: 40px; text-align: right;
        }
        .header-text h1 { 
            font-size: 3rem; letter-spacing: 0.3em; margin: 0; color: #fff;
            text-shadow: 0 0 20px rgba(0,0,0,1); 
        }

        /* --- 2. レイアウト設定（ワイド化） --- */
        .main-wrapper { max-width: 1400px; margin: 0 auto; padding: 0 20px; }

        /* セクション見出し（ラインを控えめに） */
        .section-title { 
            margin-top: 60px; padding: 10px 0; font-weight: bold; font-size: 1.2rem;
            color: #94a3b8; letter-spacing: 0.2em;
            border-bottom: 1px solid rgba(255,255,255,0.1); /* 線を細く、薄く */
            text-align: left; margin-bottom: 25px;
        }
        .section-title.sansei { color: #fb8c00; border-bottom: 1px solid rgba(251, 140, 0, 0.3); }

        /* ナビゲーション (5列) */
        .nav-grid { 
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 30px; 
        }
        .nav-btn { 
            display: flex; align-items: center; justify-content: center; 
            background: rgba(255,255,255,0.03); color: #38bdf8; 
            border: 1px solid rgba(56, 189, 248, 0.2); padding: 15px 5px; border-radius: 4px; 
            text-decoration: none; font-weight: bold; font-size: 0.9rem; transition: 0.3s;
        }
        .nav-btn:hover { background: rgba(56, 189, 248, 0.1); border-color: #38bdf8; }
        .nav-link-special { background: rgba(251, 140, 0, 0.1) !important; color: #fb8c00 !important; border-color: #fb8c00 !important; }

        /* 参政党ボタン (10個) */
        .sansei-grid { 
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px;
        }
        .sansei-btn { 
            background: #fb8c00; color: #fff; border: none; 
            padding: 15px 5px; border-radius: 4px; text-decoration: none; 
            font-weight: bold; font-size: 0.85rem; transition: 0.3s;
        }
        .sansei-btn:hover { background: #f97316; transform: translateY(-2px); }

        /* ギャラリー共通 (4列) */
        .grid-4col { 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px;
        }
        .photo-item { 
            width: 100%; aspect-ratio: 4/3; object-fit: cover; border-radius: 4px; 
            filter: grayscale(20%); transition: 0.4s;
        }
        .photo-item:hover { filter: grayscale(0%); transform: scale(1.02); }

        .video-item { 
            width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 4px; 
            cursor: pointer; transition: 0.3s; opacity: 0.85;
        }
        .video-item:hover { opacity: 1; transform: scale(1.03); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }

        /* 再生オーバーレイ */
        #overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.98); align-items: center; justify-content: center; z-index: 10000; 
        }
        #overlay-content { width: 90%; max-width: 1100px; text-align: center; }
        #overlay-video { width: 100%; aspect-ratio: 16/9; }
        .close-btn { 
            margin-top: 30px; background: none; color: #666; border: 1px solid #666; 
            padding: 10px 40px; border-radius: 2px; cursor: pointer; transition: 0.3s;
        }
        .close-btn:hover { color: #fff; border-color: #fff; }

        @media (max-width: 1024px) {
            .nav-grid, .sansei-grid { grid-template-columns: repeat(2, 1fr); }
            .grid-4col { grid-template-columns: repeat(2, 1fr); }
            .header-container { height: 300px; }
            .header-text h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

</div> <div id="overlay" onclick="closeOverlay()">

<script>
    function openVideo(id) {
        const video = document.getElementById('overlay-video');
        video.src = "https://www.youtube.com/embed/" + id + "?autoplay=1";
        document.getElementById('overlay').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }
    function closeOverlay() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('overlay-video').src = '';
        document.body.style.overflow = '';
    }
</script>
