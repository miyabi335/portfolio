<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIYABI'S PORTAL</title>
    <style>
        /* --- 基本レイアウト設定 --- */
        * { box-sizing: border-box; }
        body { 
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            margin: 0; background: #020617; text-align: center; color: #e2e8f0; overflow-x: hidden;
            line-height: 1.8;
        }

        /* --- ヘッダー：画像を背景としてフルワイド表示 --- */
        .main-header {
            width: 100%;
            height: 450px; /* ヘッダーの高さ（調整可） */
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-color: #000;
            border-bottom: 3px solid #fb8c00; /* 参政党カラーのアクセント */
        }

        /* 背景画像レイヤー */
        .header-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('portfolio/photosa/head02.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: brightness(0.6); /* 画像を少し暗くして文字を浮かび上がらせる */
            z-index: 1;
        }

        /* ヘッダーテキストレイヤー */
        .header-content {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .header-content h1 {
            font-size: 3.5rem;
            letter-spacing: 0.4em;
            margin: 0;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(0,0,0,0.8), 0 0 10px rgba(251, 140, 0, 0.5);
            font-weight: 900;
        }

        /* --- メインコンテンツ --- */
        .main-wrapper { 
            max-width: 1200px; margin: 0 auto; padding: 0 20px; text-align: left; 
        }

        /* 注目動画 */
        .featured-section { margin: 60px 0; width: 100%; text-align: center; }
        .video-player-wrapper {
            position: relative; width: 100%; aspect-ratio: 16/9; 
            border-radius: 15px; overflow: hidden;
            border: 2px solid rgba(251, 140, 0, 0.5); 
            background: #000; box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }
        .video-player-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .video-label { margin-top: 15px; color: #fb8c00; font-weight: bold; font-size: 1.2rem; }

        /* セクションタイトル */
        .section-title { 
            margin: 80px 0 30px; padding: 15px 0; font-weight: bold; font-size: 1.6rem;
            color: #f8fafc; border-bottom: 2px solid rgba(255,255,255,0.1); 
        }
        .section-title.sansei { color: #fb8c00; border-bottom-color: rgba(251, 140, 0, 0.4); }

        /* グリッドシステム */
        .grid-5col { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-bottom: 30px; }
        .grid-4col { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }

        /* ボタンデザイン */
        .nav-btn, .sansei-btn { 
            display: flex; align-items: center; justify-content: center; 
            padding: 15px 5px; border-radius: 10px; text-decoration: none; 
            font-weight: 900; font-size: 1rem; transition: 0.3s; 
            min-height: 75px; text-align: center;
        }
        .nav-btn { background: rgba(56, 189, 248, 0.08); color: #38bdf8; border: 2px solid rgba(56, 189, 248, 0.2); }
        .nav-btn:hover { background: rgba(56, 189, 248, 0.2); border-color: #38bdf8; transform: translateY(-5px); }
        .nav-link-special { background: rgba(251, 140, 0, 0.12) !important; color: #fb8c00 !important; border-color: #fb8c00 !important; }

        .sansei-btn { background: #fb8c00; color: #fff; border: none; box-shadow: 0 4px 0 #c2410c; }
        .sansei-btn:hover { background: #f97316; transform: translateY(-3px); box-shadow: 0 2px 0 #c2410c; }

        /* メディアアイテム */
        .photo-item, .video-item { 
            width: 100%; aspect-ratio: 4/3; object-fit: cover; border-radius: 10px; 
            transition: 0.4s; border: 1px solid rgba(255,255,255,0.05);
        }
        .video-item { aspect-ratio: 16/9; cursor: pointer; }
        .video-item:hover { transform: scale(1.05); border-color: #fb8c00; }

        /* 動画オーバーレイ */
        #overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); align-items: center; justify-content: center; z-index: 10000; 
        }
        #overlay-content { width: 95%; max-width: 1600px; text-align: center; }
        #overlay-video { width: 100%; aspect-ratio: 16/9; }
        .close-btn { margin-top: 30px; background: #ef4444; color: #fff; border: none; padding: 15px 60px; border-radius: 50px; cursor: pointer; font-weight: bold; }

        /* スマホ対応 */
        @media (max-width: 1024px) {
            .grid-5col, .grid-4col { grid-template-columns: repeat(2, 1fr); }
            .main-header { height: 250px; }
            .header-content h1 { font-size: 1.8rem; letter-spacing: 0.2em; }
        }
    </style>
</head>

    </div>

<script>
    function openVideo(id) {
        const video = document.getElementById('overlay-video');
        video.src = "https://www.youtube.com/embed/" + id + "?autoplay=1";
        document.getElementById('overlay').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }
    function closeOverlay() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('overlay-video').src = '';
        document.body.style.overflow = '';
    }
</script>
