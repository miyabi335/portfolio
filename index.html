<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miyabi's Portfolio Portal</title>
    <style>
        body { font-family: "Meiryo", sans-serif; margin: 0; background: #0f172a; text-align: center; color: #f1f5f9; min-height: 100vh; }
        
        /* ヘッダー */
        .header-container { position: relative; width: 100%; height: 35vh; overflow: hidden; background: #333; }
        .header-image { width: 100%; height: 100%; object-fit: cover; }
        .header-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; text-shadow: 0 2px 15px rgba(0,0,0,0.8); width: 100%; }
        .header-text h1 { font-size: 2.5rem; letter-spacing: 0.2em; margin: 0; }

        .section-title { margin-top: 40px; padding: 12px; background: rgba(255,255,255,0.05); font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.1); color: #94a3b8; letter-spacing: 0.1em; }

        /* ナビゲーション (No.1-10) */
        .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-width: 950px; margin: 20px auto; padding: 0 15px; }
        .nav-btn { display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); color: #38bdf8; border: 1px solid #38bdf8; padding: 10px 5px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 0.85em; min-height: 45px; transition: 0.2s; box-sizing: border-box; }
        .nav-btn:hover { background: rgba(56, 189, 248, 0.2); transform: translateY(-2px); }
        .nav-link-special { background: #fb8c00 !important; color: #fff !important; border: 2px solid #fff !important; }

        /* 参政党ボタン */
        .sansei-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-width: 950px; margin: 20px auto; padding: 0 15px; }
        .sansei-btn { background: #fb8c00; color: #fff; border: none; padding: 15px 5px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 0.8em; min-height: 50px; display: flex; align-items: center; justify-content: center; transition: 0.2s; box-sizing: border-box; }
        .sansei-btn:hover { background: #ef6c00; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(251, 140, 0, 0.3); }

        /* 動画オーバーレイ */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); align-items: center; justify-content: center; z-index: 9999; }
        #overlay-content { width: 90%; max-width: 1000px; position: relative; }
        #overlay-video { width: 100%; aspect-ratio: 16/9; display: none; border-radius: 8px; }
        .close-btn { margin-top: 20px; background: #ef4444; color: white; border: none; padding: 12px 40px; border-radius: 30px; cursor: pointer; font-weight: bold; }

        @media (max-width: 768px) { .nav-grid, .sansei-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<header class="header-container">
    <img src="fuji00001.jpg" alt="富士山" class="header-image">
    <div class="header-text"><h1>MIYABI'S PORTAL</h1></div>
</header>

<div class="section-title">NAVIGATION MENU</div>
<nav class="nav-grid">
    <div class="nav-btn">No.1</div>
    <div class="nav-btn">No.2</div>
    <div class="nav-btn">No.3</div>
    <a href="no4.html" class="nav-btn">Music</a>
    <div class="nav-btn">No.5</div>
    
    <a href="https://www.gov-online.go.jp/governmentlinks/" target="_blank" class="nav-btn">官公庁サイト一覧</a>
    <a href="https://www.j-lis.go.jp/spd/map-search/cms_1069.html" target="_blank" class="nav-btn">全国自治体マップ</a>
    <a href="https://uub.jp/map/kyoto/" target="_blank" class="nav-btn">47都道府県地図</a>
    
    <div class="nav-btn">No.9</div>
    <a href="no10.html" class="nav-btn nav-link-special">Links集 (No.10)</a>
</nav>

<div class="section-title">SANSEITO LINKS</div>
<div class="sansei-grid">
    <a href="https://sanseito.jp/" target="_blank" class="sansei-btn">公式サイト</a>
    <a href="https://sanseito.jp/news/" target="_blank" class="sansei-btn">ニュース</a>
    <a href="https://info.sanseito.jp/" target="_blank" class="sansei-btn">イベント</a>
    <a href="https://sanseito.jp/member/" target="_blank" class="sansei-btn">メンバー</a>
    <a href="https://www.youtube.com/@sanseito-official" target="_blank" class="sansei-btn">YouTube</a>
</div>

<div id="overlay" onclick="closeOverlay()">
    <div id="overlay-content" onclick="event.stopPropagation()">
        <iframe id="overlay-video" src="" frameborder="0" allowfullscreen></iframe><br>
        <button class="close-btn" onclick="closeOverlay()">× 閉じる</button>
    </div>
</div>

<script>
    function openVideo(id) {
        const video = document.getElementById('overlay-video');
        video.src = "https://www.youtube.com/embed/" + id + "?autoplay=1";
        video.style.display = 'block';
        document.getElementById('overlay').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }
    function closeOverlay() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('overlay-video').src = '';
        document.body.style.overflow = '';
    }
</script>

<div style="margin-bottom: 80px;"></div>
</body>
</html>
