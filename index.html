<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIYABI'S PORTAL</title>
    <style>
        body { 
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            margin: 0; background: #020617; text-align: center; color: #e2e8f0; 
            line-height: 1.6;
        }

        /* --- ヘッダー：画質を優先し、バランスよく配置 --- */
        .header-container { 
            width: 100%; padding: 40px 0 20px; background: #000;
            display: flex; flex-direction: column; align-items: center;
        }
        .header-image-wrapper {
            width: 100%; max-width: 900px; padding: 0 20px; box-sizing: border-box;
        }
        .header-image { 
            width: 100%; height: auto; border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .header-text h1 { 
            font-size: 2.8rem; letter-spacing: 0.3em; margin: 25px 0 0; color: #fff;
            text-shadow: 0 0 15px rgba(255,255,255,0.3); 
        }

        .main-wrapper { max-width: 1400px; margin: 0 auto; padding: 0 20px; }

        /* --- 注目動画セクション（今一番の見せ場） --- */
        .featured-video-container { margin-top: 40px; width: 100%; }
        .video-status-tag {
            display: inline-block; background: #fb8c00; color: #fff;
            padding: 5px 15px; border-radius: 4px; font-weight: bold; font-size: 0.9rem;
            margin-bottom: 15px; letter-spacing: 0.1em;
        }
        .video-player-wrapper {
            position: relative; width: 100%; max-width: 1000px; margin: 0 auto;
            aspect-ratio: 16/9; border-radius: 12px; overflow: hidden;
            border: 1px solid rgba(251, 140, 0, 0.4); box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .video-player-wrapper iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;
        }
        .featured-caption { margin-top: 15px; font-weight: bold; color: #fb8c00; font-size: 1.1rem; }

        /* セクション見出し */
        .section-title { 
            margin-top: 70px; padding: 15px 0; font-weight: bold; font-size: 1.5rem;
            color: #f8fafc; letter-spacing: 0.1em; border-bottom: 1px solid rgba(255,255,255,0.1); 
            text-align: left; margin-bottom: 30px;
        }
        .section-title.sansei { color: #fb8c00; border-bottom: 1px solid rgba(251, 140, 0, 0.4); }

        /* --- グリッドレイアウト --- */
        .grid-5col { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-bottom: 30px; }
        .grid-4col { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }

        .nav-btn, .sansei-btn { 
            display: flex; align-items: center; justify-content: center; padding: 20px 10px; 
            border-radius: 8px; text-decoration: none; font-weight: 900; font-size: 1.1rem; 
            transition: 0.3s; box-sizing: border-box; min-height: 70px; 
        }
        .nav-btn { background: rgba(56, 189, 248, 0.1); color: #38bdf8; border: 2px solid rgba(56, 189, 248, 0.3); }
        .nav-btn:hover { background: rgba(56, 189, 248, 0.2); border-color: #38bdf8; transform: translateY(-3px); }
        .nav-link-special { background: rgba(251, 140, 0, 0.15) !important; color: #fb8c00 !important; border-color: #fb8c00 !important; }

        .sansei-btn { background: #fb8c00; color: #fff; border: none; box-shadow: 0 4px 0 #c2410c; }
        .sansei-btn:hover { background: #f97316; transform: translateY(-2px); box-shadow: 0 2px 0 #c2410c; }

        .photo-item, .video-item { width: 100%; aspect-ratio: 4/3; object-fit: cover; border-radius: 8px; transition: 0.4s; }
        .video-item { aspect-ratio: 16/9; cursor: pointer; }
        .video-item:hover { transform: scale(1.04); box-shadow: 0 10px 30px rgba(0,0,0,0.7); }

        /* --- 動画再生オーバーレイ --- */
        #overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); align-items: center; justify-content: center; z-index: 10000; 
        }
        #overlay-content { width: 95%; max-width: 1600px; text-align: center; }
        #overlay-video { width: 100%; aspect-ratio: 16/9; box-shadow: 0 0 50px rgba(0,0,0,1); }
        .close-btn { 
            margin-top: 30px; background: #ef4444; color: #fff; border: none;
            padding: 15px 60px; border-radius: 50px; cursor: pointer; font-weight: bold; 
        }

        @media (max-width: 1024px) {
            .grid-5col, .grid-4col { grid-template-columns: repeat(2, 1fr); }
            .header-text h1 { font-size: 1.8rem; }
            .nav-btn, .sansei-btn { font-size: 1rem; }
        }
    </style>
</head>
<body>

<header class="header-container">
    <div class="header-image-wrapper">
        <img src="portfolio/photosa/head02.png" alt="MIYABI'S PORTAL" class="header-image" onerror="this.src='head02.png';">
    </div>
    <div class="header-text">
        <h1>MIYABI'S PORTAL</h1>
    </div>
</header>

<div class="main-wrapper">

    <section class="featured-video-container">
        <div class="video-status-tag">NOW TRENDING</div>
        <div class="video-player-wrapper">
            <iframe 
                src="https://www.youtube.com/embed/UvdvU_bHKM0?autoplay=1&mute=1&rel=0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </div>
        <div class="featured-caption">【国会中継】「国際紛争と日本の供給力」参議院議員 神谷宗幣</div>
    </section>

    <div class="section-title">NAVIGATION MENU</div>
    <nav class="grid-5col">
        <div class="nav-btn">No.1</div><div class="nav-btn">No.2</div><div class="nav-btn">No.3</div>
        <a href="no4.html" class="nav-btn">Music</a><div class="nav-btn">No.5</div>
        <a href="https://www.gov-online.go.jp/governmentlinks/" target="_blank" class="nav-btn">官公庁サイト</a>
        <a href="https://www.j-lis.go.jp/spd/map-search/cms_1069.html" target="_blank" class="nav-btn">自治体マップ</a>
        <a href="https://uub.jp/map/kyoto/" target="_blank" class="nav-btn">47都道府県地図</a>
        <div class="nav-btn">No.9</div>
        <a href="no10.html" class="nav-btn nav-link-special">Links集 (No.10)</a>
    </nav>

    <div class="section-title sansei">SANSEITO AREA</div>
    <div class="grid-5col">
        <a href="https://sanseito.jp/" target="_blank" class="sansei-btn">公式サイト</a>
        <a href="https://sanseito.jp/news/" target="_blank" class="sansei-btn">最新ニュース</a>
        <a href="https://info.sanseito.jp/" target="_blank" class="sansei-btn">イベント</a>
        <a href="https://sanseito.jp/member/" target="_blank" class="sansei-btn">メンバー</a>
        <a href="https://sanseito.jp/2020/candidate/" target="_blank" class="sansei-btn">候補予定者</a>
        <a href="https://www.youtube.com/@sanseito-official" target="_blank" class="sansei-btn">YouTube</a>
        <a href="https://x.com/sansei411" target="_blank" class="sansei-btn">X (旧Twitter)</a>
        <a href="https://www.instagram.com/sanseito" target="_blank" class="sansei-btn">Instagram</a>
        <a href="https://www.tiktok.com/@sanseito" target="_blank" class="sansei-btn">TikTok</a>
        <a href="https://go2senkyo.com/articles/tag/%E5%8F%82%E6%94%BF%E5%85%9A" target="_blank" class="sansei-btn">選挙ドットコム</a>
    </div>

    <div class="grid-4col">
        <img src="https://img.youtube.com/vi/av8FzH-rl_0/mqdefault.jpg" class="video-item" onclick="openVideo('av8FzH-rl_0')">
        <img src="https://img.youtube.com/vi/anwipaF_gLU/mqdefault.jpg" class="video-item" onclick="openVideo('anwipaF_gLU')">
        <img src="https://img.youtube.com/vi/78uHp5bLyto/mqdefault.jpg" class="video-item" onclick="openVideo('78uHp5bLyto')">
        <img src="https://img.youtube.com/vi/kcyuEbUbSr8/mqdefault.jpg" class="video-item" onclick="openVideo('kcyuEbUbSr8')">
    </div>

    <div class="section-title">PHOTO GALLERY</div>
    <div class="grid-4col">
        <img src="photo1.jpg" class="photo-item"><img src="photo2.jpg" class="photo-item">
        <img src="photo3.jpg" class="photo-item"><img src="photo4.jpg" class="photo-item">
    </div>

</div>

<div id="overlay" onclick="closeOverlay()">
    <div id="overlay-content" onclick="event.stopPropagation()">
        <iframe id="overlay-video" src="" frameborder="0" allowfullscreen></iframe><br>
        <button class="close-btn" onclick="closeOverlay()">× CLOSE</button>
    </div>
</div>

<script>
    function openVideo(id) {
        const video = document.getElementById('overlay-video');
        video.src = "https://www.youtube.com/embed/" + id + "?autoplay=1";
        document.getElementById('overlay').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }
    function closeOverlay() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('overlay-video').src = '';
        document.body.style.overflow = '';
    }
</script>

<footer style="margin: 100px 0 50px; color: #475569;">
    &copy; 2026 MIYABI'S PORTAL
</footer>

</body>
</html>
