<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miyabi's Portal</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f5f5f7; text-align: center; color: #333; overflow-x: hidden; }
        .header-container { position: relative; width: 100%; height: 35vh; overflow: hidden; background: #333; }
        .header-image { width: 100%; height: 100%; object-fit: cover; }
        .header-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.6); }
        
        /* 共通グリッド（5列固定） */
        .btn-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 12px; 
            max-width: 950px; 
            margin: 0 auto; 
            padding: 0 15px; 
        }

        /* メインボタン (No.1-10) */
        .nav-container { margin-top: 25px; margin-bottom: 20px; }
        .nav-btn { 
            background: #fff; color: #007aff; border: 2px solid #007aff; 
            padding: 15px 5px; 
            border-radius: 15px; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 1.1em; 
            transition: all 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .nav-btn.special { background: #fb8c00; color: #fff; border-color: #ef6c00; }
        .nav-btn:hover { opacity: 0.8; transform: translateY(-1px); }

        /* 参政党サブボタン */
        .sub-nav-container { margin-bottom: 40px; gap: 10px; }
        .sub-btn { 
            background: transparent; 
            color: #ef6c00; 
            border: 2px solid #ffcc80; 
            padding: 12px 0; 
            border-radius: 12px; 
            text-decoration: none; 
            font-size: 0.9em; 
            font-weight: bold; 
            display: flex; align-items: center; justify-content: center;
            white-space: nowrap;
        }
        .sub-btn:hover { background: #fff3e0; }

        /* 見出し（参政党リンク・PHOTOS用） */
        .section-title { margin: 30px 0 15px 0; padding: 10px; background: #fff; border-bottom: 1px solid #ddd; font-size: 0.9em; clear: both; }

        /* PHOTOギャラリー（4枚横並び） */
        .photo-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 20px; /* 間隔を少し広く */
            max-width: 1200px; 
            margin: 20px auto 60px auto; 
            padding: 0 15px; 
        }
        
        /* 写真とタイトルを包むコンテナ */
        .photo-item-wrapper {
            display: flex;
            flex-direction: column; /* 上下に並べる */
            align-items: center;
            transition: all 0.3s ease;
        }
        
        /* 写真枠の上のテキスト（修正） */
        .photo-text-above {
            font-size: 0.85em;
            font-weight: bold;
            color: #ef6c00; /* 橙色 */
            margin-bottom: 8px; /* 写真との間隔 */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        .photo-item { 
            width: 100%; 
            aspect-ratio: 3/4; 
            object-fit: cover; 
            border-radius: 15px; 
            cursor: pointer; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.15); 
        }
        
        /* ホバー効果 */
        .photo-item-wrapper:hover { transform: scale(1.05); }
        .photo-item-wrapper:hover .photo-item { box-shadow: 0 8px 25px rgba(0,0,0,0.2); }

        /* ライトボックス（拡大表示画面） */
        #lightbox { 
            display: none; /* 初期状態は非表示 */
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); 
            align-items: center; justify-content: center; 
            z-index: 1000; 
            cursor: zoom-out; 
        }
        #lightbox img { 
            max-width: 90%; 
            max-height: 90%; 
            object-fit: contain; 
            border-radius: 10px; 
            animation: zoomIn 0.3s ease; 
        }

        @keyframes zoomIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 600px) {
            .btn-grid { gap: 6px; padding: 0 8px; }
            .nav-btn { font-size: 0.8em; padding: 12px 1px; border-radius: 10px; }
            .sub-btn { font-size: 0.65em; padding: 10px 0; border-radius: 8px; }
            .photo-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .photo-text-above { font-size: 0.75em; }
        }
    </style>
</head>
<body>

<div class="section-title"><h3>MODEL GALLERY</h3></div>
<div class="photo-grid">
    <div class="photo-item-wrapper">
        <div class="photo-text-above">モデル：アリス</div>
        <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=600&h=800&fit=crop" class="photo-item" onclick="openLightbox(this.src)">
    </div>
    
    <div class="photo-item-wrapper">
        <div class="photo-text-above">モデル：ベティ</div>
        <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?w=600&h=800&fit=crop" class="photo-item" onclick="openLightbox(this.src)">
    </div>
    
    <div class="photo-item-wrapper">
        <div class="photo-text-above">モデル：キャロル</div>
        <img src="https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?w=600&h=800&fit=crop" class="photo-item" onclick="openLightbox(this.src)">
    </div>
    
    <div class="photo-item-wrapper">
        <div class="photo-text-above">モデル：ダイアナ</div>
        <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=600&h=800&fit=crop" class="photo-item" onclick="openLightbox(this.src)">
    </div>
    
</div>

<div id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="">
</div>

<script>
    // ライトボックスを開く関数（関数名を openLightbox に統一）
    function openLightbox(s) {
        const lightbox = document.getElementById('lightbox');
        const img = document.getElementById('lightbox-img');
        img.src = s;
        lightbox.style.display = 'flex';
        document.body.style.overflow = 'hidden'; // 背面のスクロールを禁止
    }
    
    // ライトボックスを閉じる関数
    function closeLightbox() {
        document.getElementById('lightbox').style.display = 'none';
        document.body.style.overflow = ''; // スクロール禁止を解除
    }
</script>

</body>
