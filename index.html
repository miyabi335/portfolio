<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miyabi's Home</title>
    <style>
        /* 背景画像や全体の雰囲気 */
        body {
            margin: 0;
            padding: 0;
            background: #222; /* 仮の背景色：実際は画像URLなどに書き換えてください */
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        /* アイコンが並ぶグリッドレイアウト */
        .home-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2列に並べる */
            gap: 20px;
            padding: 40px 20px;
            width: 100%;
            max-width: 360px;
        }

        /* 各ボタン（アイコン）の基本スタイル */
        .icon-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: white;
            background: none;
            border: none;
            cursor: pointer;
        }

        /* アイコンの見た目（Photoshopで作った画像があれば背景に指定） */
        .icon-image {
            width: 70px;
            height: 70px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            margin-bottom: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        .icon-btn:active .icon-image { transform: scale(0.9); }

        /* おみくじボタン（5番）の特別スタイル */
        #omikuji-btn .icon-image {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
        }

        /* おみくじの結果が浮かび上がるポップアップ */
        .omikuji-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            background: white;
            color: #333;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            display: none; /* 最初は隠す */
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* アニメーション用 */
        .shake { animation: shake-animation 0.5s; }
        @keyframes shake-animation {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(-10deg); }
            50% { transform: rotate(10deg); }
            75% { transform: rotate(-5deg); }
            100% { transform: rotate(0deg); }
        }
    </style>
</head>
<body>

    <div class="home-grid">
        <a href="activity.html" class="icon-btn"><div class="icon-image">📝</div><span>No.1</span></a>
        <a href="landscape.html" class="icon-btn"><div class="icon-image">🚴</div><span>No.2</span></a>
        <a href="movies.html" class="icon-btn"><div class="icon-image">🎥</div><span>No.3</span></a>
        <a href="bbs.html" class="icon-btn"><div class="icon-image">💬</div><span>No.4</span></a>

        <button id="omikuji-btn" class="icon-btn" onclick="playOmikuji()">
            <div class="icon-image">🌸</div>
            <span>おみくじ</span>
        </button>
    </div>

    <div id="omikuji-popup" class="omikuji-overlay" onclick="this.style.display='none'">
        <div id="omikuji-content"></div>
        <p style="font-size: 12px; color: #999; margin-top: 15px;">タップで閉じる</p>
    </div>

    <audio id="sound-shake" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

    <script>
        function playOmikuji() {
            const icon = document.querySelector('#omikuji-btn .icon-image');
            const popup = document.getElementById('omikuji-popup');
            const content = document.getElementById('omikuji-content');
            const sound = document.getElementById('sound-shake');

            icon.classList.add('shake');
            if(sound) sound.play().catch(()=>{});

            setTimeout(() => {
                icon.classList.remove('shake');
                const r = Math.floor(Math.random() * 100);
                let res;

                if (r < 10) { 
                    res = { t: "🌸 はなまる 🌸", m: "今日は一歩前進できる日。<br>応援が誰かの力になります✨", i: "入浴剤" };
                } else if (r < 40) { 
                    res = { t: "✨ だいきち ✨", m: "素敵なニュースが飛び込むかも！<br>笑顔で過ごしてね🌸", i: "季節のお花" };
                } else { 
                    res = { t: "🍀 ちゅうきち 🍀", m: "いつも頑張るあなたへ。<br>甘いご褒美を🍰", i: "美味しい紅茶" };
                }

                content.innerHTML = `<h2 style="color:#d81b60">${res.t}</h2><p>${res.m}</p><p style="color:#8d6e63; font-size:0.9em;">✨アイテム: ${res.i}</p>`;
                popup.style.display = 'block';
            }, 500);
        }
    </script>
</body>
</html>
