<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miyabi's Portal</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f5f5f7; text-align: center; color: #333; }
        .header-container { position: relative; width: 100%; height: 35vh; overflow: hidden; background: #333; }
        .header-image { width: 100%; height: 100%; object-fit: cover; }
        .header-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.6); }
        
        /* 共通グリッド（5列固定） */
        .btn-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 10px; 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 0 15px; 
        }

        /* メインボタン (No.1-10) */
        .nav-container { margin-top: 20px; margin-bottom: 15px; }
        .nav-btn { 
            background: #fff; color: #007aff; border: 2px solid #007aff; 
            padding: 12px 5px; border-radius: 8px; text-decoration: none; 
            font-weight: bold; font-size: 0.85em; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        /* No.10専用（オレンジ） */
        .nav-btn.special { background: #fb8c00; color: #fff; border-color: #ef6c00; }
        .nav-btn:hover { opacity: 0.8; }

        /* スリムな参政党ボタン（2段構成） */
        .sub-nav-container { margin-bottom: 30px; gap: 8px; }
        .sub-btn { 
            background: transparent; 
            color: #ef6c00; 
            border: 1px solid #ffcc80; /* メインより薄い橙色 */
            padding: 6px 0; 
            border-radius: 4px; 
            text-decoration: none; 
            font-size: 0.75em; 
            font-weight: normal;
            display: flex; align-items: center; justify-content: center;
        }
        .sub-btn:hover { background: #fff3e0; }

        .section-title { margin-top: 20px; padding: 10px; background: #fff; border-bottom: 1px solid #ddd; font-size: 0.9em; }
        .grid-5col { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 15px; max-width: 1200px; margin: 0 auto; }
        .grid-5col img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 8px; cursor: pointer; background: #eee; }
        
        #lb { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); align-items:center; justify-content:center; z-index:999; }
        #lb img { max-width:95%; max-height:95%; object-fit: contain; }

        @media (max-width: 600px) {
            .btn-grid { gap: 5px; padding: 0 5px; }
            .nav-btn { font-size: 0.65em; padding: 10px 1px; }
            .sub-btn { font-size: 0.55em; padding: 5px 0; }
        }
    </style>
</head>
<body>

<header class="header-container">
    <img src="fuji00001.jpg" alt="Header" class="header-image">
    <div class="header-text"><h1>MY PORTFOLIO</h1></div>
</header>

<div class="nav-container btn-grid">
    <a href="no1.html" class="nav-btn">仕事・開発</a>
    <a href="no2.html" class="nav-btn">趣味・自転車</a>
    <a href="no3.html" class="nav-btn">デザイン</a>
    <a href="no4.html" class="nav-btn">写真ギャラリー</a>
    <a href="no5.html" class="nav-btn">設定/予備</a>
    <a href="no6.html" class="nav-btn">No.6</a>
    <a href="no7.html" class="nav-btn">No.7</a>
    <a href="no8.html" class="nav-btn">No.8</a>
    <a href="no9.html" class="nav-btn">No.9</a>
    <a href="no10.html" class="nav-btn special">メインリンク集</a>
</div>

<div class="sub-nav-container btn-grid">
    <a href="https://www.sanseito.jp/" class="sub-btn">公式サイト</a>
    <a href="#" class="sub-btn">参政党2</a>
    <a href="#" class="sub-btn">参政党3</a>
    <a href="#" class="sub-btn">参政党4</a>
    <a href="#" class="sub-btn">参政党5</a>
    <a href="#" class="sub-btn">参政党6</a>
    <a href="#" class="sub-btn">参政党7</a>
    <a href="#" class="sub-btn">参政党8</a>
    <a href="#" class="sub-btn">参政党9</a>
    <a href="#" class="sub-btn">参政党10</a>
</div>

<div class="section-title"><h3>PHOTOS</h3></div>
<div class="grid-5col">
    <img src="fuji00001.jpg" onclick="openLb(this.src)">
</div>

<div id="lb" onclick="this.style.display='none'"><img id="lbi" src=""></div>

<script>
    function openLb(s){
        document.getElementById('lbi').src = s;
        document.getElementById('lb').style.display = 'flex';
    }
</script>

</body>
</html>
