<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIYABI'S PORTAL - HOME</title>
    <style>
        body { 
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif;
            margin: 0; background: #020617; color: #e2e8f0; text-align: center;
        }
        
        /* ヘッダー */
        header { padding: 40px 20px; background: linear-gradient(180deg, #0f172a 0%, #020617 100%); }
        h1 { margin: 0; font-size: 2.5rem; letter-spacing: 0.2em; color: #fff; text-shadow: 0 0 20px rgba(244, 114, 182, 0.4); }

        /* 【追加】メインフィーチャー動画セクション */
        .hero-video-section {
            max-width: 1000px; margin: 0 auto 30px; padding: 0 20px;
        }
        .video-container {
            position: relative; width: 100%; padding-top: 56.25%; /* 16:9比率 */
            border-radius: 15px; overflow: hidden;
            box-shadow: 0 0 30px rgba(219, 39, 119, 0.2);
            border: 1px solid rgba(244, 114, 182, 0.3);
        }
        .video-container iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;
        }
        .video-caption {
            margin-top: 15px; color: #f472b6; font-weight: bold; font-size: 1.1rem;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        /* ナビゲーションメニュー */
        nav { margin-bottom: 50px; }
        .nav-menu { display: flex; justify-content: center; gap: 20px; padding: 0; list-style: none; }
        .nav-item a { 
            text-decoration: none; color: #94a3b8; font-weight: bold; font-size: 1rem;
            padding: 10px 20px; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
            transition: 0.3s;
        }
        .nav-item a:hover { color: #fff; background: rgba(244, 114, 182, 0.2); border-color: #f472b6; }

        /* コンテンツエリア */
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 30px; }
        .card { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px; padding: 30px; text-decoration: none; color: inherit; transition: 0.3s;
        }
        .card:hover { transform: translateY(-10px); background: rgba(255, 255, 255, 0.05); border-color: #f472b6; }
        .card h2 { color: #f472b6; margin-top: 0; }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
            h1 { font-size: 1.8rem; }
            .video-caption { font-size: 0.9rem; padding: 0 10px; }
        }
    </style>
</head>
<body>

<header>
    <h1>MIYABI'S PORTAL</h1>
</header>

<section class="hero-video-section">
    <div class="video-container">

            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
        </iframe>
    </div>
    <div class="video-caption">
        <span>🔥</span> 今、最も注目すべき国会質疑：神谷宗幣 議員
    </div>
</section>

<nav>

        <li class="nav-item"><a href="no4.html">Music</a></li>
        <li class="nav-item"><a href="#">Profile</a></li>
    </ul>
</nav>

    <a href="no1.html" class="card">
        <h2>Smart Tools</h2>
        <p>Photoshopショートカットや最新の便利ツールに素早くアクセス。</p>
    </a>
    <a href="no4.html" class="card">
        <h2>Music Gallery</h2>
        <p>癒やしのsayaさんカバー曲と最新ヒットチャート20選。</p>
    </a>
    <div class="card">

        <p>日々更新される情報のアーカイブ。最新トピックをチェック。</p>
    </div>
    <div class="card">
        <h2>Contact</h2>
        <p>ポータルサイトに関するお問い合わせや、制作依頼はこちらから。</p>
    </div>
</div>

<footer>
    <p style="margin: 60px 0 40px; color: #475569; font-size: 0.9rem;">&copy; 2026 MIYABI'S PORTAL</p>
</footer>

</body>
</html>
