<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miyabi's Portfolio Portal - Home</title>
    <style>
        /* 全体の設定：崩れないための基本 */
        body { font-family: "Meiryo", "Hiragino Kaku Gothic ProN", sans-serif; margin: 0; background: #0f172a; text-align: center; color: #f1f5f9; padding-bottom: 50px; }
        
        /* ヘッダー：富士山写真を大きく表示 */
        .header-container { position: relative; width: 100%; height: 35vh; overflow: hidden; background: #333; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .header-image { width: 100%; height: 100%; object-fit: cover; }
        .header-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; text-shadow: 0 2px 15px rgba(0,0,0,0.8); width: 100%; }
        .header-text h1 { margin: 0; font-size: 2.5rem; }

        .section-title { margin-top: 50px; padding: 15px; background: rgba(255,255,255,0.05); font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.1); color: #94a3b8; font-size: 1.1rem; }

        /* ナビゲーション（No.1〜10） */
        .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; max-width: 950px; margin: 30px auto; padding: 0 20px; }
        .nav-link { 
            display: flex; align-items: center; justify-content: center; 
            min-height: 50px; border-radius: 10px; font-weight: bold; font-size: 0.9em;
            text-decoration: none; transition: 0.2s;
            background: rgba(255,255,255,0.1); color: #38bdf8; border: 1px solid #38bdf8;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .nav-link:hover { background: rgba(56, 189, 248, 0.2); transform: translateY(-3px); border-color: #fff; }

        /* No.10専用（オレンジ色で「Links集」と表示） */
        .special-link { 
            background: #fb8c00 !important; 
            color: #fff !important; 
            border: 2px solid #fff !important; 
        }
        .special-link:hover { background: #ef6c00 !important; box-shadow: 0 6px 15px rgba(251, 140, 0, 0.4); }

        /* 動画ギャラリー（8枚・2段） */
        .grid-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        .item-wrapper { display: flex; flex-direction: column; align-items: center; }
        .thumb-media { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 12px; cursor: pointer; border: 2px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .thumb-media:hover { transform: scale(1.05); border-color: #fb8c00; box-shadow: 0 6px 15px rgba(0,0,0,0.3); }

        /* スマホ対応（2列にする） */
        @media (max-width: 768px) {
            .nav-grid { grid-template-columns: repeat(2, 1fr); }
            .grid-container { grid-template-columns: repeat(2, 1fr); gap: 10px; }
        }
    </style>
</head>
<body>
