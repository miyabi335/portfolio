<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Managed Portfolio Full</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f5f5f7; text-align: center; color: #333; }
        .header-container { position: relative; width: 100%; height: 45vh; overflow: hidden; background: #333; }
        .header-image { width: 100%; height: 100%; object-fit: cover; }
        .header-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .header-text h1 { margin: 0; font-size: 3em; letter-spacing: 4px; }
        .section-title { margin-top: 50px; padding: 10px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; padding: 20px; }
        .grid img { width: 100%; height: 200px; object-fit: cover; border-radius: 12px; cursor: pointer; transition: 0.2s; background: #eee; }
        .v-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 20px; }
        .v-card { background: #000; border-radius: 15px; overflow: hidden; aspect-ratio: 16/9; }
        iframe { width: 100%; height: 100%; border: none; }
        #lb { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); align-items:center; justify-content:center; z-index:99; cursor: zoom-out; }
        #lb img { max-width:95%; max-height:95%; }
    </style>
</head>
<body>

<header class="header-container">
    <img src="header.jpg" alt="Header" class="header-image">
    <div class="header-text">
        <h1>MY PORTFOLIO</h1>
        <p>Kyoto & Creative Archive</p>
    </div>
</header>

    <img src="p19.jpg" onclick="openLb(this.src)"><img src="p20.jpg" onclick="openLb(this.src)">

<div class="v-grid">

<div id="lb" onclick="this.style.display='none'"><img id="lbi"></div>

</script>

<footer><p>&copy; 2026 My Portfolio Managed</p></footer>
</body>
</html>
