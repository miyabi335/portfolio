<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIYABI'S PORTAL</title>
    <style>
        /* 全体の基本設定 */
        body { 
            font-family: "Meiryo", sans-serif; 
            margin: 0; 
            background: #0f172a; 
            text-align: center; 
            color: #f1f5f9; 
        }

        /* --- 1. ヘッダー：富士山を復活 --- */
        .header-container { 
            position: relative; 
            width: 100%; 
            height: 250px; /* 重ならないよう高さを確保 */
            overflow: hidden; 
            background: #1e293b; 
        }
        .header-image { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* 画面一杯に綺麗に広げる */
            display: block;
        }
        .header-text { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            width: 100%; 
        }
        .header-text h1 { 
            font-size: 2.5rem; 
            letter-spacing: 0.2em; 
            margin: 0; 
            color: #fff;
            text-shadow: 0 2px 15px rgba(0,0,0,0.9); 
        }

        /* セクション見出し */
        .section-title { 
            margin-top: 40px; 
            padding: 15px; 
            background: rgba(255,255,255,0.05); 
            font-weight: bold; 
            border-bottom: 2px solid #38bdf8; 
            color: #38bdf8; 
        }
        .section-title.sansei { 
            border-bottom: 2px solid #fb8c00; 
            color: #fb8c00; 
        }

        /* ナビゲーション (5列) */
        .nav-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 10px; 
            max-width: 1000px; 
            margin: 20px auto; 
            padding: 0 15px; 
        }
        .nav-btn { 
            display: flex; align-items: center; justify-content: center; 
            background: rgba(255,255,255,0.08); color: #38bdf8; 
            border: 1px solid #38bdf8; padding: 12px 5px; border-radius: 8px; 
            text-decoration: none; font-weight: bold; font-size: 0.8rem; min-height: 50px; 
        }
        .nav-link-special { background: #fb8c00 !important; color: #fff !important; border: 1px solid #fff !important; }

        /* --- 2. 参政党ボタン (10個：5列×2段) --- */
        .sansei-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 10px; 
            max-width: 1000px; 
            margin: 20px auto; 
            padding: 0 15px; 
        }
        .sansei-btn { 
            background: #fb8c00; color: #fff; border: none; 
            padding: 14px 5px; border-radius: 8px; text-decoration: none; 
            font-weight: bold; font-size: 0.8rem; display: flex; 
            align-items: center; justify-content: center; min-height: 50px; 
        }

        /* ギャラリー共通 (4列) */
        .grid-4col { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 15px; 
            max-width: 1100px; 
            margin: 20px auto; 
            padding: 0 20px; 
        }
        .photo-item { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .video-item { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .video-item:hover { border-color: #fb8c00; transform: scale(1.02); transition: 0.2s; }
        .video-item.general:hover { border-color: #38bdf8; }

        /* 再生オーバーレイ */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); align-items: center; justify-content: center; z-index: 10000; }
        #overlay-content { width: 95%; max-width: 900px; text-align: center; }
        #overlay-video { width: 100%; aspect-ratio: 16/9; border-radius: 12px; }
        .close-btn { margin-top: 20px; background: #ef4444; color: white; border: none; padding: 15px 50px; border-radius: 40px; cursor: pointer; font-weight: bold; }

        @media (max-width: 768px) {
            .nav-grid, .sansei-grid, .grid-4col { grid-template-columns: repeat(2, 1fr); }
            .header-container { height: 150px; }
            .header-text h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="grid-4col">

    <img src="https://img.youtube.com/vi/a-8XiE7W7u4/mqdefault.jpg" class="video-item general" onclick="openVideo('a-8XiE7W7u4')">

</div>

<div id="overlay" onclick="closeOverlay()">
    <div id="overlay-content" onclick="event.stopPropagation()">
        <iframe id="overlay-video" src="" frameborder="0" allowfullscreen></iframe><br>
        <button class="close-btn" onclick="closeOverlay()">× 閉じる</button>
    </div>
</div>

<script>
    function openVideo(id) {
        const video = document.getElementById('overlay-video');
        video.src = "https://www.youtube.com/embed/" + id + "?autoplay=1";
        document.getElementById('overlay').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }
    function closeOverlay() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('overlay-video').src = '';
        document.body.style.overflow = '';
    }
</script>

<footer style="margin: 80px 0 50px; color: #64748b; font-size: 0.8rem;">

</footer>

</body>
