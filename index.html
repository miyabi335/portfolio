<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miyabi's Portal</title>
    <style>
        body { font-family: "Meiryo", sans-serif; margin: 0; background: #0f172a; text-align: center; color: #f1f5f9; }
        .header { width: 100%; height: 35vh; overflow: hidden; background: #333; position: relative; }
        .header-img { width: 100%; height: 100%; object-fit: cover; }
        .header-title { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2rem; text-shadow: 0 2px 10px #000; }
        
        .section-title { margin-top: 30px; padding: 10px; background: rgba(255,255,255,0.05); color: #94a3b8; font-weight: bold; }

        /* ボタンの配置 */
        .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-width: 900px; margin: 20px auto; padding: 0 15px; }
        .nav-btn { 
            display: flex; align-items: center; justify-content: center; min-height: 45px; 
            background: rgba(255,255,255,0.1); color: #38bdf8; border: 1px solid #38bdf8; 
            border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 0.85em; 
        }
        /* No.10だけオレンジ */
        .special { background: #fb8c00 !important; color: #fff !important; border: 2px solid #fff !important; }

        @media (max-width: 768px) { .nav-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <header class="header">
        <img src="fuji00001.jpg" class="header-img">
        <h1 class="header-title">MIYABI'S PORTAL</h1>
    </header>

    <div class="section-title">MENU</div>
    <nav class="nav-grid">
        <a href="no1.html" class="nav-btn">No.1</a>
        <a href="no2.html" class="nav-btn">No.2</a>
        <a href="no3.html" class="nav-btn">No.3</a>
        <a href="no4.html" class="nav-btn">No.4</a>
        <a href="no5.html" class="nav-btn">No.5</a>
        <a href="no6.html" class="nav-btn">No.6</a>
        <a href="no7.html" class="nav-btn">No.7</a>
        <a href="no8.html" class="nav-btn">No.8</a>
        <a href="no9.html" class="nav-btn">No.9</a>
        <a href="no10.html" class="nav-btn special">Links集 (No.10)</a>
    </nav>
</body>
</html>
