
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miyabi's Portal</title>
    <style>
        body { font-family: "Meiryo", sans-serif; margin: 0; background: #0f172a; text-align: center; color: #f1f5f9; }
        .header-container { position: relative; width: 100%; height: 35vh; background: #333; overflow: hidden; }
        .header-image { width: 100%; height: 100%; object-fit: cover; }
        .section-title { margin-top: 40px; padding: 12px; background: rgba(255,255,255,0.05); color: #94a3b8; font-weight: bold; }

        .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-width: 950px; margin: 20px auto; padding: 0 15px; }
        
        /* リンクを確実に反応させるスタイル */
        .nav-link { 
            display: block; /* 範囲いっぱいに広げる */
            line-height: 45px;
            text-decoration: none; 
            border-radius: 8px; font-weight: bold; font-size: 0.85em;
            background: rgba(255,255,255,0.1); color: #38bdf8; border: 1px solid #38bdf8;
            transition: 0.2s;
        }
        .nav-link:hover { background: rgba(56, 189, 248, 0.2); border-color: #fff; }
        .special-link { background: #fb8c00 !important; color: #fff !important; border: 2px solid #fff !important; }

        .sansei-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-width: 950px; margin: 20px auto; padding: 0 15px; }
        .sansei-btn { background: #fb8c00; color: #fff; border: none; padding: 15px 5px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 0.8em; display: block; }

        .grid-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; max-width: 1100px; margin: 20px auto; padding: 0 15px; }
        .thumb-media { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 10px; }

        @media (max-width: 768px) { .nav-grid, .sansei-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
