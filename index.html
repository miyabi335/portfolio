<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIYABI'S PORTAL</title>
    <style>
        /* 全体設定 */
        * { box-sizing: border-box; }
        body { 
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            margin: 0; background: #020617; text-align: center; color: #e2e8f0; overflow-x: hidden;
            line-height: 1.8;
        }

        /* --- ヘッダー：背景画像 + タイトル --- */
        .main-header {
            width: 100%;
            height: 450px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background-color: #000;
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('portfolio/photosa/head02.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border-bottom: 4px solid #fb8c00;
        }

        .main-header h1 {
            font-size: 3.5rem;
            letter-spacing: 0.4em;
            color: #ffffff;
            margin: 0;
            font-weight: 900;
            text-shadow: 0 0 25px rgba(0,0,0,1), 0 5px 15px rgba(251, 140, 0, 0.4);
            z-index: 10;
        }

        /* メインコンテンツ枠（しっかり幅を確保） */
        .main-wrapper { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 40px 20px 100px; 
            text-align: left; 
        }

        /* セクション見出し */
        .section-title { 
            margin: 80px 0 30px; 
            padding: 15px 0; 
            font-weight: bold; 
            font-size: 1.8rem;
            color: #f8fafc; 
            border-bottom: 2px solid rgba(255,255,255,0.1); 
            letter-spacing: 0.1em;
        }
        .section-title.sansei { color: #fb8c00; border-bottom-color: rgba(251, 140, 0, 0.4); }

        /* グリッドレイアウト */
        .grid-5col { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-bottom: 30px; }
        .grid-4col { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }

        /* ボタンデザイン */
        .nav-btn, .sansei-btn { 
            display: flex; align-items: center; justify-content: center; 
            padding: 15px 5px; border-radius: 12px; text-decoration: none; 
            font-weight: 900; font-size: 1.1rem; transition: 0.3s; 
            min-height: 85px; text-align: center;
        }
        .nav-btn { 
            background: rgba(56, 189, 248, 0.08); 
            color: #38bdf8; 
            border: 2px solid rgba(56, 189, 248, 0.2); 
        }
        .nav-btn:hover { 
            background: rgba(56, 189, 248, 0.2); 
            border-color: #38bdf8; 
            transform: translateY(-5px); 
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.2);
        }
        .nav-link-special { 
            background: rgba(251, 140, 0, 0.12) !important; 
            color: #fb8c00 !important; 
            border-color: #fb8c00 !important; 
        }

        .sansei-btn { 
            background: #fb8c00; 
            color: #fff; 
            border: none; 
            box-shadow: 0 5px 0 #c2410c; 
        }
        .sansei-btn:hover { 
            background: #f97316; 
            transform: translateY(-3px); 
            box-shadow: 0 2px 0 #c2410c; 
        }

        /* メディアアイテム */
        .photo-item, .video-item { 
            width: 100%; 
            aspect-ratio: 16/9; 
            object-fit: cover; 
            border-radius: 12px; 
            transition: 0.4s; 
            border: 1px solid rgba(255,255,255,0.1);
            background: #000;
        }
        .video-item { cursor: pointer; }
        .video-item:hover { 
            transform: scale(1.05); 
            border-color: #fb8c00; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* 動画オーバーレイ（フル画面） */
        #overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); align-items: center; justify-content: center; z-index: 10000; 
        }
        #overlay-content { width: 95%; max-width: 1200px; text-align: center; }
        #overlay-video { width: 100%; aspect-ratio: 16/9; border-radius: 10px; box-shadow: 0 0 50px rgba(251, 140, 0, 0.3); }
        .close-btn { 
            margin-top: 30px; background: #ef4444; color: #fff; border: none; 
            padding: 15px 60px; border-radius: 50px; cursor: pointer; font-weight: bold; 
            transition: 0.3s;
        }
        .close-btn:hover { background: #b91c1c; transform: scale(1.1); }

        /* スマホ対応 */
        @media (max-width: 1024px) {
            .grid-5col, .grid-4col { grid-template-columns: repeat(2, 1fr); }
            .main-header { height: 250px; }
            .main-header h1 { font-size: 1.8rem; letter-spacing: 0.2em; }
        }
    </style>
</head>
<body>

<div id="overlay" onclick="closeOverlay()">
    <div id="overlay-content" onclick="event.stopPropagation()">
        <iframe id="overlay-video" src="" frameborder="0" allowfullscreen></iframe><br>
        <button class="close-btn" onclick="closeOverlay()">× CLOSE PLAYER</button>
    </div>
</div>

<script>
    // 動画を開く
    function openVideo(id) {
        const video = document.getElementById('overlay-video');
        video.src = "https://www.youtube.com/embed/" + id + "?autoplay=1&rel=0";
        document.getElementById('overlay').style.display = 'flex';
        document.body.style.overflow = 'hidden'; // 背後のスクロールを止める
    }
    // 動画を閉じる
    function closeOverlay() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('overlay-video').src = '';
        document.body.style.overflow = ''; // スクロール再開
    }
</script>
