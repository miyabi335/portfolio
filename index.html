<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miyabi's Portal</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f5f5f7; text-align: center; color: #333; overflow-x: hidden; }
        .header-container { position: relative; width: 100%; height: 35vh; overflow: hidden; background: #333; }
        .header-image { width: 100%; height: 100%; object-fit: cover; }
        .header-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.6); }
        
        /* 共通グリッド（ボタン用：5列） */
        .btn-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 12px; 
            max-width: 950px; 
            margin: 0 auto; 
            padding: 0 15px; 
        }

        /* メインボタン (No.1-10) */
        .nav-container { margin-top: 25px; margin-bottom: 20px; }
        .nav-btn { 
            background: #fff; color: #007aff; border: 2px solid #007aff; 
            padding: 15px 5px; border-radius: 15px; text-decoration: none; 
            font-weight: bold; font-size: 1.1em; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .nav-btn.special { background: #fb8c00; color: #fff; border-color: #ef6c00; }
        .nav-btn:hover { opacity: 0.8; transform: translateY(-1px); }

        /* スリムな参政党ボタン（2段構成・薄い橙色） */
        .sub-nav-container { margin-bottom: 40px; gap: 10px; }
        .sub-btn { 
            background: transparent; color: #ef6c00; border: 2px solid #ffcc80; 
            padding: 12px 0; border-radius: 12px; text-decoration: none; 
            font-size: 0.9em; font-weight: bold; 
            display: flex; align-items: center; justify-content: center;
            white-space: nowrap;
        }
        .sub-btn:hover { background: #fff3e0; }

        /* セクションタイトルの共通デザイン */
        .section-title { margin-top: 30px; padding: 10px; background: #fff; border-bottom: 1px solid #ddd; font-size: 0.9em; clear: both; }
        
        /* PHOTOSグリッド（女性モデル4枚横並び） */
        .photo-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); /* 4列固定 */
            gap: 15px; /* 写真同士の間隔を少し広く */
            max-width: 1200px; /* 最大横幅 */
            margin: 25px auto 50px auto; /* 上下の余白 */
            padding: 0 15px; 
        }
        .photo-item { 
            width: 100%; 
            aspect-ratio: 3/4; /* 女性モデルが見やすい縦長の比率 */
            object-fit: cover; /* 画像を枠いっぱいにトリミング表示 */
            border-radius: 15px; /* 角を少し丸く */
            cursor: pointer; /* マウスを乗せると指マークに */
            transition: all 0.3s ease; /* ホバー時のアニメーション */
            box-shadow: 0 5px 15px rgba(0,0,0,0.15); /* 少し強めの影 */
        }
        .photo-item:hover { transform: scale(1.05); box-shadow: 0 8px 25px rgba(0,0,0,0.2); } /* ホバーで少し大きく */
        
        /* ライトボックス（拡大表示画面） */
        #lightbox { 
            display: none; /* 通常は非表示 */
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); /* 背景を暗く */
            align-items: center; justify-content: center; 
            z-index: 1000; /* 一番手前に表示 */
            cursor: zoom-out; /* クリックで閉じるマーク */
        }
        #lightbox img { 
            max-width: 90%; /* 画面幅の90%まで */
            max-height: 90%; /* 画面高さの90%まで */
            object-fit: contain; /* 画像全体を表示 */
            border-radius: 10px; 
            box-shadow: 0 0 30px rgba(255,255,255,0.2); 
            animation: zoomIn 0.3s ease; /* ズームインアニメーション */
        }

        /* アニメーション定義 */
        @keyframes zoomIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* スマホ対応 */
        @media (max-width: 600px) {
            .btn-grid { gap: 6px; padding: 0 8px; }
            .nav-btn { font-size: 0.8em; padding: 12px 1px; border-radius: 10px; }
            .sub-btn { font-size: 0.65em; padding: 10px 0; border-radius: 8px; }
            
            /* スマホでは2列×2段にする（見やすさ重視） */
            .photo-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
        }
    </style>
</head>
<body>

<header class="header-container">
    <img src="fuji00001.jpg" alt="Header" class="header-image">
    <div class="header-text"><h1>MY PORTFOLIO</h1></div>
</header>

<div class="nav-container btn-grid">
    <a href="no1.html" class="nav-btn">No.1</a>
    <a href="no2.html" class="nav-btn">No.2</a>
    <a href="no3.html" class="nav-btn">No.3</a>
    <a href="no4.html" class="nav-btn">No.4</a>
    <a href="no5.html" class="nav-btn">No.5</a>
    <a href="no6.html" class="nav-btn">No.6</a>
    <a href="no7.html" class="nav-btn">No.7</a>
    <a href="no8.html" class="nav-btn">No.8</a>
    <a href="no9.html" class="nav-btn">No.9</a>
    <a href="no10.html" class="nav-btn special">Links</a>
</div>

<div class="section-title"><h3>参政党リンク</h3></div>

<div class="sub-nav-container btn-grid" style="margin-top: 20px;">
    <a href="https://sanseito.jp/" target="_blank" class="sub-btn">公式サイト</a>
    <a href="https://sanseito.jp/news/" target="_blank" class="sub-btn">最新ニュース</a>
    <a href="https://info.sanseito.jp/" target="_blank" class="sub-btn">イベント</a>
    <a href="https://sanseito.jp/member/" target="_blank" class="sub-btn">メンバー</a>
    <a href="https://sanseito.jp/2020/candidate/" target="_blank" class="sub-btn">候補予定者</a>
    <a href="https://www.youtube.com/@sanseito-official" target="_blank" class="sub-btn">YouTube</a>
    <a href="https://x.com/sansei411" target="_blank" class="sub-btn">X(Twitter)</a>
    <a href="https://www.instagram.com/sanseito" target="_blank" class="sub-btn">Instagram</a>
    <a href="https://www.tiktok.com/@sanseito" target="_blank" class="sub-btn">TikTok</a>
    <a href="https://go2senkyo.com/articles/tag/%E5%8F%82%E6%94%BF%E5%85%9A" target="_blank" class="sub-btn">選挙ドットコム</a>
</div>

<div class="section-title"><h3>MODEL GALLERY</h3></div>
<div class="photo-grid">
    <img src="model01.jpg" alt="Model 1" class="photo-item" onclick="openLightbox(this.src)">
    <img src="model02.jpg" alt="Model 2" class="photo-item" onclick="openLightbox(this.src)">
    <img src="model03.jpg" alt="Model 3" class="photo-item" onclick="openLightbox(this.src)">
    <img src="model04.jpg" alt="Model 4" class="photo-item" onclick="openLightbox(this.src)">
</div>

<div id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="" alt="Enlarged Photo">
</div>

<script>
    // ライトボックスを開く関数
    function openLightbox(imageSrc) {
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        lightboxImg.src = imageSrc; // クリックされた画像のURLをセット
        lightbox.style.display = 'flex'; // ライトボックスを表示
        document.body.style.overflow = 'hidden'; // 背面のスクロールを禁止
    }

    // ライトボックスを閉じる関数
    function closeLightbox() {
        const lightbox = document.getElementById('lightbox');
        lightbox.style.display = 'none'; // ライトボックスを非表示
        document.body.style.overflow = ''; // スクロール禁止を解除
    }
</script>

</body>
</html>
