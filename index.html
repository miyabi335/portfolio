<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Managed Portfolio Max</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f5f5f7; text-align: center; color: #333; }
        
        /* ヘッダー */
        .header-container { position: relative; width: 100%; height: 35vh; overflow: hidden; background: #333; }
        .header-image { width: 100%; height: 100%; object-fit: cover; }
        .header-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.6); }

        /* 10個のナビボタン（5列×2行） */
        .nav-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-width: 900px; margin: 20px auto; padding: 0 15px; }
        .nav-btn { background: #fff; color: #007aff; border: 2px solid #007aff; padding: 10px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 0.8em; }

        .section-title { margin-top: 40px; padding: 15px; background: #fff; border-bottom: 1px solid #ddd; }
        
        /* 📸 写真5列グリッド (50枚) */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 8px; 
            padding: 15px; 
            max-width: 1200px; 
            margin: 0 auto;
        }
        .grid img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 5px; cursor: pointer; background: #eee; }

        /* 🎬 動画グリッド (50本) */
        .v-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; padding: 15px; }
        .v-card { background: #000; border-radius: 12px; overflow: hidden; aspect-ratio: 16/9; }
        iframe { width: 100%; height: 100%; border: none; }

        /* 拡大表示 */
        #lb { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); align-items:center; justify-content:center; z-index:999; }
        #lb img { max-width:95%; max-height:95%; }

        /* スマホ用レスポンシブ */
        @media (max-width: 600px) { 
            .grid { grid-template-columns: repeat(3, 1fr); } 
            .nav-container { grid-template-columns: repeat(2, 1fr); }
            .header-container { height: 25vh; }
        }
    </style>
</head>
<body>

<header class="header-container">
    <img src="fuji00001.jpg" alt="Header" class="header-image">
    <div class="header-text"><h1>MY PORTFOLIO</h1></div>
</header>

<div class="nav-container">
    <a href="no1.html" class="nav-btn">No.1(Links)</a>
    <a href="no2.html" class="nav-btn">No.2</a><a href="no3.html" class="nav-btn">No.3</a>
    <a href="no4.html" class="nav-btn">No.4</a><a href="no5.html" class="nav-btn">No.5</a>
    <a href="no6.html" class="nav-btn">No.6</a><a href="no7.html" class="nav-btn">No.7</a>
    <a href="no8.html" class="nav-btn">No.8</a><a href="no9.html" class="nav-btn">No.9</a>
    <a href="no10.html" class="nav-btn">No.10</a>
</div>

<div class="section-title"><h2>PHOTOS (50)</h2></div>
<div class="grid">
    <img src="fuji00001.jpg" onclick="openLb(this.src)">
    <script>
        for(let i=2; i<=50; i++) {
            document.write(`<img src="p${i}.jpg" onclick="openLb(this.src)" onerror="this.style.display='none'">`);
        }
    </script>
</div>

<div class="section-title"><h2>VIDEOS (50)</h2></div>
<div class="v-grid">
    <script>
        for(let i=1; i<=50; i++) {
            document.write(`<div class="v-card"><iframe src="https://www.youtube.com/embed/動画ID${i}"></iframe></div>`);
        }
    </script>
</div>

<div id="lb" onclick="this.style.display='none'"><img id="lbi"></div>

<script>
    function openLb(s){ 
        document.getElementById('lbi').src = s; 
        document.getElementById('lb').style.display = 'flex'; 
    }
</script>

<footer><p>&copy; 2026 Managed Portfolio v3.0</p></footer>

</body>
</html>
