<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio 20x20</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f5f5f7; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; padding: 20px; }
        .grid img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; cursor: pointer; }
        .v-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 20px; }
        .v-card { background: #000; border-radius: 15px; overflow: hidden; aspect-ratio: 16/9; }
        iframe { width: 100%; height: 100%; border: none; }
        /* 拡大画面 */
        #lb { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); align-items:center; justify-content:center; z-index:99; }
        #lb img { max-width:90%; max-height:90%; }
    </style>
</head>
<body>

<h1>PHOTO GALLERY (20)</h1>
<div class="grid">
    <img src="p1.jpg" onclick="openLb(this.src)"><img src="p2.jpg" onclick="openLb(this.src)">
    <img src="p3.jpg" onclick="openLb(this.src)"><img src="p4.jpg" onclick="openLb(this.src)">
    <img src="p5.jpg" onclick="openLb(this.src)"><img src="p6.jpg" onclick="openLb(this.src)">
    <img src="p7.jpg" onclick="openLb(this.src)"><img src="p8.jpg" onclick="openLb(this.src)">
    <img src="p9.jpg" onclick="openLb(this.src)"><img src="p10.jpg" onclick="openLb(this.src)">
    <img src="p11.jpg" onclick="openLb(this.src)"><img src="p12.jpg" onclick="openLb(this.src)">
    <img src="p13.jpg" onclick="openLb(this.src)"><img src="p14.jpg" onclick="openLb(this.src)">
    <img src="p15.jpg" onclick="openLb(this.src)"><img src="p16.jpg" onclick="openLb(this.src)">
    <img src="p17.jpg" onclick="openLb(this.src)"><img src="p18.jpg" onclick="openLb(this.src)">
    <img src="p19.jpg" onclick="openLb(this.src)"><img src="p20.jpg" onclick="openLb(this.src)">
</div>

<h1>VIDEO ARCHIVE (20)</h1>
<div class="v-grid">
    <div class="v-card"><iframe src="https://www.youtube.com/embed/動画ID1"></iframe></div>
    <div class="v-card"><iframe src="https://www.youtube.com/embed/動画ID2"></iframe></div>

    <div class="v-card"><iframe src="https://www.youtube.com/embed/動画ID7"></iframe></div>
    <div class="v-card"><iframe src="https://www.youtube.com/embed/動画ID8"></iframe></div>
    <div class="v-card"><iframe src="https://www.youtube.com/embed/動画ID9"></iframe></div>
    <div class="v-card"><iframe src="https://www.youtube.com/embed/動画ID10"></iframe></div>
    <div class="v-card"><iframe src="https://www.youtube.com/embed/動画ID11"></iframe></div>
    <div class="v-card"><iframe src="https://www.youtube.com/embed/動画ID12"></iframe></div>

<div id="lb" onclick="this.style.display='none'"><img id="lbi"></div>
<script>
    function openLb(s){ document.getElementById('lbi').src=s; document.getElementById('lb').style.display='flex'; }
</script>
</body>
</html>
