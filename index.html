    <style>
        body { font-family: "Meiryo", sans-serif; margin: 0; background: #0f172a; text-align: center; color: #f1f5f9; padding-bottom: 50px; }
        
        /* ヘッダー：富士山 */
        .header-container { position: relative; width: 100%; height: 35vh; background: #333; overflow: hidden; }
        .header-image { width: 100%; height: 100%; object-fit: cover; }
        .header-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; text-shadow: 0 2px 15px rgba(0,0,0,0.8); width: 100%; }
        .header-text h1 { margin: 0; font-size: 2rem; }

        .section-title { margin-top: 40px; padding: 12px; background: rgba(255,255,255,0.05); color: #94a3b8; font-weight: bold; font-size: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); }

        /* ナビゲーション（No.1〜10） */
        .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-width: 950px; margin: 20px auto; padding: 0 15px; }
        .nav-btn { display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); color: #38bdf8; border: 1px solid #38bdf8; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 0.8rem; min-height: 45px; transition: 0.2s; }
        .nav-btn:hover { background: rgba(56, 189, 248, 0.2); transform: translateY(-2px); }
        .special-link { background: #fb8c00 !important; color: #fff !important; border: 2px solid #fff !important; }

        /* 参政党ボタン：5個×2列 */
        .sansei-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-width: 950px; margin: 20px auto; padding: 0 15px; }
        .sansei-btn { background: #fb8c00; color: #fff; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 0.7rem; min-height: 50px; display: flex; align-items: center; justify-content: center; transition: 0.2s; padding: 5px; }
        .sansei-btn:hover { background: #ef6c00; transform: translateY(-2px); }

        /* ★共通グリッド設定：4枚×2列（計8枚） */
        .gallery-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); /* 4列固定 */
            gap: 15px; 
            max-width: 1100px; 
            margin: 20px auto; 
            padding: 0 15px; 
        }

        /* ★写真サムネイル */
        .photo-thumb { 
            width: 100%; 
            aspect-ratio: 1/1; /* 正方形にする */
            object-fit: cover; 
            border-radius: 12px; 
            border: 2px solid rgba(255,255,255,0.1); 
            transition: 0.3s; 
        }
        .photo-thumb:hover { transform: scale(1.05); border-color: #38bdf8; }

        /* ★動画サムネイル */
        .video-thumb { 
            width: 100%; 
            aspect-ratio: 16/9; /* 横長（YouTubeサイズ） */
            object-fit: cover; 
            border-radius: 12px; 
            border: 2px solid rgba(255,255,255,0.1); 
            transition: 0.3s; 
        }
        .video-thumb:hover { transform: scale(1.05); border-color: #fb8c00; }

        /* スマホ対応（2列にする） */
        @media (max-width: 768px) {
            .nav-grid { grid-template-columns: repeat(2, 1fr); }
            .sansei-grid { grid-template-columns: repeat(2, 1fr); }
            .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; } /* スマホは2列 */
        }
    </style>
</head>
