<!DOCTYPE html>
<html lang="ja">
<head>

    <title>Miyabi's Python Portfolio</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: 40px auto; padding: 20px; background-color: #f0f2f5; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }

        .tool { margin-bottom: 25px; padding: 15px; border-left: 5px solid #007bff; background: #f8fbff; }

    </style>
</head>
<body>
    <div class="card">
        <h1>Python 開発ポートフォリオ</h1>
        <p>これまで開発してきたデスクトップアプリの紹介ページです。</p>

        <div class="tool">
            <h2>MyPad Ultimate <span class="badge">Python / Tkinter</span></h2>
            <p>音量調節、画面の明るさ、アプリのクイック起動を統合した多機能ランチャー。</p>
        </div>

        <div class="tool">
            <h2>YouTube Downloader <span class="badge">Python</span></h2>
            <p>高音質での音声抽出や、メタデータを自動で埋め込むメディアダウンロードツール。</p>
        </div>
    </div>

</html>
