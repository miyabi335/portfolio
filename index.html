<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Managed Portfolio Manual</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f5f5f7; text-align: center; color: #333; }
        .header-container { position: relative; width: 100%; height: 40vh; overflow: hidden; background: #333; }
        .header-image { width: 100%; height: 100%; object-fit: cover; }
        .header-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.6); }
        
        /* ナビゲーション：5列2行で綺麗に並ぶように調整 */
        .nav-container { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 10px; 
            max-width: 900px; 
            margin: 20px auto; 
            padding: 0 15px; 
        }
        .nav-btn { 
            background: #fff; 
            color: #007aff; 
            border: 2px solid #007aff; 
            padding: 10px 5px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 0.8em; 
            transition: 0.2s;
        }
        .nav-btn:hover { background: #007aff; color: #fff; }

        .section-title { margin-top: 40px; padding: 15px; background: #fff; border-bottom: 1px solid #ddd; }

        /* グリッド設定：5列に固定 */
        .grid-5col { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 10px; 
            padding: 15px; 
            max-width: 1200px; 
            margin: 0 auto;
        }

        /* 写真スタイル */
        .grid-5col img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 8px; cursor: pointer; background: #eee; }
        
        /* 動画カードスタイル */
        .v-card { background: #000; border-radius: 12px; overflow: hidden; aspect-ratio: 16/9; }
        iframe { width: 100%; height: 100%; border: none; }

        /* ライトボックス */
        #lb { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); align-items:center; justify-content:center; z-index:999; }
        #lb img { max-width:95%; max-height:95%; object-fit: contain; }
    </style>
</head>
<body>

<header class="header-container">
    <img src="p1.jpg" alt="Header" class="header-image">
    <div class="header-text"><h1>MY PORTFOLIO</h1></div>
</header>

<div class="nav-container">
    <a href="no1.html" class="nav-btn">No.1(Links)</a>
    <a href="no2.html" class="nav-btn">No.2</a>
    <a href="no3.html" class="nav-btn">No.3</a>
    <a href="no4.html" class="nav-btn">No.4</a>
    <a href="no.5.html" class="nav-btn">No.5</a> <a href="no6.html" class="nav-btn">No.6</a>
    <a href="no7.html" class="nav-btn">No.7</a>
    <a href="no8.html" class="nav-btn">No.8</a>
    <a href="no9.html" class="nav-btn">No.9</a>
    <a href="no10.html" class="nav-btn">No.10</a>
</div>

<div class="section-title"><h2>PHOTOS (50)</h2></div>
<div class="grid-5col">
    <script>
        for (let i = 1; i <= 50; i++) {
            document.write(`<img src="p${i}.jpg" onclick="openLb(this.src)" alt="Photo ${i}">`);
        }
    </script>
</div>

<div class="section-title"><h2>VIDEOS (40)</h2></div>
<div class="grid-5col">
    <script>
        for (let i = 1; i <= 40; i++) {
            // 「動画ID」の部分は実際のYouTube IDに書き換えてください
            document.write(`<div class="v-card"><iframe src="https://www.youtube.com/embed/動画ID${i}" allowfullscreen></iframe></div>`);
        }
    </script>
</div>

<div id="lb" onclick="this.style.display='none'"><img id="lbi" src="" alt="Zoomed View"></div>

<script>
    function openLb(s){
        document.getElementById('lbi').src = s;
        document.getElementById('lb').style.display = 'flex';
    }
</script>

</body>
</html>
