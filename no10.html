<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>参政党 ＆ 出張便利リンク集</title>
    <style>
        /* 崩れないための基本設定 */
        body { font-family: "Meiryo", "Hiragino Kaku Gothic ProN", sans-serif; margin: 0; background: #0f172a; text-align: center; color: #f1f5f9; padding-bottom: 50px; }
        
        /* ヘッダー的なタイトル */
        .page-header { background: #fb8c00; color: #fff; padding: 20px; margin-bottom: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .page-header h1 { margin: 0; font-size: 1.5rem; }

        .section-title { margin-top: 40px; margin-bottom: 15px; color: #fb8c00; font-weight: bold; font-size: 1.1rem; border-left: 5px solid #fb8c00; display: inline-block; padding-left: 10px; width: 90%; text-align: left; }

        /* リンクボタンのグリッド（崩れない設定） */
        .link-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 15px; 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 0 20px; 
        }
        
        /* ボタンのデザイン */
        .link-btn { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 60px; 
            background: #ffffff; 
            color: #fb8c00; 
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: bold; 
            border: 2px solid #fb8c00; 
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        /* ホバー（マウスを乗せた時） */
        .link-btn:hover { background: #fb8c00; color: #fff; transform: translateY(-3px); box-shadow: 0 6px 12px rgba(251, 140, 0, 0.3); }

        /* 「戻る」ボタン */
        .back-home { 
            display: inline-block; 
            margin-top: 60px; 
            padding: 15px 50px; 
            background: #475569; 
            color: #fff; 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: bold; 
            transition: 0.3s;
        }
        .back-home:hover { background: #1e293b; }

        /* スマホ対応（2列にする） */
        @media (max-width: 480px) {
            .link-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .link-btn { font-size: 0.85rem; padding: 5px; }
        }
    </style>
</head>
<body>

    <header class="page-header">
        <h1>LINKS ARCHIVE (No.10)</h1>
    </header>

    <div class="section-title">参政党 オフィシャルリンク</div>
    <div class="link-grid">
        <a href="https://sanseito.jp/" target="_blank" class="link-btn">公式サイト</a>
        <a href="https://www.youtube.com/@sanseito-official" target="_blank" class="link-btn">YouTube</a>
        <a href="https://x.com/sansei411" target="_blank" class="link-btn">公式X</a>
        <a href="https://www.instagram.com/sanseito" target="_blank" class="link-btn">Instagram</a>
        <a href="https://www.tiktok.com/@sanseito" target="_blank" class="link-btn">TikTok</a>
        <a href="https://go2senkyo.com/articles/tag/%E5%8F%82%E6%94%BF%E5%85%9A" target="_blank" class="link-btn">選挙ドットコム</a>
    </div>

    <div class="section-title">出張・お出かけ便利リンク</div>
    <div class="link-grid">
        <a href="https://www.ekinet.com/" target="_blank" class="link-btn">えきねっと</a>
        <a href="https://www.jalan.net/" target="_blank" class="link-btn">じゃらんnet</a>
        <a href="https://weather.yahoo.co.jp/weather/" target="_blank" class="link-btn">Yahoo!天気</a>
        <a href="https://www.google.co.jp/maps" target="_blank" class="link-btn">Googleマップ</a>
        <a href="https://transit.yahoo.co.jp/" target="_blank" class="link-btn">乗換案内</a>
    </div>

    <a href="index.html" class="back-home">← メイン画面へ戻る</a>

</body>
</html>
