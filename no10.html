<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links ARCHIVE</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: "Meiryo", sans-serif; background: #0f172a; color: #fff; text-align: center; margin: 0; padding-bottom: 50px; }
        .orange-bar { background: #fb8c00; padding: 25px; font-weight: bold; font-size: 1.5rem; margin-bottom: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        .container { max-width: 600px; margin: 0 auto; padding: 0 20px; }
        .sub-title { text-align: left; color: #fb8c00; margin: 30px 0 10px; font-weight: bold; border-left: 4px solid #fb8c00; padding-left: 10px; }

        /* 絶対に崩れない縦並びボタン */
        .link-item { 
            display: block; width: 100%; padding: 18px; margin-bottom: 12px;
            background: #fff; color: #fb8c00; text-decoration: none;
            border-radius: 12px; font-weight: bold; border: 3px solid #fb8c00;
            font-size: 1.1rem; transition: 0.2s;
        }
        .link-item:hover { background: #fb8c00; color: #fff; transform: scale(1.02); }

        .back-home { display: inline-block; margin-top: 40px; padding: 12px 40px; background: #475569; color: #fff; text-decoration: none; border-radius: 50px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="orange-bar">参政党 ＆ 便利リンク (No.10)</div>
    
    <div class="container">
        <div class="sub-title">参政党 公式</div>
        <a href="https://sanseito.jp/" target="_blank" class="link-item">公式サイト</a>
        <a href="https://www.youtube.com/@sanseito-official" target="_blank" class="link-item">YouTube</a>
        <a href="https://x.com/sansei411" target="_blank" class="link-item">公式X</a>

        <div class="sub-title">出張・便利</div>
        <a href="https://www.ekinet.com/" target="_blank" class="link-item">えきねっと</a>
        <a href="https://www.jalan.net/" target="_blank" class="link-item">じゃらんnet</a>
        <a href="https://www.google.co.jp/maps" target="_blank" class="link-item">Googleマップ</a>
    </div>

    <a href="index.html" class="back-home">← ホーム画面に戻る</a>
</body>
</html>
