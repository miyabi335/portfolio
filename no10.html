<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Links - No.10</title>
    <style>
        body { font-family: "Meiryo", sans-serif; margin: 0; background: #0f172a; text-align: center; color: #f1f5f9; padding-bottom: 50px; }
        
        /* ヘッダー */
        .page-header { background: #1e293b; padding: 20px 0; border-bottom: 2px solid #38bdf8; margin-bottom: 20px; }
        .page-header h1 { margin: 0; font-size: 1.5rem; color: #38bdf8; }

        /* Google検索窓：より頑丈なデザイン */
        .search-container { max-width: 600px; margin: 20px auto 30px; padding: 0 15px; }
        .search-form { display: flex; align-items: center; background: #1e293b; border: 2px solid #38bdf8; border-radius: 50px; padding: 5px 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .search-input { flex: 1; background: transparent; border: none; color: white; padding: 12px; font-size: 1rem; outline: none; min-width: 100px; }
        .search-btn { background: #38bdf8; border: none; color: #0f172a; padding: 10px 20px; border-radius: 40px; font-weight: bold; cursor: pointer; white-space: nowrap; }

        .section-title { margin: 30px auto 15px; padding: 10px; background: rgba(255,255,255,0.05); color: #94a3b8; font-weight: bold; font-size: 0.9rem; text-align: left; max-width: 950px; border-left: 4px solid #fb8c00; }

        /* ★ボタンエリア：確実に表示されるよう設定 */
        .link-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); /* 画面に合わせて自動調整 */
            gap: 12px; 
            max-width: 950px; 
            margin: 0 auto 30px; 
            padding: 0 15px; 
        }

        /* 共通ボタンボタン */
        .btn-base { 
            display: flex; align-items: center; justify-content: center; 
            text-decoration: none; border-radius: 8px; font-weight: bold; 
            font-size: 0.8rem; min-height: 55px; padding: 10px; transition: 0.2s; 
        }

        /* オレンジ（参政党） */
        .sansei-btn { background: #fb8c00; color: #fff; }
        .sansei-btn:hover { background: #ef6c00; transform: translateY(-2px); }

        /* ブルー（便利リンク） */
        .utility-btn { background: #334155; color: #38bdf8; border: 1px solid #38bdf8; }
        .utility-btn:hover { background: #1e293b; color: #fff; transform: translateY(-2px); }

        /* 戻るボタン */
        .back-btn { display: inline-block; margin-top: 40px; padding: 12px 40px; background: #475569; color: white; text-decoration: none; border-radius: 30px; font-weight: bold; }

        /* スマホ用：2列をキープ */
        @media (max-width: 480px) {
            .link-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
        }
    </style>
</head>
<body>

</div>

</body>
