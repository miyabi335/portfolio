<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>参政党＋リンク集</title>
    <style>
        body { 
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; 
            margin: 0; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a 60%);
            background-color: #020617; 
            background-attachment: fixed;
            text-align: center; 
            color: #f1f5f9; 
            -webkit-text-size-adjust: 100%;
        }

        .header-container { 
            width: 100%; height: 80px; display: flex; align-items: center; justify-content: center;
            background: rgba(15, 23, 42, 0.8); border-bottom: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
        }

        .header-text h1 { margin: 0; font-size: 1.5rem; font-weight: 200; letter-spacing: 0.3em; color: #fff; }

        /* --- Google検索窓エリア（元の丸いデザインを維持） --- */
        .search-area {
            max-width: 700px; /* ボタン追加に伴い少し幅を広げました */
            margin: 30px auto 10px;
            padding: 0 15px;
        }
        .search-form {
            display: flex;
            gap: 10px; /* ボタン間の間隔 */
            align-items: center;
        }
        .search-input {
            flex: 1;
            padding: 12px 20px;
            border-radius: 25px; /* 元の丸み */
            border: 2px solid #fb8c00;
            background: rgba(255, 255, 255, 0.9);
            font-size: 16px;
            color: #333;
            outline: none;
        }
        
        /* 検索ボタンとMAPボタン共通（元の丸いデザイン） */
        .search-submit, .map-btn {
            background: #fb8c00;
            color: white;
            border: none;
            padding: 0 25px;
            height: 48px; /* 入力欄と高さを合わせる */
            border-radius: 25px; /* 元の丸み */
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap; /* 文字を折り返さない */
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .search-submit:hover, .map-btn:hover { 
            background: #ef6c00; 
            transform: translateY(-2px);
        }
        
        /* ------------------------------ */
        
        .link-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 10px; 
            max-width: 1100px; 
            margin: 20px auto; 
            padding: 15px; 
            box-sizing: border-box;
        }

        .link-btn {
            background: #fff;
            color: #007aff;
            border: 2px solid #007aff;
            padding: 4px; 
            border-radius: 10px;
            text-decoration: none;
            font-size: 0.7rem; 
            font-weight: bold;
            display: flex;
            flex-direction: column; 
            align-items: center;
            justify-content: center;
            height: 100px; 
            box-sizing: border-box;
            transition: transform 0.2s, box-shadow 0.2s;
            overflow: hidden;
        }

        .btn-title { 
            font-size: 1.05rem; 
            font-weight: 900; 
            margin-top: 2px; 
            display: block;
            width: 100%;
            line-height: 1.1;
            word-break: break-all;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            letter-spacing: -0.02em;
        }

        /* カラー設定 */
        .orange-btn { background: #fff4e6; color: #d35400; border-color: #ffcc99; }
        .dark-orange-btn { background: #fb8c00; color: #fff !important; border-color: #ef6c00; }
        .blue-btn { background: #e1f5fe; color: #0277bd; border-color: #0277bd; }
        .green-btn { background: #e8f5e9; color: #2e7d32; border-color: #a5d6a7; }
        .yellow-btn { background: #fffde7; color: #827717; border-color: #fff176; }
        .purple-btn { background: #f3e5f5; color: #7b1fa2; border-color: #ce93d8; }
        .brown-btn { background: #efebe9; color: #5d4037; border-color: #bcaaa4; }
        .deep-blue-btn { background: #e0f2f1; color: #00796b; border-color: #4db6ac; }
        .red-btn { background: #ffebee; color: #c62828; border-color: #ef9a9a; }
        .dark-red-btn { background: #c62828; color: #fff !important; border-color: #b71c1c; }
        .tan-btn { background: #d7ccc8; color: #4e342e; border-color: #a1887f; }
        .black-btn { background: #1a1a1a; color: #fff !important; border-color: #000; }

        .link-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 10px rgba(0,0,0,0.5); }

        @media (max-width: 900px) { 
            .link-grid { grid-template-columns: repeat(3, 1fr); gap: 8px;} 
            .link-btn { height: 85px; }
            .btn-title { font-size: 1rem; }
        }
        @media (max-width: 600px) { 
            .link-grid { grid-template-columns: repeat(2, 1fr); gap: 6px;} 
            .link-btn { height: 80px; }
            .btn-title { font-size: 0.95rem; }
            .search-form { flex-wrap: wrap; justify-content: center; } /* モバイル時は折り返し */
            .search-input { width: 100%; margin-bottom: 10px; }
        }

        .footer-nav { margin: 40px 0; }
        .back-btn { padding: 12px 40px; color: #ccc; text-decoration: none; border: 1px solid #444; border-radius: 30px; font-weight: bold;}
    </style>
</head>
<body>

<header class="header-container">
    <div class="header-text"><h1>参政党＋出張便利リンク</h1></div>
</header>

<div class="search-area">
    <form action="https://www.google.com/search" method="get" target="_blank" class="search-form">
        <button type="button" onclick="window.open('https://www.google.com/maps', '_blank')" class="map-btn">MAP</button>
        
        <input type="text" name="q" class="search-input" placeholder="Google で検索..." required>
        
        <button type="submit" class="search-submit">検索</button>
    </form>
</div>

<div class="link-grid">
    <script>
        // --- 既存のJavaScriptによるボタン生成ロジック（変更なし） ---
        const linkData = {
            1: { name: "公式サイト", url: "https://sanseito.jp/" },
            2: { name: "最新ニュース", url: "https://sanseito.jp/news/" },
            3: { name: "イベント", url: "https://info.sanseito.jp/" },
            4: { name: "メンバー", url: "https://sanseito.jp/member/" },
            5: { name: "候補予定者", url: "https://sanseito.jp/2020/candidate/" },
            6: { name: "YouTube", url: "https://www.youtube.com/@sanseito-official" },
            7: { name: "ｘ", url: "https://x.com/sansei411" },
            8: { name: "Instagram", url: "https://www.instagram.com/sanseito" },
            9: { name: "TikTok", url: "https://www.tiktok.com/@sanseito" },
            10: { name: "選挙ドットコム", url: "https://go2senkyo.com/articles/tag/%E5%8F%82%E6%94%BF%E5%85%9A" },
            16: { name: "Yahoo Japan", url: "https://www.yahoo.co.jp/" },
            51: { name: "JR西日本", url: "https://www.jr-odekake.net/railroad/" },
            52: { name: "新幹線時刻表", url: "https://timetables.jreast.co.jp/" },
            53: { name: "駅探 時刻表", url: "https://ekitan.com/timetable/railway" },
            61: { name: "Yahoo!路線情報", url: "https://transit.yahoo.co.jp/" },
            66: { name: "ANA 航空", url: "https://www.ana.co.jp/ja/jp/" },
            67: { name: "JAL 航空", url: "https://www.jal.co.jp/jp/ja/" },
            78: { name: "楽天トラベル", url: "https://travel.rakuten.co.jp/" },
            80: { name: "じゃらんnet", url: "https://www.jalan.net/" },
            92: { name: "駅レンタカー", url: "https://www.ekiren.co.jp/" },
            93: { name: "NEXCO東日本", url: "https://www.driveplaza.com/" },
            94: { name: "NEXCO西日本", url: "https://www.w-nexco.co.jp/" },
            95: { name: "道の駅 検索", url: "https://www.michi-no-eki.jp/" },
            96: { name: "JAFナビ優待", url: "https://jafnavi.jp/" },
            97: { name: "食べログ", url: "https://tabelog.com/" },
            98: { name: "ホットペッパー", url: "https://www.hotpepper.jp/" },
            99: { name: "Retty レッティ", url: "https://retty.me/" },
            100: { name: "楽天ぐるなび", url: "https://gurunavi.com/ja" }
            // linkDataの続き（予備リンクなど）は元のコードと同じです。
        };

        // 100個のボタン生成処理（色は元の設定を維持）
        for (let i = 1; i <= 100; i++) {
            let extraClass = "";
            
            // 色分け判定（元の設定を維持）
            if (i >= 1 && i <= 15) extraClass = " dark-orange-btn"; 
            else if (i === 92) extraClass = " red-btn";
            else if (i === 96) extraClass = " dark-red-btn";
            else if (i >= 97 && i <= 100) extraClass = " orange-btn"; 
            else if ((i >= 16 && i <= 25) || (i >= 66 && i <= 75)) extraClass = " blue-btn";
            else if ((i >= 26 && i <= 35) || i === 95) extraClass = " green-btn";
            else if (i >= 36 && i <= 45) extraClass = " yellow-btn";
            else if (i >= 46 && i <= 50) extraClass = " purple-btn";
            else if ((i >= 51 && i <= 53) || (i >= 76 && i <= 78)) extraClass = " brown-btn";
            else if (i >= 54 && i <= 62) extraClass = " deep-blue-btn";
            else if ((i >= 63 && i <= 65) || (i >= 82 && i <= 91)) extraClass = " red-btn";
            else if (i >= 79 && i <= 81) extraClass = " tan-btn";
            else if (i === 93 || i === 94) extraClass = " black-btn";

            let nameLabel = "";
            let url = linkData[i] ? linkData[i].url : `link${i}.html`;
            if (linkData[i]) {
                nameLabel = `<span class="btn-title">${linkData[i].name}</span>`;
            } else {
                nameLabel = `<span class="btn-title">（予備）</span>`;
            }

            document.write(`<a href="${url}" class="link-btn${extraClass}" target="_blank">No.${i}${nameLabel}</a>`);
        }
    </script>
</div>

<div class="footer-nav">
    <a href="index.html" class="back-btn">ホーム画面へ戻る</a>
</div>

</body>
</html>
