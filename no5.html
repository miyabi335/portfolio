<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>川さん - MIYABI'S PORTAL</title>
    <style>
        body { 
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif;
            margin: 0; background: #020617; text-align: center; color: #e2e8f0; 
        }

        /* ヘッダーの枠組み（富士山と同じ高さ450pxを維持） */
        .header-container { 
            position: relative; width: 100%; height: 450px; 
            overflow: hidden; background: #000;
            display: flex; align-items: center; justify-content: center; /* 画像を中央に */
        }

        /* --- 【川さんの画像専用の調整】 --- */
        .header-image { 
            /* 横幅いっぱいにせず、高さに合わせてサイズを抑える */
            height: 80%;      /* ヘッダーの高さの80%に縮小 */
            width: auto;      /* 横幅は比率を保って自動調整 */
            max-width: 90%;   /* スマホでもはみ出さない */
            
            /* 画質をクッキリさせる設定 */
            object-fit: contain; 
            image-rendering: -webkit-optimize-contrast; 
            image-rendering: crisp-edges;

            opacity: 1.0;     /* 荒く見えないよう透明度をなくしてハッキリさせる */
            display: block;
        }

        .header-text { 
            position: absolute; bottom: 40px; right: 40px; text-align: right;
            z-index: 10;
        }
        .header-text h1 { 
            font-size: 3.5rem; letter-spacing: 0.3em; margin: 0; color: #fff;
            text-shadow: 0 0 20px rgba(0,0,0,1); 
        }

        .main-wrapper { max-width: 1400px; margin: 0 auto; padding: 0 20px; text-align: left; }

        .section-title { 
            margin-top: 70px; padding: 15px 0; font-weight: bold; font-size: 1.5rem;
            color: #f8fafc; letter-spacing: 0.1em;
            border-bottom: 2px solid #38bdf8; 
            margin-bottom: 30px;
        }

        .back-btn {
            display: inline-block; margin-top: 20px; padding: 12px 35px;
            background: rgba(56, 189, 248, 0.1); color: #38bdf8;
            border: 2px solid rgba(56, 189, 248, 0.3);
            border-radius: 50px; text-decoration: none; 
            font-weight: bold; font-size: 1rem;
            transition: 0.3s;
        }
        .back-btn:hover { background: rgba(56, 189, 248, 0.2); transform: translateX(-5px); }

        @media (max-width: 1024px) {
            .header-container { height: 320px; }
            .header-text h1 { font-size: 2rem; }
            .header-image { height: 75%; } /* スマホでもさらに少し小さくして画質維持 */
        }
    </style>
</head>
<body>

<header class="header-container">
    <img src="sa003.png" 
         onerror="this.src='sa003.PNG'" 
         alt="川さん" class="header-image">
    <div class="header-text"><h1>川さん</h1></div>
</header>

<div class="main-wrapper">
    <a href="index.html" class="back-btn">← 戻る</a>

    <div class="section-title">川さんのアーカイブ</div>
    
    <div style="background: rgba(255,255,255,0.03); padding: 30px; border-radius: 12px; font-size: 1.1rem; line-height: 1.8; color: #cbd5e1;">
        ヘッダーの「川さん」画像を引き伸ばさず、本来の画質を活かして表示するように調整しました。<br>
        富士山（ホーム画面）のレイアウトは一切変えていません。
    </div>
</div>

</body>
</html>
