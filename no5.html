
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>川さん - MIYABI'S PORTAL</title>
    <style>
        /* ホーム画面のスタイルを完全継承 */
        body { 
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            margin: 0; background: #020617; text-align: center; color: #e2e8f0; 
        }

        /* ヘッダー： sa003.png を使用 */
        .header-container { 
            position: relative; width: 100%; height: 450px; 
            overflow: hidden; background: #000;
        }
        .header-image { 
            width: 100%; height: 100%; object-fit: cover;
            object-position: center 30%; opacity: 0.8;
        }
        .header-text { 
            position: absolute; bottom: 40px; right: 40px; text-align: right;
        }
        .header-text h1 { 
            font-size: 3.5rem; letter-spacing: 0.3em; margin: 0; color: #fff;
            text-shadow: 0 0 20px rgba(0,0,0,1); 
        }

        .main-wrapper { max-width: 1400px; margin: 0 auto; padding: 0 20px; text-align: left; }

        /* セクション見出し */
        .section-title { 
            margin-top: 70px; padding: 15px 0; font-weight: bold; font-size: 1.5rem;
            color: #f8fafc; letter-spacing: 0.1em;
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            margin-bottom: 30px;
        }

        /* 戻るボタン */
        .back-btn {
            display: inline-block; margin-top: 20px; padding: 10px 30px;
            background: rgba(56, 189, 248, 0.1); color: #38bdf8;
            border: 2px solid rgba(56, 189, 248, 0.3);
            border-radius: 8px; text-decoration: none; font-weight: bold;
            transition: 0.3s;
        }
        .back-btn:hover { background: rgba(56, 189, 248, 0.2); border-color: #38bdf8; }

        @media (max-width: 1024px) {
            .header-container { height: 300px; }
            .header-text h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

<header class="header-container">
    <img src="sa003.png" alt="川さんヘッダー" class="header-image">
    <div class="header-text"><h1>川さん</h1></div>
</header>

<div class="main-wrapper">
    <a href="index.html" class="back-btn">← ポータルへ戻る</a>

    <div class="section-title">川さんのコンテンツ</div>
    <p style="font-size: 1.2rem; line-height: 1.8; color: #cbd5e1;">
        ここに川さんに関するコンテンツ（写真や動画、説明文など）を配置します。<br>
        ホーム画面と同じデザインで、Sa003.pngがヘッダーに表示されています。
    </p>

</div>

<footer style="margin: 100px 0 50px; color: #475569; font-size: 1rem; text-align: center;">
    &copy; 2026 MIYABI'S PORTAL
</footer>

</body>
</html>
